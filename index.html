    this.viewEnd = 0;
    this.minBars = 30; // minimum bars visible when zoomed in
    this.isDragging = false;
    this.dragStartX = 0;
    this.dragStartView = 0;
    // Chart theme: dark or light
    this.chartDark = false;
    // Price-axis vertical drag (scale candle height)
    this.isPriceAxisDrag = false;
    this.priceAxisDragStartY = 0;
    this.priceAxisDragStartZoom = 1.0;
    this.priceZoom = 1.0; // >1 = zoomed in (taller candles), <1 = compressed
    // Vertical pan (drag chart body up/down to shift price view)
    this.pricePan = 0;     // price-unit offset applied to minP/maxP
    this.dragStartY = 0;
    this.dragStartPan = 0;
    // Extra empty bars to the right of last candle
    this.rightPad = 30;
    this.setupEvents();
  }

  setupEvents() {
    const c = this.canvas;
    c.style.touchAction = 'none'; // prevent browser from intercepting touch gestures

    // ── DESKTOP: Mouse drag to pan + price-axis drag ────────────
    c.addEventListener('mousedown', e => {
      const rect = c.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const pad = this.padding;
      const plotW = rect.width - pad.left - pad.right;
      // Right axis zone: last 80px
      if (x > pad.left + plotW) {
        this.isPriceAxisDrag = true;
        this.priceAxisDragStartY = e.clientY;
        this.priceAxisDragStartZoom = this.priceZoom;
        c.style.cursor = 'ns-resize';
        return;
      }
      this.isDragging = true;
      this.dragStartX = e.clientX;
      this.dragStartY = e.clientY;
      this.dragStartView = this.viewStart;
      this.dragStartPan = this.pricePan;
      c.style.cursor = 'grabbing';
    });
    c.addEventListener('mouseup', () => {
      this.isDragging = false;
      this.isPriceAxisDrag = false;
      c.style.cursor = 'crosshair';
    });
    c.addEventListener('mouseleave', () => {
      this.hoverIndex = -1; this.hoverY = -1;
      this.isDragging = false; this.isPriceAxisDrag = false;
      c.style.cursor = 'crosshair'; this.draw();
    });
    c.addEventListener('mousemove', e => {
      // Price axis drag: up = zoom in (taller candles), down = zoom out
      if (this.isPriceAxisDrag) {
        const dy = e.clientY - this.priceAxisDragStartY;
        const scale = Math.exp(-dy / 150);
        this.priceZoom = Math.max(0.3, Math.min(8, this.priceAxisDragStartZoom * scale));
        this.draw();
        return;
      }
      if (this.isDragging) { this.handleDrag(e); return; }
      const rect = c.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const pad = this.padding;
      const plotW = rect.width - pad.left - pad.right;
      // Show ns-resize cursor when hovering over right price axis
      if (x > pad.left + plotW) { c.style.cursor = 'ns-resize'; return; }
      c.style.cursor = 'crosshair';
      const dpr = window.devicePixelRatio || 1;
      this.hoverY = (e.clientY - rect.top) * dpr;
      this.handleHover((e.clientX - rect.left) * dpr);
    });

    // ── DESKTOP: Scroll to zoom centered on cursor ───────────────
    c.addEventListener('wheel', e => {
      e.preventDefault();
      if (!this.data) return;
      const total = this.data.closes.length;
      const visibleBars = this.viewEnd - this.viewStart;
      // 5% zoom per scroll tick — subtle, not jarring
      const zoomFactor = e.deltaY < 0 ? 0.95 : 1.05;
      const maxBars = total + this.rightPad;
      const newVisible = Math.round(Math.max(this.minBars, Math.min(maxBars, visibleBars * zoomFactor)));
      const rect = c.getBoundingClientRect();
      const relX = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const focusBar = this.viewStart + relX * visibleBars;
      let newStart = Math.round(focusBar - relX * newVisible);
      newStart = Math.max(0, Math.min(newStart, maxBars - newVisible));
      this.viewStart = newStart;
      this.viewEnd = newStart + newVisible;
      this.draw();
    }, {passive: false});

    // ── MOBILE: Unified touch handler ───────────────────────────
    let touchStartX = 0, touchStartView = 0;
    let lastPinchDist = 0, lastPinchMid = 0;
    let isTouchPanning = false;

    c.addEventListener('touchstart', e => {
      e.preventDefault();
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartView = this.viewStart;
        isTouchPanning = false;
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastPinchDist = Math.sqrt(dx*dx + dy*dy);
        lastPinchMid = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        isTouchPanning = false;
      }
    }, {passive: false});

    c.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!this.data) return;
      const total = this.data.closes.length;
      const rect = c.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - touchStartX;
        if (Math.abs(dx) > 4) isTouchPanning = true;

        if (isTouchPanning) {
          // Smooth pan: shift view by dragged pixels
          const visibleBars = this.viewEnd - this.viewStart;
          const pxPerBar = rect.width / visibleBars;
          const barShift = Math.round(-dx / pxPerBar);
          const maxBars = total + this.rightPad;
          let newStart = Math.max(0, Math.min(touchStartView + barShift, maxBars - visibleBars));
          this.viewStart = newStart;
          this.viewEnd = newStart + visibleBars;
          this.hoverIndex = -1;
        } else {
          // Show crosshair while finger is still
          const x = (e.touches[0].clientX - rect.left) * dpr;
          this.hoverY = (e.touches[0].clientY - rect.top) * dpr;
          this.handleHover(x);
        }
      } else if (e.touches.length === 2) {
        // Pinch zoom centered on midpoint between fingers
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const scale = dist / Math.max(lastPinchDist, 1);
        lastPinchDist = dist;
        const visibleBars = this.viewEnd - this.viewStart;
        const maxBars = total + this.rightPad;
        const newVisible = Math.round(Math.max(this.minBars, Math.min(maxBars, visibleBars / scale)));
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const relX = Math.max(0, Math.min(1, (midX - rect.left) / rect.width));
        const focusBar = this.viewStart + relX * visibleBars;
        let newStart = Math.round(focusBar - relX * newVisible);
        newStart = Math.max(0, Math.min(newStart, maxBars - newVisible));
        this.viewStart = newStart;
        this.viewEnd = newStart + newVisible;
        this.hoverIndex = -1;
      }
      this.draw();
    }, {passive: false});

    c.addEventListener('touchend', () => {
      if (!isTouchPanning) { this.hoverIndex = -1; this.hoverY = -1; this.draw(); }
      isTouchPanning = false;
    });

    c.style.cursor = 'crosshair';
  }

  handleDrag(e) {
    if (!this.data) return;
    const rect = this.canvas.getBoundingClientRect();
    const plotW = rect.width - this.padding.left - this.padding.right;
    const plotH = rect.height - this.padding.top - this.padding.bottom;
    const visibleBars = this.viewEnd - this.viewStart;
    const pxPerBar = plotW / visibleBars;
    // Horizontal pan
    const dx = e.clientX - this.dragStartX;
    const barShift = Math.round(-dx / pxPerBar);
    const maxBars = this.data.closes.length + this.rightPad;
    let newStart = this.dragStartView + barShift;
    newStart = Math.max(0, Math.min(newStart, maxBars - visibleBars));
    this.viewStart = newStart;
    this.viewEnd = newStart + visibleBars;
    // Vertical pan: drag down → chart content moves down → see higher prices
    const dy = e.clientY - this.dragStartY;
    const approxRange = this._lastPriceRange || 1;
    this.pricePan = this.dragStartPan + (dy / plotH) * approxRange;
    this.draw();
  }

  handleHover(x) {
    if (!this.data) return;
    const visibleBars = this.viewEnd - this.viewStart;
    const plotW = this.canvas.width - this.padding.left - this.padding.right;
    const barW = plotW / visibleBars;
    const idx = this.viewStart + Math.floor((x - this.padding.left) / barW);
    if (idx >= this.viewStart && idx < this.viewEnd && idx !== this.hoverIndex) {
      this.hoverIndex = idx;
      this.draw();
    }
  }

  setData(data) {
    this.data = data;
    this.hoverIndex = -1;
    this.pricePan = 0;
    this.priceZoom = 1.0;
    // Default view: show all data
    this.viewStart = 0;
    this.viewEnd = data.closes ? data.closes.length : 0;
    this.draw();
  }

  setOverlays(overlays) {
    this.overlays = overlays;
    this.draw();
  }

  draw() {
    const canvas = this.canvas;
    const ctx = this.ctx;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(dpr, dpr);

    const w = rect.width, h = rect.height;
    const isDark = this.chartDark;
    const bgColor    = isDark ? '#131722' : '#ffffff';
    const gridColor  = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.07)';
    const textColor  = isDark ? 'rgba(148,158,178,0.7)' : 'rgba(60,70,95,0.65)';
    const priceColor = isDark ? '#c9d1d9' : '#1e2033';

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, w, h);

    if (!this.data || !this.data.closes || this.data.closes.length === 0) {
      ctx.fillStyle = textColor;
      ctx.font = '14px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('No data available', w/2, h/2);
      return;
    }

    const {closes, timestamps, ma10Arr, ma20Arr, crosses} = this.data;
    const pad = this.padding;
    const plotX = pad.left, plotY = pad.top;
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;
    const vs = this.viewStart, ve = this.viewEnd;
    const visibleBars = ve - vs;
    const total = closes.length;

    // Find price range for visible data bars only
    let minP = Infinity, maxP = -Infinity;
    const {opens: dOpens, highs: dHighs, lows: dLows} = this.data;
    for (let i = vs; i < Math.min(ve, total); i++) {
      if (dHighs && dHighs[i] != null) maxP = Math.max(maxP, dHighs[i]);
      if (dLows && dLows[i] != null) minP = Math.min(minP, dLows[i]);
      if (closes[i] != null) { minP = Math.min(minP, closes[i]); maxP = Math.max(maxP, closes[i]); }
      if (ma10Arr && ma10Arr[i] != null) { minP = Math.min(minP, ma10Arr[i]); maxP = Math.max(maxP, ma10Arr[i]); }
      if (ma20Arr && ma20Arr[i] != null) { minP = Math.min(minP, ma20Arr[i]); maxP = Math.max(maxP, ma20Arr[i]); }
    }
    if (minP === Infinity) { minP = 0; maxP = 100; }
    this.overlays.forEach(o => { minP = Math.min(minP, o.price); maxP = Math.max(maxP, o.price); });
    const rawRange = maxP - minP || 1;
    // Apply priceZoom: >1 zooms in (taller candles), center on midpoint
    const center = (maxP + minP) / 2 + this.pricePan;
    const scaledHalf = (rawRange * 0.55) / this.priceZoom; // 0.55 gives 10% padding each side by default
    minP = center - scaledHalf;
    maxP = center + scaledHalf;
    const priceRange = maxP - minP;
    this._lastPriceRange = priceRange;

    // Map data index → canvas coordinates (full plotH, no volume area)
    const toX = i => plotX + ((i - vs) / Math.max(visibleBars - 1, 1)) * plotW;
    const toY = p => plotY + (1 - (p - minP) / priceRange) * plotH;

    // Grid lines
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    const gridLines = 6;
    for (let i = 0; i <= gridLines; i++) {
      const y = plotY + (i / gridLines) * plotH;
      const price = maxP - (i / gridLines) * priceRange;
      ctx.beginPath(); ctx.moveTo(plotX, y); ctx.lineTo(plotX + plotW, y); ctx.stroke();
      ctx.fillStyle = textColor;
      ctx.font = '11px Inter, Trebuchet MS, system-ui';
      ctx.textAlign = 'right';
      ctx.fillText(price.toFixed(2), w - 4, y + 4);
    }

    // Shade future area (right of last bar) with subtle overlay
    if (ve > total) {
      const futureStartX = toX(total - 1) + (plotW / Math.max(visibleBars - 1, 1)) * 0.5;
      ctx.fillStyle = isDark ? 'rgba(255,255,255,0.015)' : 'rgba(0,0,0,0.025)';
      ctx.fillRect(futureStartX, plotY, plotX + plotW - futureStartX, plotH);
      // Dashed "now" divider
      ctx.beginPath();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = isDark ? 'rgba(137,180,250,0.25)' : 'rgba(80,110,200,0.2)';
      ctx.lineWidth = 1;
      ctx.moveTo(futureStartX, plotY);
      ctx.lineTo(futureStartX, plotY + plotH);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = isDark ? 'rgba(137,180,250,0.4)' : 'rgba(80,110,200,0.4)';
      ctx.font = '9px system-ui';
      ctx.textAlign = 'left';
      ctx.fillText('NOW', futureStartX + 4, plotY + 12);
    }

    // Date labels (visible range only)
    ctx.fillStyle = textColor;
    ctx.font = '10px Inter, Trebuchet MS, system-ui';
    ctx.textAlign = 'center';
    const dateStep = Math.max(1, Math.floor(visibleBars / 8));
    for (let i = vs; i < ve; i += dateStep) {
      if (timestamps[i]) {
        const d = new Date(timestamps[i] * 1000);
        const label = d.toLocaleDateString('en-US', {month:'short',day:'numeric'});
        ctx.fillText(label, toX(i), h - 8);
      }
    }

    // Candlesticks
    const {opens, highs, lows} = this.data;
    const rawCandleW = (plotW / visibleBars) * 0.7;
    const candleW = Math.max(2, Math.min(rawCandleW, 14));
    const wickW = Math.max(1, candleW > 6 ? 1.5 : 1);
    const candleR = candleW > 5 ? 1.5 : 0; // rounded corners when wide enough
    const bullColor = '#26c6b0';
    const bearColor = '#ef5350';
    const bullFill  = 'rgba(38,198,176,0.25)';
    const bearFill  = 'rgba(239,83,80,0.85)';
    const dojiColor = 'rgba(160,170,190,0.5)';
    let started = false;

    if (opens && highs && lows) {
      for (let i = vs; i < ve; i++) {
        const o = opens[i], hi = highs[i], lo = lows[i], c = closes[i];
        if (o == null || hi == null || lo == null || c == null) continue;
        const x = toX(i);
        const isBull = c >= o;
        const color = c === o ? dojiColor : isBull ? bullColor : bearColor;

        // Wick (high-low line)
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = wickW;
        ctx.moveTo(x, toY(hi));
        ctx.lineTo(x, toY(lo));
        ctx.stroke();

        // Body (open-close rect with optional rounding)
        const bodyTop = toY(Math.max(o, c));
        const bodyBot = toY(Math.min(o, c));
        const bodyH = Math.max(1, bodyBot - bodyTop);
        ctx.fillStyle = isBull ? bullFill : bearFill;
        if (candleR > 0 && bodyH > 3) {
          ctx.beginPath();
          ctx.roundRect(x - candleW/2, bodyTop, candleW, bodyH, candleR);
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.stroke();
        } else {
          ctx.fillRect(x - candleW/2, bodyTop, candleW, bodyH);
          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.strokeRect(x - candleW/2, bodyTop, candleW, bodyH);
        }
      }
    } else {
      // Fallback: line chart if no OHLC
      ctx.beginPath();
      ctx.strokeStyle = priceColor;
      ctx.lineWidth = 1.5;
      for (let i = vs; i < ve; i++) {
        if (closes[i] == null) continue;
        if (!started) { ctx.moveTo(toX(i), toY(closes[i])); started = true; }
        else ctx.lineTo(toX(i), toY(closes[i]));
      }
      ctx.stroke();
    }

    // (Volume histogram removed — not displayed)

    // MA10 line
    if (ma10Arr) {
      ctx.beginPath();
      ctx.strokeStyle = '#89b4fa';
      ctx.lineWidth = 1.5;
      started = false;
      for (let i = vs; i < ve; i++) {
        if (ma10Arr[i] == null) continue;
        if (!started) { ctx.moveTo(toX(i), toY(ma10Arr[i])); started = true; }
        else ctx.lineTo(toX(i), toY(ma10Arr[i]));
      }
      ctx.stroke();
    }

    // MA20 line
    if (ma20Arr) {
      ctx.beginPath();
      ctx.strokeStyle = '#94e2d5';
      ctx.lineWidth = 1.5;
      started = false;
      for (let i = vs; i < ve; i++) {
        if (ma20Arr[i] == null) continue;
        if (!started) { ctx.moveTo(toX(i), toY(ma20Arr[i])); started = true; }
        else ctx.lineTo(toX(i), toY(ma20Arr[i]));
      }
      ctx.stroke();
    }

    // ── Earnings markers ─────────────────────────────────────────
    const earnings = this.data.earnings;
    if (earnings && earnings.length > 0 && timestamps && timestamps.length > 0) {
      const lastTs = timestamps[total - 1];
      const firstTs = timestamps[0];
      // Average interval in seconds between bars
      const avgInterval = total > 1 ? (lastTs - firstTs) / (total - 1) : 86400;
      ctx.font = 'bold 9px Inter, Trebuchet MS, system-ui';
      ctx.textAlign = 'center';
      for (const e of earnings) {
        let barIdx;
        if (e.isFuture) {
          // Extrapolate past end of data
          barIdx = total - 1 + Math.round((e.timestamp - lastTs) / avgInterval);
        } else {
          // Find nearest historical bar
          let best = 0, bestDist = Infinity;
          for (let i = 0; i < total; i++) {
            const d = Math.abs(timestamps[i] - e.timestamp);
            if (d < bestDist) { bestDist = d; best = i; }
          }
          barIdx = best;
        }
        // Use x-position to check visibility instead of barIdx (allows future bars in right-pad area)
        const ex = toX(barIdx);
        if (ex < plotX || ex > plotX + plotW) continue;
        if (e.isFuture) {
          // Future earnings: dashed vertical line + amber E
          ctx.save();
          ctx.beginPath();
          ctx.setLineDash([3, 3]);
          ctx.strokeStyle = 'rgba(249,226,175,0.5)';
          ctx.lineWidth = 1;
          ctx.moveTo(ex, plotY);
          ctx.lineTo(ex, plotY + plotH);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
          // E badge (amber, future)
          ctx.fillStyle = '#f9e2af';
          ctx.beginPath();
          ctx.roundRect(ex - 7, plotY + plotH + 2, 14, 13, 2);
          ctx.fill();
          ctx.fillStyle = '#1e1e2e';
          ctx.fillText('E', ex, plotY + plotH + 12);
        } else {
          // Past earnings: simple E marker on x-axis
          ctx.fillStyle = isDark ? 'rgba(148,226,213,0.85)' : 'rgba(32,160,140,0.85)';
          ctx.beginPath();
          ctx.roundRect(ex - 6, plotY + plotH + 2, 12, 12, 2);
          ctx.fill();
          ctx.fillStyle = isDark ? '#131722' : '#ffffff';
          ctx.fillText('E', ex, plotY + plotH + 11);
        }
      }
    }

    // Crossover markers (only visible ones)
    if (crosses) {
      crosses.forEach(cross => {
        if (cross.index < vs || cross.index >= ve) return;
        const x = toX(cross.index);
        const y = toY(closes[cross.index] || 0);
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = cross.type === 'bullish' ? '#26a69a' : '#ef5350';
        ctx.fill();
        ctx.strokeStyle = bgColor;
        ctx.lineWidth = 2;
        ctx.stroke();
      });
    }

    // Horizontal overlays (entry, stop, pyramid levels)
    this.overlays.forEach(o => {
      const y = toY(o.price);
      if (y < plotY || y > plotY + plotH) return;
      ctx.beginPath();
      ctx.setLineDash(o.dash || [6, 4]);
      ctx.strokeStyle = o.color || '#89b4fa';
      ctx.lineWidth = 1;
      ctx.moveTo(plotX, y);
      ctx.lineTo(plotX + plotW, y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = o.color || '#89b4fa';
      ctx.font = 'bold 10px Inter, Trebuchet MS, system-ui';
      ctx.textAlign = 'left';
      ctx.fillText(o.label + ' ' + o.price.toFixed(2), plotX + 4, y - 4);
    });

    // ── Last price line + right-axis badge (TradingView style) ──────────
    const lastClose = total > 0 ? closes[total - 1] : null;
    if (lastClose != null) {
      const ly = toY(lastClose);
      if (ly >= plotY && ly <= plotY + plotH) {
        const prevClose = total > 1 ? closes[total - 2] : lastClose;
        const lastPriceUp = lastClose >= (prevClose || lastClose);
        const lastPriceColor = lastPriceUp ? '#26a69a' : '#ef5350';
        // Dotted line across full width
        ctx.beginPath();
        ctx.setLineDash([1, 2]);
        ctx.strokeStyle = isDark ? `${lastPriceColor}` : lastPriceColor;
        ctx.globalAlpha = 0.6;
        ctx.lineWidth = 0.8;
        ctx.moveTo(plotX, ly);
        ctx.lineTo(plotX + plotW, ly);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
        // Right-axis price badge
        const badgeW = 72, badgeH = 18;
        const badgeX = plotX + plotW + 2;
        const badgeY = ly - badgeH / 2;
        ctx.fillStyle = lastPriceColor;
        ctx.beginPath();
        ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 10px Inter, Trebuchet MS, system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(lastClose.toFixed(2), badgeX + badgeW / 2, badgeY + 13);
      }
    }

    // Crosshair + price label (TradingView style)
    const mouseY = this.hoverY;
    const inPlot = mouseY >= plotY * dpr && mouseY <= (plotY + plotH) * dpr;

    // Always draw horizontal crosshair line at mouse Y with price label on right axis
    if (inPlot && mouseY > 0) {
      const scaledY = mouseY / dpr;
      const crossPrice = maxP - ((scaledY - plotY) / plotH) * priceRange;

      // Horizontal dashed line
      ctx.beginPath();
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = isDark ? 'rgba(166,172,205,0.4)' : 'rgba(88,91,112,0.35)';
      ctx.lineWidth = 0.7;
      ctx.moveTo(plotX, scaledY);
      ctx.lineTo(plotX + plotW, scaledY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Price label on right Y-axis
      const labelW = 68, labelH = 20;
      const labelX = plotX + plotW + 2;
      const labelY = scaledY - labelH / 2;
      ctx.fillStyle = isDark ? '#89b4fa' : '#5b7ee5';
      ctx.beginPath();
      ctx.roundRect(labelX, labelY, labelW, labelH, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px Inter, Trebuchet MS, system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(crossPrice.toFixed(2), labelX + labelW / 2, labelY + 14);
    }

    // Vertical crosshair + OHLC tooltip when hovering a specific bar
    if (this.hoverIndex >= vs && this.hoverIndex < ve && closes[this.hoverIndex] != null) {
      const hx = toX(this.hoverIndex);
      const hy = toY(closes[this.hoverIndex]);

      // Vertical dashed line
      ctx.beginPath();
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = isDark ? 'rgba(166,172,205,0.4)' : 'rgba(88,91,112,0.35)';
      ctx.lineWidth = 0.7;
      ctx.moveTo(hx, plotY);
      ctx.lineTo(hx, plotY + plotH);
      ctx.stroke();
      ctx.setLineDash([]);

      // Date label on bottom X-axis
      if (timestamps[this.hoverIndex]) {
        const dateStr = new Date(timestamps[this.hoverIndex] * 1000).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
        const dateLabelW = ctx.measureText(dateStr).width + 14;
        const dateLabelH = 18;
        const dateLabelX = hx - dateLabelW / 2;
        const dateLabelY = plotY + plotH + 4;
        ctx.fillStyle = isDark ? '#89b4fa' : '#5b7ee5';
        ctx.beginPath();
        ctx.roundRect(Math.max(plotX, dateLabelX), dateLabelY, dateLabelW, dateLabelH, 3);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Inter, Trebuchet MS, system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(dateStr, hx, dateLabelY + 13);
      }

      // OHLC info bar at top of chart
      const idx = this.hoverIndex;
      const o = dOpens ? dOpens[idx] : null;
      const hi = dHighs ? dHighs[idx] : null;
      const lo = dLows ? dLows[idx] : null;
      const c = closes[idx];
      const m10 = ma10Arr ? ma10Arr[idx] : null;
      const m20 = ma20Arr ? ma20Arr[idx] : null;
      const isBull = o != null && c >= o;

      let infoText = '';
      if (o != null) infoText += `O ${o.toFixed(2)}  H ${hi.toFixed(2)}  L ${lo.toFixed(2)}  C ${c.toFixed(2)}`;
      else infoText += `$${c.toFixed(2)}`;
      if (m10 != null) infoText += `   MA10 ${m10.toFixed(2)}`;
      if (m20 != null) infoText += `   MA20 ${m20.toFixed(2)}`;

      ctx.fillStyle = isDark ? 'rgba(30,30,46,0.85)' : 'rgba(244,246,249,0.9)';
      ctx.fillRect(plotX, plotY, plotW, 22);
      ctx.font = '11px Inter, Trebuchet MS, system-ui';
      ctx.textAlign = 'left';
      ctx.fillStyle = o != null ? (isBull ? '#26a69a' : '#ef5350') : priceColor;
      ctx.fillText(infoText, plotX + 6, plotY + 15);

      // Small dot on the close price
      ctx.beginPath();
      ctx.arc(hx, hy, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = isDark ? '#89b4fa' : '#5b7ee5';
      ctx.fill();
    }
  }
}

// ─── UI RENDERING ───

function renderHeatGauge() {
  const container = document.getElementById('heatGaugeContainer');
  if (!container) return;
  const pk = getProfileKey();
  const trades = (profiles[pk].trades || []).filter(t => !t.closed);
  const atTrades = profiles[pk].atTrades || [];
  const equity = profiles[pk].accountEquity || 100000;
  const maxHeat = profiles[pk].maxPortfolioHeat || 10;

  let totalRisk = 0;
  trades.forEach(t => {
    const riskPerShare = (t.entryPrice || 0) - (t.stopPrice || 0);
    totalRisk += riskPerShare * (t.totalShares || 0);
  });
  atTrades.forEach(t => {
    totalRisk += t.initial_dollar_risk || 0;
  });
  const heatPct = equity > 0 ? (totalRisk / equity) * 100 : 0;
  const fillPct = Math.min((heatPct / maxHeat) * 100, 100);

  let fillColor = '#26a69a'; // green
  if (fillPct >= 85) fillColor = '#ef5350'; // red
  else if (fillPct >= 50) fillColor = '#ef5350'; // red when heavy

  const heatDesc = fillPct < 30 ? 'Light' : fillPct < 60 ? 'Moderate' : fillPct < 85 ? 'Heavy' : 'Max';
  container.innerHTML = `<div class="heat-gauge">
    <div class="heat-meta">
      <span class="heat-label">Risk Used</span>
      <span class="heat-val" style="color:${fillColor}">${heatPct.toFixed(1)}% <span style="color:var(--text3);font-weight:400;font-size:9px">of ${maxHeat}% max · ${heatDesc}</span></span>
    </div>
    <div class="heat-track"><div class="heat-fill" style="width:${fillPct}%;background:${fillColor}"></div></div>
  </div>`;
}

function updateBotStatus() {
  const widget = document.getElementById('botStatusWidget');
  if (!widget) return;
  const pk = getProfileKey();
  const atConnected = profiles[pk]?.atConnected;
  const lastSync = profiles[pk]?.atLastSync;
  const recentSync = lastSync && (Date.now() - new Date(lastSync).getTime()) < 900000; // 15 min
  const isActive = atConnected && recentSync;
  widget.innerHTML = `<span class="bot-dot ${isActive ? 'active' : 'offline'}"></span>${isActive ? 'Bot Active' : 'Bot Offline'}`;
}

function renderNav() {
  // Compute signal counts for badge — same source as header card
  let longCount = 0, shortCount = 0;
  const navTickers = getAllTickers();
  navTickers.forEach(t => {
    const d = state.tickerData[t];
    if (!d) return;
    if (d.signal === 'LONG') longCount++;
    else if (d.signal === 'SHORT') shortCount++;
  });

  // Sidebar nav
  const sidebarNav = document.getElementById('sidebarNav');
  sidebarNav.innerHTML = SCREENS.map(s => {
    let badge = '';
    if (s.id === 'dashboard' && (longCount > 0 || shortCount > 0)) {
      badge = `<span class="nav-signal-badge"><span class="badge-long">▲${longCount}</span><span class="badge-short">▼${shortCount}</span></span>`;
    }
    return `<button class="nav-item${state.activeScreen===s.id?' active':''}" data-screen="${s.id}" onclick="navigateTo('${s.id}')">${s.icon}<span>${s.label}</span>${badge}</button>`;
  }).join('');
  sidebarNav.querySelectorAll('.nav-item').forEach(btn => {
    btn.onclick = () => navigateTo(btn.dataset.screen);
  });

  // Sidebar profiles
  const sp = document.getElementById('sidebarProfiles');
  sp.innerHTML = PROFILES.map(p =>
    `<button class="profile-btn${state.activeProfile===p?' active':''}" data-profile="${p}">${p}</button>`
  ).join('');
  sp.querySelectorAll('.profile-btn').forEach(btn => {
    btn.onclick = () => switchProfile(btn.dataset.profile);
  });

  // Header profiles (mobile)
  const hp = document.getElementById('headerProfiles');
  hp.innerHTML = PROFILES.map(p =>
    `<button class="profile-btn${state.activeProfile===p?' active':''}" data-profile="${p}">${p}</button>`
  ).join('');
  hp.querySelectorAll('.profile-btn').forEach(btn => {
    btn.onclick = () => switchProfile(btn.dataset.profile);
  });

  // Bottom nav (mobile)
  const bn = document.getElementById('botNav');
  bn.innerHTML = SCREENS.map(s =>
    `<button class="botnav-item${state.activeScreen===s.id?' active':''}" data-screen="${s.id}">${s.icon}<span>${s.label}</span></button>`
  ).join('');
  bn.querySelectorAll('.botnav-item').forEach(btn => {
    btn.onclick = () => navigateTo(btn.dataset.screen);
  });

  // Market status
  const open = isMarketOpen();
  document.getElementById('marketDot').className = 'market-dot ' + (open?'open':'closed');
  document.getElementById('marketStatus').textContent = open ? 'Market Open' : 'Market Closed';

  // Heat gauge
  renderHeatGauge();

  // Bot status
  updateBotStatus();
}

function renderRefreshBtn() {
  const btn = document.getElementById('refreshBtn');
  if (state.refreshing) btn.querySelector('svg').classList.add('refresh-spin');
  else btn.querySelector('svg').classList.remove('refresh-spin');
}

function setPnlPeriod(p) { state.pnlPeriod = p; renderDashboard(); }

function navigateTo(screen, options={}) {
  state.activeScreen = screen;
  if (options.ticker) state.selectedTicker = options.ticker;
  if (options.calcPrefill) state.calcPrefill = options.calcPrefill;
  renderNav();
  renderScreen();
}

function switchProfile(profile) {
  state.activeProfile = profile;
  renderNav();
  renderScreen();
}

function renderScreen() {
  switch(state.activeScreen) {
    case 'dashboard': renderDashboard(); break;
    case 'chart': renderChartScreen(); break;
    case 'calculator': renderCalculator(); break;
    case 'positions': state.portfolioTab = 'positions'; renderPortfolio(); break;
    case 'performance': state.portfolioTab = 'performance'; renderPortfolio(); break;
    case 'portfolio': renderPortfolio(); break;
    case 'checklist': renderChecklist(); break;
    case 'journal': renderJournal(); break;
    case 'settings': renderSettings(); break;
  }
}

// ─── GAIN BLOCKS ───
function renderGainBlocks(journal, startEquity) {
  if (!startEquity || startEquity <= 0) return '';
  const hasData = journal.some(t => t.exitDate);
  if (!hasData) return '';
  const now = new Date();
  const curYear = now.getFullYear();
  const curMonth = now.getMonth();

  const closed = journal.filter(t => t.exitDate);

  // Helper: sum P&L for trades matching a filter
  const sumPnl = (fn) => closed.filter(fn).reduce((s, t) => s + (t.pnl || 0), 0);

  // Balance at start of a given year = startEquity + all P&L closed before Jan 1 of that year
  const balAtYearStart = (year) => startEquity + sumPnl(t => new Date(t.exitDate + 'T12:00:00').getFullYear() < year);

  // Balance at start of current month = startEquity + all P&L closed before 1st of this month
  const mtdCutoff = new Date(curYear, curMonth, 1);
  const balAtMonthStart = startEquity + sumPnl(t => new Date(t.exitDate + 'T12:00:00') < mtdCutoff);

  // Period P&L
  const mtdPnl = sumPnl(t => { const d = new Date(t.exitDate + 'T12:00:00'); return d.getMonth() === curMonth && d.getFullYear() === curYear; });
  const ytdPnl = sumPnl(t => new Date(t.exitDate + 'T12:00:00').getFullYear() === curYear);
  const allPnl  = sumPnl(() => true);

  const ytdStart = balAtYearStart(curYear);
  const mtdPct   = balAtMonthStart > 0 ? mtdPnl / balAtMonthStart * 100 : 0;
  const ytdPct   = ytdStart > 0 ? ytdPnl / ytdStart * 100 : 0;
  const allPct   = startEquity > 0 ? allPnl / startEquity * 100 : 0;

  const pctHtml = (pct, pnl) => {
    const c = pnl >= 0 ? 'var(--green)' : 'var(--red)';
    const s = pnl >= 0 ? '+' : '';
    return `<div style="font-size:22px;font-weight:700;font-family:var(--mono);color:${c}">${s}${pct.toFixed(1)}%</div>
            <div style="font-size:11px;font-family:var(--mono);color:${c};margin-top:2px">${s}$${fmt(Math.abs(pnl))}</div>`;
  };

  // ── Annual returns ──
  const years = [...new Set(closed.map(t => new Date(t.exitDate + 'T12:00:00').getFullYear()))].sort();
  const annualRows = years.map((year, i) => {
    const yPnl   = sumPnl(t => new Date(t.exitDate + 'T12:00:00').getFullYear() === year);
    const yStart = balAtYearStart(year);
    const yPct   = yStart > 0 ? yPnl / yStart * 100 : 0;
    const isCur  = year === curYear;
    const pnlC   = yPnl >= 0 ? 'var(--green)' : 'var(--red)';
    const pnlS   = yPnl >= 0 ? '+' : '';
    const border = i < years.length - 1 ? 'border-bottom:1px solid var(--card-border)' : '';
    return `<div style="display:grid;grid-template-columns:56px 1fr auto auto;align-items:center;gap:12px;padding:6px 0;${border}">
      <span style="font-weight:700;font-family:var(--mono);font-size:13px">${year}${isCur ? '<span style="font-size:9px;color:var(--text3);font-weight:400;margin-left:4px">YTD</span>' : ''}</span>
      <span style="font-size:11px;font-family:var(--mono);color:${pnlC}">${pnlS}$${fmt(Math.abs(yPnl))}</span>
      <span style="font-size:15px;font-weight:700;font-family:var(--mono);color:${pnlC};text-align:right">${pnlS}${yPct.toFixed(1)}%</span>
      <span style="font-size:11px;color:var(--text3);text-align:right">on $${Math.round(yStart/1000)}k</span>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px">
      <!-- Percent Gains block -->
      <div class="snap-card" style="flex:1;min-width:260px;margin-bottom:0">
        <div class="snap-label" style="margin-bottom:12px">Percent Gains</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div>
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:6px">Month to Date</div>
            ${pctHtml(mtdPct, mtdPnl)}
          </div>
          <div style="border-left:1px solid var(--card-border);padding-left:12px">
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:6px">Year to Date</div>
            ${pctHtml(ytdPct, ytdPnl)}
          </div>
          <div style="border-left:1px solid var(--card-border);padding-left:12px">
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:6px">All Time</div>
            ${pctHtml(allPct, allPnl)}
          </div>
        </div>
        <div style="margin-top:10px;font-size:10px;color:var(--text3)">Each period vs account balance at period start · excludes cash deposits</div>
      </div>
      <!-- Annual Returns block -->
      <div class="snap-card" style="flex:1;min-width:260px;margin-bottom:0">
        <div class="snap-label" style="margin-bottom:12px">Annual Returns</div>
        ${years.length > 0 ? annualRows : '<span style="color:var(--text3);font-size:13px">No closed trade history yet</span>'}
        <div style="margin-top:10px;font-size:10px;color:var(--text3)">Closed trade P&L only · cash deposits excluded from denominator</div>
      </div>
    </div>`;
}

// ─── SNAPSHOT ───
function renderSnapshot(trades, journal) {
  const pk = getProfileKey();
  const allVisible = [...PERMANENT_TICKERS, ...state.customTickers];

  // ── Regime status ──
  const qqq = state.tickerData['QQQ'];
  const spy = state.tickerData['SPY'];
  const regimeSignals = ['QQQ','SPY'].map(t => {
    const d = state.tickerData[t];
    if (!d) return `<span class="snap-regime-pill neutral">${t} –</span>`;
    const cls = d.signal === 'LONG' ? 'long' : d.signal === 'SHORT' ? 'short' : 'neutral';
    const arrow = d.signal === 'LONG' ? '▲' : d.signal === 'SHORT' ? '▼' : '–';
    return `<span class="snap-regime-pill ${cls}">${t} ${arrow}</span>`;
  }).join('');
  const regimeOk = qqq?.signal === 'LONG' && spy?.signal === 'LONG';
  const regimeBad = qqq?.signal === 'SHORT' && spy?.signal === 'SHORT';
  const regimeMsg = (qqq && spy)
    ? (regimeOk ? '<b style="color:var(--green)">Uptrend</b>' : (regimeBad ? '<b style="color:var(--red)">Downtrend</b>' : '<b style="color:#df8e1d">Mixed</b>'))
    : '<span style="color:var(--text3)">Loading…</span>';

  // ── New crosses ──
  const newCrosses = allVisible
    .map(t => ({ ticker: t, d: state.tickerData[t] }))
    .filter(({ d }) => d?.isNewCross)
    .concat(state.screenerResults.filter(r => r.trendDays === 0 && !allVisible.includes(r.ticker)).map(r => ({ ticker: r.ticker, d: { signal: r.trendDir === 'up' ? 'LONG' : 'SHORT', price: r.price } })));

  const crossHtml = newCrosses.length > 0
    ? newCrosses.map(({ ticker, d }) => {
        const cls = d.signal === 'LONG' ? 'long' : 'short';
        const arrow = d.signal === 'LONG' ? '▲' : '▼';
        return `<span class="snap-cross-pill ${cls}">${arrow} ${ticker} $${fmt(d.price)}</span>`;
      }).join('')
    : `<span style="color:var(--text3);font-size:13px">No new crosses today</span>`;

  // ── Open positions with live P&L and next pyramid trigger ──
  const today = new Date();
  const sortedTrades = [...trades].sort((a, b) => {
    const da = state.tickerData[a.ticker], db = state.tickerData[b.ticker];
    const pnlA = da ? (da.price - a.entryPrice) * (a.totalShares || a.shares || 0) : 0;
    const pnlB = db ? (db.price - b.entryPrice) * (b.totalShares || b.shares || 0) : 0;
    return pnlB - pnlA;
  });
  const lbl = (text) => `<span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);display:block;margin-bottom:2px">${text}</span>`;
  const openRows = sortedTrades.map((t, i) => {
    const d = state.tickerData[t.ticker];
    const curPrice = d?.price;
    const entryP = t.entryPrice || 0;
    const shares = t.totalShares || t.shares || 0;
    const pnl = curPrice ? (curPrice - entryP) * shares : 0;
    const pnlSign = pnl >= 0 ? '+' : '';
    const pnlColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
    const dayPct = d?.changePct;
    const dayColor = dayPct != null ? (dayPct >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--text2)';
    const holdDays = t.entryDate ? Math.round((today - new Date(t.entryDate + 'T12:00:00')) / 86400000) : '?';
    // Next pyramid add (1x ATR above entry)
    const atr = t.atr || 0;
    const stopP = t.stopPrice || 0;
    const nextAddPrice = entryP + atr;
    const nextAddRiskPerShare = nextAddPrice - stopP;
    const nextAddShares = nextAddRiskPerShare > 0 ? Math.floor((t.dollarRisk || 0) / nextAddRiskPerShare) : 0;
    const nextAddCost = nextAddShares * nextAddPrice;
    const distToNext = (curPrice && nextAddPrice) ? ((nextAddPrice - curPrice) / curPrice * 100) : null;
    const distColor = distToNext !== null && distToNext <= 0 ? 'var(--green)' : 'var(--text2)';
    const border = i < sortedTrades.length - 1 ? 'border-bottom:1px solid var(--card-border)' : '';
    const layersFilled = t.layersFilled || 1;
    const addCount = layersFilled - 1;
    const addBadge = addCount > 0
      ? `<span style="font-size:10px;background:rgba(137,180,250,0.15);color:var(--blue);padding:2px 7px;border-radius:4px;font-weight:700">${addCount} add${addCount !== 1 ? 's' : ''}</span>`
      : '';
    return `<div style="padding:12px 0;${border}">
      <!-- Header: logo + ticker + P&L -->
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
        ${tickerLogo(t.ticker, 36)}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span style="font-weight:800;font-family:var(--mono);font-size:14px;letter-spacing:.5px">${t.ticker}</span>
            ${addBadge}
          </div>
          <div style="display:flex;align-items:baseline;gap:5px;margin-top:3px">
            <span style="font-weight:700;font-family:var(--mono);font-size:14px;color:${pnlColor}">${pnlSign}$${fmt(Math.abs(pnl))}</span>
            <span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">unrealized</span>
          </div>
        </div>
      </div>
      <!-- Row 2: price stats centered -->
      <div style="display:flex;margin-bottom:${nextAddPrice>0?'8':'0'}px">
        ${curPrice ? `<div style="flex:1;text-align:center">${lbl('Price')}<span style="font-family:var(--mono);font-size:12px">$${fmt(curPrice)}</span></div>` : ''}
        ${dayPct != null ? `<div style="flex:1;text-align:center">${lbl('Day')}<span style="font-family:var(--mono);font-size:12px;color:${dayColor}">${dayPct>=0?'+':''}${dayPct.toFixed(2)}%</span></div>` : ''}
        <div style="flex:1;text-align:center">${lbl('Held')}<span style="font-size:12px;color:var(--text2)">${holdDays}d</span></div>
      </div>
      <!-- Row 3: next add centered -->
      ${nextAddPrice > 0 ? `<div style="display:flex;padding:8px 6px;background:rgba(137,180,250,0.06);border-radius:6px;border:1px solid rgba(137,180,250,0.12)">
        <div style="flex:1;text-align:center">${lbl('Next Add At')}<span style="font-family:var(--mono);font-size:12px">$${fmt(nextAddPrice)}</span></div>
        ${distToNext !== null ? `<div style="flex:1;text-align:center">${lbl('Away')}<span style="font-family:var(--mono);font-size:12px;color:${distColor}">${distToNext>0?'+':''}${distToNext.toFixed(1)}%</span></div>` : ''}
        ${nextAddCost > 0 ? `<div style="flex:1;text-align:center">${lbl('Add Capital')}<span style="font-family:var(--mono);font-size:12px">~$${Math.round(nextAddCost).toLocaleString()}</span></div>` : ''}
      </div>` : ''}
    </div>`;
  });
  const openPositionsHtml = openRows.length > 0
    ? openRows.join('')
    : '<span style="color:var(--text3);font-size:13px">No open positions</span>';

  // ── Last 5 closed trades ──
  const sorted = [...(journal || [])].sort((a, b) => (b.exitDate || '').localeCompare(a.exitDate || ''));
  const recentTrades = sorted.slice(0, 5);
  const COL_RECENT = '52px 44px auto';
  const recentHtml = recentTrades.length > 0
    ? `<div style="display:grid;grid-template-columns:${COL_RECENT};padding:0 0 4px;gap:10px;border-bottom:1px solid var(--card-border);margin-bottom:1px">
        <span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3)">Ticker</span>
        <span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);text-align:right">Held</span>
        <span style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);text-align:right">P&amp;L</span>
      </div>` + recentTrades.map((t, i) => {
        const pnlSign = t.pnl >= 0 ? '+' : '';
        const pnlColor = t.pnl >= 0 ? 'var(--green)' : 'var(--red)';
        const holdDays = (t.entryDate && t.exitDate)
          ? Math.round((new Date(t.exitDate + 'T12:00:00') - new Date(t.entryDate + 'T12:00:00')) / 86400000)
          : '?';
        const border = i < recentTrades.length - 1 ? 'border-bottom:1px solid var(--card-border)' : '';
        return `<div style="display:grid;grid-template-columns:${COL_RECENT};align-items:center;padding:5px 0;${border};gap:10px">
          <span style="font-weight:700;font-family:var(--mono);font-size:12px">${t.ticker}</span>
          <span style="color:var(--text3);font-size:11px;text-align:right">${holdDays}d</span>
          <span style="font-weight:700;font-family:var(--mono);font-size:12px;color:${pnlColor};text-align:right">${pnlSign}$${fmt(Math.abs(t.pnl))}</span>
        </div>`;
      }).join('')
    : '<span style="color:var(--text3);font-size:13px">No closed trades yet</span>';

  // ── Near-cross watch (open positions within 5% of a MA crossover) ──
  // trades already contains both manual + AT trades (merged in renderDashboard)
  const nearCross = trades.map(t => {
    const d = state.tickerData[t.ticker];
    if (!d || !d.ma10 || !d.ma20) return null;
    const gapPct = Math.abs(d.ma10 - d.ma20) / d.ma20 * 100;
    if (gapPct > 2) return null;
    // Direction of approaching cross
    const holdingLong = t.direction !== 'SHORT';
    const approachingBearish = holdingLong && d.ma10 > d.ma20; // long position, MA10 falling toward MA20
    const approachingBullish = !holdingLong && d.ma10 < d.ma20; // short position, MA10 rising toward MA20
    if (!approachingBearish && !approachingBullish) return null;
    return { ticker: t.ticker, gapPct, approachingBearish };
  }).filter(Boolean).sort((a, b) => a.gapPct - b.gapPct);

  const nearCrossHtml = nearCross.length > 0
    ? nearCross.map((n, i) => {
        const label = n.approachingBearish ? 'exit signal' : 'cover signal';
        const color = n.approachingBearish ? '#ef5350' : 'var(--green)';
        const borderStyle = i < nearCross.length - 1 ? 'border-bottom:1px solid var(--card-border)' : '';
        return `<div style="display:flex;align-items:center;gap:12px;padding:5px 0;${borderStyle}">
          <span style="font-weight:700;font-family:var(--mono);font-size:12px;min-width:48px">${n.ticker}</span>
          <span style="font-size:11px;color:${color}">⚠ ${label} within ${n.gapPct.toFixed(1)}%</span>
        </div>`;
      }).join('')
    : `<span style="color:var(--text3);font-size:13px">No open positions near a crossover</span>`;

  return `
    <div class="snap-card">
      <div class="snap-section">
        <div class="snap-label">Market Direction</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px">
          ${regimeSignals}
          <span style="font-size:12px;color:var(--text2)">${regimeMsg}</span>
        </div>
      </div>
      <div class="snap-divider"></div>
      <div class="snap-section">
        <div class="snap-label">New Crosses Today <span style="color:var(--text3);font-weight:400">(${newCrosses.length})</span></div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${crossHtml}</div>
      </div>
      <div class="snap-divider"></div>
      <div class="snap-section">
        <div class="snap-label">Approaching Crossover <span style="color:var(--text3);font-weight:400">(open positions within 5%)</span></div>
        <div style="margin-top:6px">${nearCrossHtml}</div>
      </div>
      <div class="snap-divider"></div>
      <div class="snap-row">
        <div class="snap-section" style="flex:1;min-width:160px">
          <div class="snap-label">Open Positions (${trades.length})</div>
          <div style="margin-top:6px">${openPositionsHtml}</div>
        </div>
        <div class="snap-vdivider"></div>
        <div class="snap-section" style="flex:1;min-width:160px">
          <div class="snap-label">Last 5 Closed</div>
          <div style="margin-top:6px">${recentHtml}</div>
        </div>
      </div>
    </div>`;
}

// ─── DASHBOARD ───
function renderDashboard() {
  const content = document.getElementById('content');
  const allTickers = getAllTickers();
  const tickerDataArr = allTickers.map(t => state.tickerData[t]).filter(Boolean);

  const loadedCount = tickerDataArr.length;
  const totalCount = allTickers.length;
  const isLoading = loadedCount < totalCount;
  const longCount = tickerDataArr.filter(d => d.signal === 'LONG').length;
  const shortCount = tickerDataArr.filter(d => d.signal === 'SHORT').length;
  // Count new crosses from what's actually visible on page (no double-counting)
  const coreAndCustom = [...PERMANENT_TICKERS, ...state.customTickers];
  const coreCrossCount = coreAndCustom.filter(t => state.tickerData[t] && state.tickerData[t].isNewCross).length;
  const screenerCrossCount = state.screenerResults.filter(r => r.trendDays === 0 && !coreAndCustom.includes(r.ticker)).length;
  const newCrossCount = coreCrossCount + screenerCrossCount;

  // Calculate totals
  const pk = getProfileKey();
  const manualTrades = profiles[pk].trades || [];
  const atTrades = (profiles[pk].atTrades || []).map(t => ({
    ticker: t.ticker,
    entryPrice: +t.entry_price,
    stopPrice: +t.stop_price,
    shares: +t.shares,
    totalShares: +t.shares,
    entryDate: t.entry_date,
    dollarRisk: t.initial_dollar_risk || 0,
    atr: t.atr_at_entry,
    source: 'autotrader',
    layersFilled: t.layers_filled || 1
  }));
  const trades = [...manualTrades, ...atTrades];
  const journal = profiles[pk].journal || [];
  const startEquity = profiles[pk].accountEquity || 0;
  let totalRisk = 0;
  trades.forEach(t => { totalRisk += t.dollarRisk || 0; });

  // Unrealized P&L from open positions
  let unrealizedPnl = 0;
  trades.forEach(t => {
    const d = state.tickerData[t.ticker];
    if (d) unrealizedPnl += (d.price - t.entryPrice) * (t.totalShares || t.shares || 0);
  });

  // Realized P&L filtered by period
  const now = new Date();
  const pnlPeriod = state.pnlPeriod || 'ALL';
  let realizedPnl = 0;
  journal.forEach(t => {
    if (!t.exitDate) return;
    const d = new Date(t.exitDate + 'T12:00:00');
    if (pnlPeriod === 'MTD' && (d.getMonth() !== now.getMonth() || d.getFullYear() !== now.getFullYear())) return;
    if (pnlPeriod === 'YTD' && d.getFullYear() !== now.getFullYear()) return;
    realizedPnl += t.pnl || 0;
  });

  // Total account value = starting equity + all realized + unrealized
  const allTimeRealized = journal.reduce((s, t) => s + (t.pnl || 0), 0);
  const accountValue = startEquity + allTimeRealized + unrealizedPnl;

  // Percent gains (denominator = original starting equity, excludes any deposits)
  const realizedPct = startEquity > 0 ? realizedPnl / startEquity * 100 : null;
  const unrealizedPct = startEquity > 0 ? unrealizedPnl / startEquity * 100 : null;
  const fmtPct = (v) => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

  const fmtPnl = (v) => (v >= 0 ? '+' : '') + '$' + fmt(Math.abs(v));
  const pnlClass = (v) => v >= 0 ? 'green' : 'red';

  content.innerHTML = `
    <div class="screen active" id="screen-dashboard">
      ${isLoading ? `<div class="loading"><div class="loading-spinner"></div>Loading market data... ${loadedCount}/${totalCount}</div>` : ''}
      <div class="summary-row">
        <div class="summary-card"><div class="label">Long Signals</div><div class="value green">${longCount}</div></div>
        <div class="summary-card"><div class="label">Short Signals</div><div class="value red">${shortCount}</div></div>
        <div class="summary-card"><div class="label">Open Risk</div><div class="value">${trades.length > 0 ? (totalRisk > 0 ? '$' + fmt(totalRisk) : '--') : '--'}</div></div>
        <div class="summary-card"><div class="label">Unrealized P&amp;L</div><div class="value ${pnlClass(unrealizedPnl)}">${trades.length > 0 ? fmtPnl(unrealizedPnl) : '--'}</div>${trades.length > 0 && unrealizedPct !== null ? `<div style="font-size:11px;font-family:var(--mono);color:${unrealizedPnl>=0?'var(--green)':'var(--red)'};margin-top:2px">${fmtPct(unrealizedPct)}</div>` : ''}</div>
        <div class="summary-card"><div class="label">Account Value</div><div class="value">${startEquity > 0 ? '$' + fmt(accountValue) : '--'}</div></div>
        <div class="summary-card" style="min-width:160px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <div class="label" style="margin:0">Realized P&amp;L</div>
            <div style="display:flex;gap:3px">
              <button class="period-btn ${pnlPeriod==='MTD'?'active':''}" onclick="setPnlPeriod('MTD')">MTD</button>
              <button class="period-btn ${pnlPeriod==='YTD'?'active':''}" onclick="setPnlPeriod('YTD')">YTD</button>
              <button class="period-btn ${pnlPeriod==='ALL'?'active':''}" onclick="setPnlPeriod('ALL')">All</button>
            </div>
          </div>
          <div class="value ${pnlClass(realizedPnl)}">${journal.length > 0 ? fmtPnl(realizedPnl) : '--'}</div>
          ${journal.length > 0 && realizedPct !== null ? `<div style="font-size:11px;font-family:var(--mono);color:${realizedPnl>=0?'var(--green)':'var(--red)'};margin-top:2px">${fmtPct(realizedPct)} of starting capital</div>` : ''}
        </div>
      </div>

      ${renderSnapshot(trades, journal)}

      ${renderGainBlocks(journal, startEquity)}

      <div class="section-header"><h2>Core ETFs & Diversifiers</h2><span class="count">${PERMANENT_TICKERS.length} tickers</span></div>
      ${renderSignalTable(PERMANENT_TICKERS)}
      ${renderSignalGrid(PERMANENT_TICKERS)}

      ${state.customTickers.length > 0 ? `
        <div class="section-header">
          <h2>Custom Watchlist</h2>
          <span class="count">${state.customTickers.length} tickers</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          ${state.customTickers.map(t => `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--card-border);border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;font-family:var(--mono)">${t}<button onclick="event.stopPropagation();removeCustomTicker('${t}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:0 2px" title="Remove">&times;</button></span>`).join('')}
        </div>
        ${renderSignalTable(state.customTickers)}
        ${renderSignalGrid(state.customTickers)}
      ` : ''}

      <div class="section-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <h2 style="margin:0">Stock Market Leaders</h2>
        <div style="display:flex;align-items:center;gap:8px">
          ${(() => { try { const s=JSON.parse(localStorage.getItem('tp_screener')||'{}'); if(s.timestamp){ const h=Math.round((Date.now()-s.timestamp)/3600000); return `<span style="font-size:11px;color:var(--text3)">${state.screenerResults.length} qualifying · ${state.screenerResults.filter(r=>r.trendDir==='LONG').length} LONG · updated ${h===0?'just now':h+'h ago'}</span>`; } } catch(_){} return ''; })()}
          <button onclick="runScreener()" ${state.screenerRunning ? 'disabled' : ''} title="${state.screenerRunning ? 'Scanning...' : 'Refresh screener'}" onmouseover="if(!this.disabled)this.style.cssText=this.style.cssText.replace('color:var(--text3)','color:var(--text)').replace('border:1.5px solid var(--card-border)','border:1.5px solid var(--text3)')" onmouseout="if(!this.disabled)this.style.cssText=this.style.cssText.replace('color:var(--text)','color:var(--text3)').replace('border:1.5px solid var(--text3)','border:1.5px solid var(--card-border)')" style="background:transparent;border:1.5px solid var(--card-border);color:var(--text3);border-radius:8px;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;font-size:15px;padding:0;${state.screenerRunning ? 'opacity:0.5;cursor:not-allowed;' : ''}">
            ${state.screenerRunning ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>'}
          </button>
        </div>
      </div>
      ${state.screenerRunning ? `<div class="screener-progress" style="margin-bottom:12px"><div class="fill" style="width:${state.screenerProgress}%"></div></div>` : ''}
      ${state.screenerResults.length > 0 ? renderScreenerTable() : '<div style="color:var(--text3);padding:12px;font-size:13px">CANSLIM results load automatically from the server each night. Click <strong>↻ Refresh</strong> to fetch the latest results now.</div>'}
    </div>
  `;
}

function renderScreenerProgress() {
  const el = document.querySelector('.screener-progress .fill');
  if (el) el.style.width = state.screenerProgress + '%';
}

function renderSignalTable(tickers) {
  // Build AT position lookup for next-add annotations
  const pk = getProfileKey();
  const atMap = {};
  (profiles[pk].atTrades || []).forEach(t => { atMap[t.ticker] = t; });

  let rows = '';
  tickers.forEach(ticker => {
    const d = state.tickerData[ticker];
    if (!d) {
      rows += `<tr onclick="navigateTo('chart',{ticker:'${ticker}'})"><td class="ticker-cell">${ticker}</td><td colspan="6" style="color:var(--text3)">Loading...</td></tr>`;
      return;
    }
    const chClass = d.change >= 0 ? 'up' : 'down';
    const sigClass = d.signal.toLowerCase();

    // Cross age urgency
    const days = d.daysSinceCross;
    let rowBg = '';
    let crossCellHtml = days != null ? days + 'd' : '--';
    if (days === 0) {
      rowBg = 'background:rgba(249,226,175,0.15);';
      crossCellHtml = '<strong style="color:#fab387">TODAY</strong>';
    } else if (days === 1) {
      rowBg = 'background:rgba(249,226,175,0.06);';
      crossCellHtml = '<span style="color:#fab387">1d</span>';
    }

    // Next-add annotation for open AT positions
    const at = atMap[ticker];
    let nextAddHtml = '';
    if (at) {
      const entryP = +at.entry_price, atr = +at.atr_at_entry, stopP = +at.stop_price;
      const nextAddPrice = entryP + atr;
      const riskPerShare = nextAddPrice - stopP;
      const nextAddShares = riskPerShare > 0 ? Math.floor(at.initial_dollar_risk / riskPerShare) : 0;
      const nextAddCost = nextAddShares * nextAddPrice;
      const dist = d.price ? ((nextAddPrice - d.price) / d.price * 100) : null;
      const distColor = dist !== null && dist <= 0 ? '#26a69a' : 'var(--text3)';
      nextAddHtml = `<div style="font-size:10px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="background:rgba(137,180,250,0.15);color:#89b4fa;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700">IN</span>
        <span>Next add <strong style="color:var(--text2);font-family:var(--mono)">$${fmt(nextAddPrice)}</strong></span>
        ${dist!==null?`<span style="color:${distColor}">${dist>0?'+':''}${dist.toFixed(1)}% away</span>`:''}
        ${nextAddCost>0?`<span>· <strong style="color:var(--text2);font-family:var(--mono)">~$${Math.round(nextAddCost).toLocaleString()}</strong> layer cost</span>`:''}
      </div>`;
    }

    rows += `<tr onclick="navigateTo('chart',{ticker:'${ticker}'})" style="${rowBg}">
      <td class="ticker-cell"><div class="ticker-logo-wrap">${tickerLogo(ticker)}<span>${ticker}${d.isNewCross ? ' <span style="background:linear-gradient(135deg,#fab387,#f9e2af);color:#1e1e2e;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:800">NEW</span>' : ''}</span></div>${nextAddHtml}</td>
      <td style="color:var(--text3);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name || ''}</td>
      <td class="price-cell">$${fmt(d.price)}</td>
      <td class="change-cell ${chClass}">${d.changePct>=0?'+':''}${d.changePct.toFixed(2)}%</td>
      <td class="ma-cell">${d.ma10!=null?d.ma10.toFixed(2):'--'}</td>
      <td class="ma-cell">${d.ma20!=null?d.ma20.toFixed(2):'--'}</td>
      <td><span class="signal-badge ${sigClass}">${d.signal}</span></td>
      <td style="font-size:12px;color:var(--text3)">${crossCellHtml}</td>
    </tr>`;
  });

  return `<div class="signal-table-wrap"><table class="signal-table">
    <thead><tr><th>Ticker</th><th>Name</th><th>Price</th><th>Day Change</th><th>MA10</th><th>MA20</th><th>Signal</th><th>Cross</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderSignalGrid(tickers) {
  let cards = '';
  tickers.forEach(ticker => {
    const d = state.tickerData[ticker];
    if (!d) {
      cards += `<div class="signal-card" onclick="navigateTo('chart',{ticker:'${ticker}'})"><div class="ticker-row"><span class="ticker">${ticker}</span></div><div style="color:var(--text3);font-size:13px">Loading...</div></div>`;
      return;
    }
    const sigClass = d.signal === 'LONG' ? 'long' : d.signal === 'SHORT' ? 'short' : '';

      ${d.isNewCross ? '<div class="new-cross-badge">NEW CROSS</div>' : ''}
      <div class="ticker-row"><div style="display:flex;align-items:center;gap:8px">${tickerLogo(ticker)}<span class="ticker">${ticker}</span></div><span class="signal-badge ${d.signal.toLowerCase()}">${d.signal}</span></div>
      <div class="name">${d.name || ticker}</div>
      <div class="price">$${fmt(d.price)}</div>
      <div class="change ${chClass}">${d.changePct>=0?'+':''}${d.changePct.toFixed(2)}%</div>
      <div class="ma-info">
        <div><div class="ma-label">MA10</div><div class="ma-val" style="color:#89b4fa">${d.ma10!=null?d.ma10.toFixed(2):'--'}</div></div>
        <div><div class="ma-label">MA20</div><div class="ma-val" style="color:#94e2d5">${d.ma20!=null?d.ma20.toFixed(2):'--'}</div></div>
      </div>
      <div class="days-since">${d.daysSinceCross!=null?'Last cross: '+d.daysSinceCross+' days ago':'No recent crossover'}</div>
    </div>`;
  });
  return `<div class="signal-grid">${cards}</div>`;
}

function renderScreenerTable() {
  let rows = '', cards = '';
  state.screenerResults.forEach(r => {
    const live = state.tickerData[r.ticker];
    const signal    = live?.signal     ?? r.trendDir ?? 'LONG';
    const crossDays = live?.daysSinceCross ?? r.trendDays;
    const isNewCross = crossDays === 0;
    const price     = live?.price      ?? r.price;
    const ma10      = live?.ma10       ?? r.ma10;
    const ma20      = live?.ma20       ?? r.ma20;
    const change    = live?.change;
    const changePct = live?.changePct;
    const name      = live?.name       || r.ticker;

    const sigClass = signal === 'LONG' ? 'long' : signal === 'SHORT' ? 'short' : '';
    const chClass  = change != null ? (change >= 0 ? 'up' : 'down') : '';
    const chStr    = change != null
      ? `${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%`
      : '--';
    let rowBg = '', crossCellHtml = crossDays != null ? crossDays + 'd' : '--';
    if (crossDays === 0) { rowBg = 'background:rgba(249,226,175,0.15);'; crossCellHtml = '<strong style="color:#fab387">TODAY</strong>'; }
    else if (crossDays === 1) { rowBg = 'background:rgba(249,226,175,0.06);'; crossCellHtml = '<span style="color:#fab387">1d</span>'; }

    // Desktop table row
    rows += `<tr onclick="navigateTo('chart',{ticker:'${r.ticker}'})" style="${rowBg}">
      <td class="ticker-cell"><div class="ticker-logo-wrap">${tickerLogo(r.ticker)}<span>${r.ticker}${isNewCross ? ' <span style="background:linear-gradient(135deg,#fab387,#f9e2af);color:#1e1e2e;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:800">NEW</span>' : ''}</span></div></td>
      <td style="color:var(--text3);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</td>
      <td class="price-cell">$${fmt(price)}</td>
      <td class="change-cell ${chClass}">${chStr}</td>
      <td class="ma-cell">${ma10 != null ? ma10.toFixed(2) : '--'}</td>
      <td class="ma-cell">${ma20 != null ? ma20.toFixed(2) : '--'}</td>
      <td><span class="signal-badge ${sigClass}">${signal}</span></td>
      <td style="font-size:12px;color:var(--text3)">${crossCellHtml}</td>
    </tr>`;

    // Mobile card
    cards += `<div class="signal-card ${sigClass}" onclick="navigateTo('chart',{ticker:'${r.ticker}'})">
      ${isNewCross ? '<div class="new-cross-badge">NEW CROSS</div>' : ''}
      <div class="ticker-row"><div style="display:flex;align-items:center;gap:8px">${tickerLogo(r.ticker)}<span class="ticker">${r.ticker}</span></div><span class="signal-badge ${sigClass}">${signal}</span></div>
      <div class="name">${name}</div>
      <div class="price">$${fmt(price)}</div>
      ${change != null ? `<div class="change ${chClass}">${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%</div>` : ''}
      <div class="ma-info">
        <div><div class="ma-label">MA10</div><div class="ma-val" style="color:#89b4fa">${ma10 != null ? ma10.toFixed(2) : '--'}</div></div>
        <div><div class="ma-label">MA20</div><div class="ma-val" style="color:#94e2d5">${ma20 != null ? ma20.toFixed(2) : '--'}</div></div>
      </div>
      <div class="days-since">${crossDays != null ? 'Last cross: ' + crossDays + ' days ago' : 'No recent crossover'}</div>
    </div>`;
  });

  return `
    <div class="signal-table-wrap"><table class="signal-table">
      <thead><tr><th>Ticker</th><th>Name</th><th>Price</th><th>Day Change</th><th>MA10</th><th>MA20</th><th>Signal</th><th>Cross</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="signal-grid">${cards}</div>`;
}

function removeCustomTicker(ticker) {
  state.customTickers = state.customTickers.filter(t => t !== ticker);
  saveCustomTickers();
  renderDashboard();
  showToast(`${ticker} removed from watchlist`);
}

function addCustomTicker(ticker) {
  if (!state.customTickers.includes(ticker)) {
    state.customTickers.push(ticker);
    saveCustomTickers();
    loadTickerData(ticker).then(() => renderDashboard());
    showToast(`${ticker} added to your watchlist`);
  }
}

// ─── EARNINGS FETCH ───
async function fetchEarnings(ticker) {
  if (!ticker) return []; // ETF or no-op
  const cacheKey = `tp_earnings_${ticker}`;
  const cached = fmpCacheGet(cacheKey, 86400000); // 24h cache
  if (cached) return cached;
  try {
    const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=calendarEvents,earningsHistory`;
    const data = await fetchYahoo(url);
    const result = data?.quoteSummary?.result?.[0];
    const earnings = [];
    // Future earnings date(s) from calendarEvents
    const cal = result?.calendarEvents?.earnings;
    if (cal?.earningsDate?.length > 0) {
      for (const e of cal.earningsDate) {
        if (e.raw) earnings.push({ timestamp: e.raw, isFuture: true });
      }
    }
    // Past earnings dates from earningsHistory
    const hist = result?.earningsHistory?.history;
    if (hist) {
      for (const e of hist) {
        if (e.quarter?.raw) earnings.push({ timestamp: e.quarter.raw, isFuture: false });
      }
    }
    fmpCacheSet(cacheKey, earnings);
    return earnings;
  } catch (_) { return []; }
}

async function lookupCalcTicker() {
  const input = document.getElementById('calcTicker');
  const ticker = (input.value || '').trim().toUpperCase();
  if (!ticker) { showToast('Enter a ticker symbol'); return; }
  input.value = ticker;
  showToast(`Looking up ${ticker}...`);
  const d = await loadTickerData(ticker);
  if (d && !d.error) {
    document.getElementById('calcEntry').value = d.price.toFixed(2);
    document.getElementById('calcATR').value = d.atr ? d.atr.toFixed(2) : '';
    state.calcPrefill = {ticker, entryPrice: d.price, atr: d.atr};
    showToast(`${ticker}: $${d.price.toFixed(2)} | ATR: ${d.atr ? d.atr.toFixed(2) : 'N/A'}`);
    updateCalc();
  } else {
    showToast(`Could not load data for ${ticker}`);
  }
}

function formatAccountSize(input) {
  const raw = input.value.replace(/[^0-9.]/g, '');
  const num = parseFloat(raw);
  if (!raw || isNaN(num)) return;
  const cursor = input.selectionStart;
  const oldLen = input.value.length;
  input.value = num.toLocaleString('en-US');
  const newLen = input.value.length;
  input.setSelectionRange(cursor + (newLen - oldLen), cursor + (newLen - oldLen));
}

function updateCalc() {
  const account = parseFloat((document.getElementById('calcAccount').value || '').replace(/,/g, ''));
  const entry = parseFloat(document.getElementById('calcEntry').value);
  const atr = parseFloat(document.getElementById('calcATR').value);

  if (!account || !entry || !atr) return;

  const stopDist = 3 * atr;
  const stopPrice = entry - stopDist;
  const dollarRisk = account * 0.005; // Target 0.5% risk
  const shares = Math.round((dollarRisk / stopDist) * 100) / 100; // 2 decimal places for fractional shares
  const invested = shares * entry;
  const actualRisk = (shares * stopDist);
  const riskPct = (actualRisk / account) * 100;
  const target2R = entry + 2 * stopDist;

  document.getElementById('calcStop').textContent = '$' + stopPrice.toFixed(2);
  document.getElementById('calcTarget2R').textContent = '$' + target2R.toFixed(2);
  document.getElementById('calcDollarRisk').textContent = '$' + actualRisk.toFixed(2);
  document.getElementById('calcShares').textContent = shares.toFixed(2) + ' shares';
  document.getElementById('calcInvested').textContent = '$' + fmt(invested);
  document.getElementById('calcRiskPct').textContent = riskPct.toFixed(2) + '%';

  let warnHtml = '';
  if (riskPct <= 0.5) {
    warnHtml = '<div class="risk-warning green">Risk is at or below 0.5% of account. Position sized correctly.</div>';
  } else if (riskPct <= 1.0) {
    warnHtml = '<div class="risk-warning yellow">Warning: Risk exceeds 0.5% of account (' + riskPct.toFixed(2) + '%)</div>';
  } else {
    warnHtml = '<div class="risk-warning red">Danger: Risk exceeds 1% of account (' + riskPct.toFixed(2) + '%). Reduce position size.</div>';
  }
  document.getElementById('calcWarning').innerHTML = warnHtml;

  // Store for trade confirmation
  state._calcResult = {stopPrice, stopDist, dollarRisk: actualRisk, shares, invested, riskPct, entry, atr, account};
}

function confirmTrade() {
  const r = state._calcResult;
  const pf = state.calcPrefill || {};
  if (!r || !r.shares) { showToast('Fill in all fields first'); return; }

  const tickerInput = document.getElementById('calcTicker');
  const ticker = (pf.ticker || (tickerInput && tickerInput.value) || prompt('Enter ticker symbol:'));
  if (!ticker) return;

  const pk = getProfileKey();
  const trade = {
    id: Date.now(),
    ticker: ticker.toUpperCase(),
    entryDate: new Date().toISOString().split('T')[0],
    entryPrice: r.entry,
    stopPrice: r.stopPrice,
    atr: r.atr,
    initialDollarRisk: r.dollarRisk,
    dollarRisk: r.dollarRisk,
    shares: r.shares,
    accountSize: r.account,
    riskPct: r.riskPct,
    pyramidLayers: [{
      layer: 1,
      triggerPrice: r.entry,
      shares: r.shares,
      status: 'FILLED'
    }],
    totalShares: r.shares
  };

  // Add pending pyramid layers (up to 10)
  for (let i = 2; i <= 10; i++) {
    const triggerPrice = r.entry + (i - 1) * r.atr;
    trade.pyramidLayers.push({
      layer: i,
      triggerPrice,
      shares: 0,
      status: i === 2 ? 'NEXT ADD' : 'PENDING'
    });
  }

  profiles[pk].trades = profiles[pk].trades || [];
  profiles[pk].trades.push(trade);
  saveProfiles(profiles);

  state.calcPrefill = null;
  state._calcResult = null;
  showToast(`Trade opened: ${trade.ticker} x${trade.shares} shares`);
  navigateTo('portfolio');
}
