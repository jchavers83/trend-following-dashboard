<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f6f9">
<meta name="apple-mobile-web-app-title" content="CrossPoint">
<title>CrossPoint</title>
<style>
:root {
  --bg: #f4f6f9;
  --bg2: #eaecf1;
  --card: rgba(255,255,255,0.72);
  --card-solid: #fff;
  --card-border: rgba(0,0,0,0.09);
  --text: #1e1e2e;
  --text2: #585b70;
  --text3: #9399b2;
  --blue: #89b4fa;
  --blue2: #74c7ec;
  --green: #a6e3a1;
  --green2: #94e2d5;
  --teal: #94e2d5;
  --red: #f38ba8;
  --amber: #f9e2af;
  --amber2: #fab387;
  --surface: rgba(255,255,255,0.55);
  --shadow: 0 2px 16px rgba(30,30,46,0.06);
  --shadow2: 0 4px 24px rgba(30,30,46,0.10);
  --radius: 8px;
  --radius-sm: 5px;
  --mono: 'Inter','Trebuchet MS',-apple-system,sans-serif;
  --sans: 'Inter',-apple-system,BlinkMacSystemFont,'Trebuchet MS',Roboto,Ubuntu,sans-serif;
  --sidebar-w: 220px;
  --header-h: 56px;
  --botnav-h: 68px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #1e1e2e;
  --bg2: #181825;
  --card: rgba(49,50,68,0.72);
  --card-solid: #313244;
  --card-border: rgba(255,255,255,0.07);
  --text: #cdd6f4;
  --text2: #a6adc8;
  --text3: #6c7086;
  --surface: rgba(49,50,68,0.55);
  --shadow: 0 2px 16px rgba(0,0,0,0.18);
  --shadow2: 0 4px 24px rgba(0,0,0,0.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100%;overflow:hidden;transition:background var(--transition),color var(--transition);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:'cv01','cv02','cv03','cv04';letter-spacing:-0.01em;font-optical-sizing:auto}
#app{display:flex;height:100dvh;width:100%;position:relative}

/* Sidebar - Desktop */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--card-border);display:flex;flex-direction:column;z-index:100;transition:background var(--transition)}
.sidebar-logo{padding:20px 18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--card-border)}
.sidebar-logo svg{width:34px;height:34px;flex-shrink:0}
.sidebar-logo-text{display:flex;flex-direction:column;gap:0px}
.sidebar-logo-text .brand{font-size:20px;font-weight:800;letter-spacing:-0.4px;background:linear-gradient(135deg,#89b4fa 0%,#94e2d5 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.sidebar-logo-text .tagline{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:500;line-height:1}
.sidebar-profiles{padding:14px 14px 12px;border-bottom:1px solid var(--card-border)}
.sidebar-profiles label{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);display:block;margin-bottom:8px;font-weight:600}
.profile-btns{display:flex;gap:4px}
.profile-btn{flex:1;padding:7px 0;border:1px solid var(--card-border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--sans)}
.profile-btn.active{background:var(--card-solid);color:var(--text);border-color:var(--text3);font-weight:700}
.sidebar-section-label{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);font-weight:600;padding:12px 14px 4px}
.sidebar-nav{flex:1;padding:4px 10px 8px;display:flex;flex-direction:column;gap:1px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all var(--transition);border:none;background:none;width:100%;text-align:left;font-family:var(--sans)}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(137,180,250,0.12),rgba(148,226,213,0.06));color:var(--text);font-weight:600;box-shadow:inset 2px 0 0 #89b4fa}
.nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:0.7}
.nav-item.active svg{opacity:1;color:#89b4fa}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--card-border);font-size:11px;color:var(--text3)}
.market-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.market-dot.open{background:#a6e3a1}
.market-dot.closed{background:#f38ba8}

/* Main Content */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.header{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--card-border);background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;z-index:90}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.header-profiles{display:none}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all var(--transition)}
.icon-btn:hover{background:var(--blue);color:#1e1e2e;border-color:var(--blue)}
.refresh-spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}

/* Bottom Nav - Mobile */
.botnav{display:none;height:var(--botnav-h);background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--card-border);padding:0 4px env(safe-area-inset-bottom);z-index:100}
.botnav-inner{display:flex;height:100%;align-items:center}
.botnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 2px;border:none;background:none;color:var(--text3);font-size:10px;font-weight:500;cursor:pointer;transition:all var(--transition);font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.botnav-item.active{color:var(--text);font-weight:700}
.botnav-item svg{width:20px;height:20px}

/* Screen transitions */
.screen{display:none;animation:fadeIn 0.3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Summary Cards Row */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.snap-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;box-shadow:var(--shadow)}
.snap-section{padding:4px 0}
.snap-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);font-weight:600}
.snap-divider{height:1px;background:var(--card-border);margin:12px 0}
.snap-row{display:flex;gap:20px;flex-wrap:wrap}
.snap-regime-pill{font-size:12px;font-weight:700;font-family:var(--mono);padding:3px 9px;border-radius:20px;letter-spacing:0.5px}
.snap-regime-pill.long{background:rgba(64,160,43,0.15);color:#40a02b;border:1px solid rgba(64,160,43,0.3)}
.snap-regime-pill.short{background:rgba(210,15,57,0.12);color:#d20f39;border:1px solid rgba(210,15,57,0.25)}
.snap-regime-pill.neutral{background:var(--surface);color:var(--text3);border:1px solid var(--card-border)}
.snap-cross-pill{font-size:12px;font-weight:700;font-family:var(--mono);padding:3px 9px;border-radius:6px;letter-spacing:0.3px}
.snap-cross-pill.long{background:rgba(64,160,43,0.12);color:#40a02b;border:1px solid rgba(64,160,43,0.25)}
.snap-cross-pill.short{background:rgba(210,15,57,0.1);color:#d20f39;border:1px solid rgba(210,15,57,0.2)}
.period-btn{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid var(--card-border);background:var(--surface);color:var(--text3);cursor:pointer;font-family:var(--mono);transition:all .15s}
.period-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.snap-vdivider{width:1px;background:var(--card-border);align-self:stretch;flex-shrink:0;margin:0 4px}
.summary-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:all var(--transition)}
.summary-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:4px}
.summary-card .value{font-size:24px;font-weight:700;font-family:var(--mono)}
.summary-card .value.green{color:#40a02b}
.summary-card .value.red{color:#d20f39}
.summary-card .value.amber{color:#df8e1d}

/* Signal Cards Grid */
.signal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.signal-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:2px solid var(--card-border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.signal-card:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}
.signal-card.long{border-color:rgba(166,227,161,0.5)}
.signal-card.long::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#a6e3a1,#94e2d5)}
.signal-card.short{border-color:rgba(243,139,168,0.5)}
.signal-card.short::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f38ba8,#fab387)}
.signal-card .ticker-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.signal-card .ticker{font-size:18px;font-weight:800;font-family:var(--mono)}
.signal-card .name{font-size:11px;color:var(--text3);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.signal-card .price{font-size:22px;font-weight:700;font-family:var(--mono)}
.signal-card .change{font-size:13px;font-family:var(--mono);font-weight:600}
.signal-card .change.up{color:#40a02b}
.signal-card .change.down{color:#d20f39}
.signal-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.signal-badge.long{background:rgba(166,227,161,0.2);color:#40a02b}
.signal-badge.short{background:rgba(243,139,168,0.2);color:#d20f39}
.signal-badge.neutral{background:rgba(147,153,178,0.15);color:var(--text3)}
.new-cross-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#fab387,#f9e2af);color:#1e1e2e;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:0.5px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(249,226,175,0.5)}50%{box-shadow:0 0 12px 4px rgba(249,226,175,0.3)}}
.ma-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--card-border)}
.ma-info .ma-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.ma-info .ma-val{font-size:13px;font-family:var(--mono);font-weight:600}
.days-since{font-size:11px;color:var(--text3);margin-top:6px}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px}
.section-header h2{font-size:16px;font-weight:700}
.section-header .count{font-size:12px;color:var(--text3);font-family:var(--mono)}

/* Chart Screen */
.chart-header{display:flex;align-items:center;gap:16px;margin-bottom:8px;flex-wrap:wrap;min-height:72px;padding:10px 14px;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius)}
.chart-header .back-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0}
.chart-ticker-block{display:flex;flex-direction:column;flex-shrink:0}
.chart-ticker-block .chart-ticker{font-size:26px;font-weight:800;font-family:var(--mono);line-height:1.1}
.chart-ticker-block .chart-name{font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.chart-stats{display:flex;gap:20px;align-items:center;flex-wrap:wrap;flex:1;padding:0 8px;border-left:1px solid var(--card-border);border-right:1px solid var(--card-border)}
.chart-stat{display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.chart-stat .cs-label{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);font-weight:500;line-height:1}
.chart-stat .cs-val{font-size:16px;font-weight:600;font-family:var(--mono);line-height:1.2}
.chart-price-block{margin-left:auto;text-align:right;flex-shrink:0}
.chart-price-block .chart-price{font-size:26px;font-weight:700;font-family:var(--mono);line-height:1.1}
.chart-price-block .chart-day-chg{font-size:13px;font-weight:500}
.chart-container{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow)}
.chart-canvas-wrap{position:relative;width:100%;height:calc(100dvh - var(--header-h) - 180px);min-height:520px}
.chart-canvas-wrap canvas{width:100%;height:100%}
.chart-legend{display:flex;gap:12px;margin-top:8px;font-size:11px;align-items:center}
.chart-legend .legend-item{display:flex;align-items:center;gap:4px}
.chart-legend .legend-dot{width:10px;height:3px;border-radius:2px}
.chart-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.chart-info-card{background:var(--card);border:1px solid var(--card-border);border-left:3px solid var(--card-border);border-radius:var(--radius-sm);padding:8px 12px}
.chart-info-card .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
.chart-info-card .val{font-size:16px;font-weight:600;font-family:var(--mono);margin-top:2px;line-height:1.1}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--transition);font-family:var(--sans)}
.btn-primary{background:var(--blue);color:#1e1e2e}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-green{background:var(--green);color:#1e1e2e}
.btn-green:hover{filter:brightness(1.1)}
.btn-red{background:var(--red);color:#1e1e2e}
.btn-amber{background:var(--amber);color:#1e1e2e}
.btn-outline{background:transparent;border:1.5px solid var(--card-border);color:var(--text2)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:6px 12px;font-size:12px}

/* Calculator */
.calc-wrap{max-width:560px;margin:0 auto}
.calc-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--card-border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:15px;font-family:var(--mono);transition:border-color var(--transition);outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-group input[readonly]{opacity:0.7;cursor:default}
.form-group .hint{font-size:11px;color:var(--text3);margin-top:3px}
.calc-outputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.calc-output{background:var(--bg2);border-radius:var(--radius-sm);padding:12px}
.calc-output .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.calc-output .val{font-size:18px;font-weight:700;font-family:var(--mono);margin-top:2px}
.risk-warning{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin:12px 0}
.risk-warning.green{background:rgba(166,227,161,0.15);color:#40a02b;border:1px solid rgba(166,227,161,0.3)}
.risk-warning.yellow{background:rgba(249,226,175,0.15);color:#df8e1d;border:1px solid rgba(249,226,175,0.3)}
.risk-warning.red{background:rgba(243,139,168,0.15);color:#d20f39;border:1px solid rgba(243,139,168,0.3)}

/* Portfolio */
.trade-card{background:var(--card);border:2px solid rgba(166,227,161,0.3);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px;transition:all var(--transition)}
.trade-card .trade-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.trade-card .trade-ticker{font-size:20px;font-weight:800;font-family:var(--mono)}
.trade-card .trade-date{font-size:11px;color:var(--text3)}
.trade-card .trade-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.trade-card .stat{background:var(--bg2);border-radius:var(--radius-sm);padding:8px 10px}
.trade-card .stat .label{font-size:10px;color:var(--text3);text-transform:uppercase}
.trade-card .stat .val{font-size:14px;font-weight:700;font-family:var(--mono)}
.tighten-alert{background:linear-gradient(135deg,rgba(249,226,175,0.15),rgba(250,179,135,0.15));border:1.5px solid rgba(249,226,175,0.4);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-weight:700;color:#df8e1d;margin:10px 0;animation:pulse 2s ease-in-out infinite}
.pyramid-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.pyramid-table th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--card-border);font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:0.5px}
.pyramid-table td{padding:6px 8px;border-bottom:1px solid var(--card-border);font-family:var(--mono);font-size:12px}
.pyramid-table tr.next-add{background:rgba(249,226,175,0.1)}
.pyramid-status{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.pyramid-status.filled{background:rgba(166,227,161,0.2);color:#40a02b}
.pyramid-status.next{background:rgba(249,226,175,0.2);color:#df8e1d}
.pyramid-status.pending{background:rgba(147,153,178,0.1);color:var(--text3)}
.trade-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* Checklist */
.checklist-wrap{max-width:600px;margin:0 auto}
.checklist-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.checklist-ticker{text-align:center;margin-bottom:20px}
.checklist-ticker .ticker{font-size:24px;font-weight:800;font-family:var(--mono)}
.progress-bar{height:6px;background:var(--bg2);border-radius:3px;margin:16px 0;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:3px;transition:width 0.4s ease}
.checklist-items{list-style:none}
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--card-border);cursor:pointer;transition:background var(--transition);border-radius:var(--radius-sm);padding-left:8px;padding-right:8px}
.checklist-item:hover{background:var(--surface)}
.checklist-item .check-box{width:22px;height:22px;border:2px solid var(--card-border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--transition);margin-top:1px}
.checklist-item.checked .check-box{background:var(--green);border-color:var(--green)}
.checklist-item .check-text{font-size:14px;line-height:1.4;color:var(--text2)}
.checklist-item.checked .check-text{color:var(--text3);text-decoration:line-through}
.confirmed-banner{background:linear-gradient(135deg,var(--green),var(--teal));color:#1e1e2e;padding:16px 20px;border-radius:var(--radius);text-align:center;font-weight:700;font-size:15px;margin-top:20px;display:none}
.confirmed-banner.show{display:block;animation:fadeIn 0.5s ease}

/* Journal */
.journal-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.journal-stat{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px;text-align:center}
.journal-stat .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.journal-stat .val{font-size:20px;font-weight:700;font-family:var(--mono);margin-top:4px}
.journal-table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--shadow)}
.journal-table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
.journal-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--card-border);font-size:11px;text-transform:uppercase;color:var(--text3);letter-spacing:0.5px;cursor:pointer;white-space:nowrap;user-select:none}
.journal-table th:hover{color:var(--blue)}
.journal-table td{padding:10px 12px;border-bottom:1px solid var(--card-border);font-family:var(--mono);font-size:12px}
.journal-table tr:hover{background:var(--surface)}
.rules-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.rules-badge.yes{background:rgba(166,227,161,0.2);color:#40a02b}
.rules-badge.no{background:rgba(243,139,168,0.2);color:#d20f39}

/* Screener section */
.screener-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.screener-progress{height:4px;background:var(--bg2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.screener-progress .fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width 0.3s ease}
.screener-table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--shadow)}
.screener-table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
.screener-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--card-border);font-size:11px;text-transform:uppercase;color:var(--text3);letter-spacing:0.5px;white-space:nowrap}
.screener-table td{padding:8px 12px;border-bottom:1px solid var(--card-border);font-family:var(--mono);font-size:12px}
.screener-table tr:hover{background:var(--surface)}

/* Modal overlay */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card-solid);border-radius:var(--radius);padding:24px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow2)}
.modal h3{font-size:18px;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3)}
.loading-spinner{width:24px;height:24px;border:3px solid var(--card-border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card-solid);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:10px 18px;font-size:13px;font-weight:600;box-shadow:var(--shadow2);z-index:600;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}

/* Alert Banner */
.alert-banner{position:fixed;top:0;left:0;right:0;z-index:700;transform:translateY(-100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);pointer-events:none}
.alert-banner.show{transform:translateY(0);pointer-events:auto}
.alert-banner-inner{background:linear-gradient(135deg,#fab387,#f9e2af);color:#1e1e2e;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(250,179,135,0.3)}
.alert-banner-inner .alert-icon{font-size:20px;flex-shrink:0;animation:alertPulse 1s ease-in-out infinite alternate}
@keyframes alertPulse{from{transform:scale(1)}to{transform:scale(1.15)}}
.alert-banner-inner .alert-text{flex:1;font-weight:600;font-size:13px;line-height:1.4}
.alert-banner-inner .alert-text strong{font-weight:800;font-size:14px}
.alert-banner-inner .alert-dismiss{background:rgba(30,30,46,0.15);border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;color:#1e1e2e;font-family:var(--sans)}
.alert-banner-inner .alert-dismiss:hover{background:rgba(30,30,46,0.25)}
.alert-banner-inner .alert-view{background:#1e1e2e;color:#f9e2af;border:none;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans)}
/* IBKR Broker Connection */
.ibkr-section{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
.ibkr-section h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ibkr-status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ibkr-status-dot.connected{background:#26a69a;box-shadow:0 0 6px rgba(38,166,154,0.5)}
.ibkr-status-dot.disconnected{background:var(--text3)}
.ibkr-connect-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
.ibkr-connect-row .form-group{margin-bottom:0;flex:1;min-width:200px}
.ibkr-account-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:12px}
.ibkr-account-info .stat{background:var(--bg2);border-radius:var(--radius-sm);padding:10px}
.ibkr-account-info .stat .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.ibkr-account-info .stat .val{font-size:15px;font-weight:700;font-family:var(--mono);margin-top:2px}
.ibkr-badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:0.5px;background:rgba(137,180,250,0.2);color:var(--blue)}
.ibkr-pos-card{background:var(--card);border:2px solid rgba(137,180,250,0.3);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:10px}
.ibkr-pos-card .pos-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ibkr-pos-card .pos-ticker{font-size:18px;font-weight:800;font-family:var(--mono)}
.ibkr-pos-card .pos-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.ibkr-pos-card .stat{background:var(--bg2);border-radius:var(--radius-sm);padding:8px 10px}
.ibkr-pos-card .stat .label{font-size:10px;color:var(--text3);text-transform:uppercase}
.ibkr-pos-card .stat .val{font-size:13px;font-weight:700;font-family:var(--mono)}

.notif-dot{width:6px;height:6px;background:#f38ba8;border-radius:50%;position:absolute;top:6px;right:6px;display:none}
.notif-dot.show{display:block;animation:pulse 2s ease-in-out infinite}

/* Heat Gauge */
.heat-gauge{padding:10px 14px 12px;border-bottom:1px solid var(--card-border)}
.heat-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:10px;color:var(--text3)}
.heat-meta .heat-label{text-transform:uppercase;letter-spacing:1.1px;font-weight:600}
.heat-meta .heat-val{font-family:var(--mono);font-weight:700;font-size:11px}
.heat-track{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.heat-fill{height:100%;border-radius:3px;transition:width 0.4s ease,background 0.4s ease}

/* Signal count badge on nav */
.nav-signal-badge{display:inline-flex;align-items:center;gap:5px;margin-left:auto;font-size:10px;font-family:var(--mono);font-weight:700;line-height:1}
.nav-signal-badge .badge-long{color:#40a02b;display:inline-flex;align-items:center;gap:1px}
.nav-signal-badge .badge-short{color:#d20f39;display:inline-flex;align-items:center;gap:1px}

/* Bot status in footer */
.sidebar-footer-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.bot-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.bot-dot.active{background:#26a69a}
.bot-dot.offline{background:var(--text3)}
.bot-status-text{font-size:10px;color:var(--text3)}

/* Equity sparkline card */
.equity-sparkline-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .botnav{display:block}
  .header-profiles{display:flex;gap:4px}
  .header-profiles .profile-btn{padding:5px 10px;font-size:11px}
  .content{padding:14px}
  .summary-row{grid-template-columns:1fr 1fr}
  .signal-grid{grid-template-columns:1fr}
  .chart-canvas-wrap{height:calc(100dvh - var(--botnav-h) - 200px);min-height:380px}
  .chart-stats{gap:12px;border-left:none;border-right:none;padding:6px 0}
  .chart-header{flex-wrap:wrap;gap:10px}
  .calc-outputs{grid-template-columns:1fr}
  .journal-summary{grid-template-columns:1fr 1fr}
  .trade-card .trade-stats{grid-template-columns:1fr 1fr}
  .chart-info-grid{grid-template-columns:1fr 1fr}
  .toast{bottom:calc(var(--botnav-h) + 12px)}
}
@media(min-width:769px){
  .header-title-mobile{display:none}
}

/* Desktop signal table */
@media(min-width:769px){
  .signal-grid.table-mode{display:block}
  .signal-grid.table-mode .signal-card{display:none}
}
.signal-table-wrap{display:none;overflow-x:auto;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--shadow)}
@media(min-width:769px){
  .signal-table-wrap{display:block}
  .signal-grid{display:none}
}
@media(max-width:768px){
  .signal-table-wrap{display:none}
  .signal-grid{display:grid}
}
.signal-table{width:100%;border-collapse:collapse;font-size:13px}
.signal-table th{text-align:left;padding:6px 10px;border-bottom:2px solid var(--card-border);font-size:11px;text-transform:uppercase;color:var(--text3);letter-spacing:0.5px;white-space:nowrap}
.signal-table td{padding:8px 10px;border-bottom:1px solid var(--card-border)}
.signal-table tr{cursor:pointer;transition:background var(--transition)}
.signal-table tr:hover{background:var(--surface)}
.signal-table .ticker-cell{font-weight:700;font-family:var(--mono);font-size:14px;letter-spacing:-0.01em}
.ticker-logo{width:28px;height:28px;border-radius:50%;object-fit:contain;object-position:center;background:#fff;padding:2px;border:1px solid var(--card-border);flex-shrink:0}
.ticker-logo-wrap{display:flex;align-items:center;gap:8px}
.logo-fallback{width:28px;height:28px;border-radius:50%;background:var(--surface);border:1px solid var(--card-border);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.signal-table .price-cell{font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums}
.signal-table .change-cell{font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums}
.signal-table .change-cell.up{color:#40a02b}
.signal-table .change-cell.down{color:#d20f39}
[style*="font-family:var(--mono)"],[class*="mono"]{font-variant-numeric:tabular-nums}
.signal-table .ma-cell{font-family:var(--mono);font-size:12px}

/* ── Portfolio Analytics ─────────────────────────────── */
.port-tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--bg2);border-radius:var(--radius);padding:4px}
.port-tab{flex:1;padding:8px 0;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--sans)}
.port-tab.active{background:var(--card-solid);color:var(--text);box-shadow:var(--shadow)}

.perf-hero{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px;scrollbar-width:none}
.perf-hero::-webkit-scrollbar{display:none}
.perf-stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:12px 16px;min-width:110px;flex-shrink:0;box-shadow:var(--shadow)}
.perf-stat-card .ps-label{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:5px;white-space:nowrap}
.perf-stat-card .ps-value{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1;white-space:nowrap}
.perf-stat-card .ps-value.pos{color:#26a69a}
.perf-stat-card .ps-value.neg{color:#ef5350}
.perf-stat-card .ps-value.neutral{color:var(--text)}

.perf-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.perf-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.perf-card-header h3{font-size:14px;font-weight:700;color:var(--text)}
.period-toggles{display:flex;gap:3px}
.period-btn{padding:3px 8px;border:1px solid var(--card-border);border-radius:4px;background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all var(--transition)}
.period-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.period-btn:hover:not(.active){color:var(--text);border-color:var(--text3)}

.perf-two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){.perf-two-col{grid-template-columns:1fr}}

.perf-kv-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.perf-kv-list li{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:6px 0;border-bottom:1px solid var(--card-border)}
.perf-kv-list li:last-child{border-bottom:none}
.perf-kv-list .pk-label{color:var(--text2)}
.perf-kv-list .pk-val{font-family:var(--mono);font-weight:700}
.perf-kv-list .pk-val.pos{color:#26a69a}
.perf-kv-list .pk-val.neg{color:#ef5350}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar (Desktop) -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 32 32" fill="none">
        <!-- Dark badge background -->
        <rect width="32" height="32" rx="7" fill="#1a2540"/>
        <!-- MA10 — blue -->
        <path d="M4 22L11 13L17 18L28 7" stroke="#89b4fa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- MA20 — teal -->
        <path d="M4 11L11 20L17 15L28 25" stroke="#94e2d5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Crossover glow ring -->
        <circle cx="17" cy="16.5" r="4.5" fill="white" opacity="0.1"/>
        <!-- Crossover point -->
        <circle cx="17" cy="16.5" r="2.5" fill="white"/>
      </svg>
      <div class="sidebar-logo-text">
        <span class="brand">CrossPoint</span>
        <span class="tagline">Trend Following</span>
      </div>
    </div>
    <div class="sidebar-profiles">
      <label>Trader Profile</label>
      <div class="profile-btns" id="sidebarProfiles"></div>
    </div>
    <div id="heatGaugeContainer"></div>
    <div class="sidebar-section-label">Navigation</div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-footer">
      <div class="sidebar-footer-row">
        <div><span class="market-dot" id="marketDot"></span><span id="marketStatus">Market Closed</span></div>
        <div id="botStatusWidget" class="bot-status-text"></div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <header class="header">
      <div class="header-left">
        <span class="header-title header-title-mobile" style="background:linear-gradient(135deg,#89b4fa,#94e2d5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">CrossPoint</span>
        <div class="header-profiles" id="headerProfiles"></div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="notifBtn" title="Enable notifications" style="position:relative" onclick="toggleNotifications()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot" id="notifDot"></span>
        </button>
        <button class="icon-btn" id="refreshBtn" title="Refresh data">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
        <button class="icon-btn" id="themeBtn" title="Toggle dark mode">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Screens injected by JS -->
    </div>

    <!-- Bottom Nav (Mobile) -->
    <nav class="botnav">
      <div class="botnav-inner" id="botNav"></div>
    </nav>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>
<div class="toast" id="toast"></div>
<div class="alert-banner" id="alertBanner">
  <div class="alert-banner-inner">
    <span class="alert-icon">&#9888;</span>
    <div class="alert-text" id="alertText"></div>
    <button class="alert-view" id="alertView" onclick="viewAlertTicker()">View</button>
    <button class="alert-dismiss" onclick="dismissAlert()">Dismiss</button>
  </div>
</div>

<script>
/* ======================================
   CrossPoint
   Single-file trading system app
   ====================================== */

// ─── CONSTANTS ───
const PROFILES = ['Josh','Nehemiah','Levi'];
const CORE_TICKERS = ['QQQ','SPY','DIA','IWM'];
const DIVERSIFIERS = ['IBIT','USO','SLV','GLD','CPER','PPLT'];
const PERMANENT_TICKERS = [...CORE_TICKERS, ...DIVERSIFIERS];

const SCREENS = [
  {id:'dashboard',label:'Signals',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>'},
  {id:'positions',label:'Positions',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'},

// ─── YAHOO FINANCE API ───
async function fetchWithTimeout(url, timeoutMs = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(url, {signal: controller.signal, headers:{'Accept':'application/json'}});
    clearTimeout(timer);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

async function fetchYahoo(url) {
  try {
    return await fetchWithTimeout(CORS_PROXY + encodeURIComponent(url), 8000);
  } catch(e) {
    try {
      return await fetchWithTimeout('https://api.allorigins.win/raw?url=' + encodeURIComponent(url), 8000);
    } catch(e2) {
      return null;
    }
  }
}

async function fetchChartData(ticker, range='1y', interval='1d') {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=${range}&interval=${interval}&includePrePost=false`;
  const data = await fetchYahoo(url);
  if (!data || !data.chart || !data.chart.result || !data.chart.result[0]) return null;
  const r = data.chart.result[0];
  const q = r.indicators.quote[0];
  return {
    meta: r.meta,
    timestamps: r.timestamp || [],
    open: q.open || [],
    high: q.high || [],
    low: q.low || [],
    close: q.close || [],
    volume: q.volume || []
  };
}

async function fetchQuoteSummary(ticker) {
  const url = `https://query2.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=defaultKeyStatistics,financialData,incomeStatementHistoryQuarterly,earningsHistory`;
  return await fetchYahoo(url);
}

// ─── CALCULATIONS ───
function calcSMA(closes, period) {
  const valid = closes.filter(c => c != null);
  if (valid.length < period) return null;
  const slice = valid.slice(-period);
  return slice.reduce((a,b) => a+b, 0) / period;
}

function calcSMAArray(closes, period) {
  const result = [];
  for (let i = 0; i < closes.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    let sum = 0, count = 0;
    for (let j = i - period + 1; j <= i; j++) {
      if (closes[j] != null) { sum += closes[j]; count++; }
    }
    result.push(count === period ? sum / period : null);
  }
  return result;
}

function calcATR(highs, lows, closes, period=14) {
  if (highs.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < highs.length; i++) {
    if (highs[i]==null||lows[i]==null||closes[i-1]==null) continue;
    const tr = Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1]));
    trs.push(tr);
  }
  if (trs.length < period) return null;
  let atr = trs.slice(0, period).reduce((a,b)=>a+b,0) / period;
  for (let i = period; i < trs.length; i++) {
    atr = (atr * (period - 1) + trs[i]) / period;
  }
  return atr;
}

function findCrossovers(ma10Arr, ma20Arr, timestamps) {
  const crosses = [];
  for (let i = 1; i < ma10Arr.length; i++) {
    if (ma10Arr[i]==null||ma10Arr[i-1]==null||ma20Arr[i]==null||ma20Arr[i-1]==null) continue;
    const prevAbove = ma10Arr[i-1] > ma20Arr[i-1];
    const currAbove = ma10Arr[i] > ma20Arr[i];
    if (prevAbove !== currAbove) {
      crosses.push({index:i, timestamp:timestamps[i], type:currAbove?'bullish':'bearish'});
    }
  }
  return crosses;
}

function getSignalInfo(closes, timestamps) {
  const ma10Arr = calcSMAArray(closes, 10);
  const ma20Arr = calcSMAArray(closes, 20);
  const ma10 = ma10Arr[ma10Arr.length-1];
  const ma20 = ma20Arr[ma20Arr.length-1];
  const crosses = findCrossovers(ma10Arr, ma20Arr, timestamps);
  let signal = 'NEUTRAL', daysSinceCross = null, isNewCross = false;
  if (ma10 != null && ma20 != null) {
    signal = ma10 > ma20 ? 'LONG' : ma10 < ma20 ? 'SHORT' : 'NEUTRAL';
  }
  if (crosses.length > 0) {
    const last = crosses[crosses.length - 1];
    // Count trading days (bars) since last crossover, not calendar days
    // This matches TradingView's bar-based counting
    daysSinceCross = closes.length - 1 - last.index;
    const lastTs = last.timestamp * 1000;
    const today = new Date();
    const crossDate = new Date(lastTs);
    isNewCross = crossDate.toDateString() === today.toDateString() || daysSinceCross === 0;
  }
  return {ma10, ma20, signal, daysSinceCross, isNewCross, ma10Arr, ma20Arr, crosses};
}

// ─── DATA MANAGEMENT ───
async function loadTickerData(ticker) {
  const cached = state.tickerData[ticker];
  if (cached && Date.now() - cached.fetchedAt < 600000) return cached; // 10 min cache

  const chart = await fetchChartData(ticker);
  if (!chart) {
    // Return cached even if stale, or create placeholder
    return cached || {ticker, error:true, price:0, change:0, changePct:0, signal:'NEUTRAL',ma10:null,ma20:null,daysSinceCross:null,isNewCross:false,atr:null,fetchedAt:Date.now()};
  }

  const closes = chart.close;
  const price = chart.meta.regularMarketPrice || closes[closes.length-1] || 0;
  // Use previousClose (yesterday's close) for daily change, NOT chartPreviousClose (start of chart range)
  const validCloses = closes.filter(c => c != null);
  const prevClose = chart.meta.previousClose || (validCloses.length >= 2 ? validCloses[validCloses.length - 2] : price);
  const change = price - prevClose;
  const changePct = prevClose ? (change / prevClose) * 100 : 0;
  const name = TICKER_NAMES[ticker] || chart.meta.shortName || chart.meta.symbol || ticker;

  const sigInfo = getSignalInfo(closes, chart.timestamps);
  const atr = calcATR(chart.high, chart.low, closes, 14);

  const result = {
    ticker, name, price, change, changePct, ...sigInfo, atr,
    closes, opens: chart.open, highs: chart.high, lows: chart.low,
    timestamps: chart.timestamps, volumes: chart.volume,
    fetchedAt: Date.now()
  };
  state.tickerData[ticker] = result;
  saveTickerCache();
  return result;
}

function fmpCacheGet(key, maxAge) {

    return d.data;

function fmpCacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch (_) {}
}

// Fetch EPS growth, revenue growth, ROE TTM, operating margin TTM
// Primary: Yahoo Finance quoteSummary (free, reliable for these 4 metrics)
// Fallback: FMP income statement + ratios (requires paid FMP plan)
async function fetchFMPFundamentals(ticker) {
  const cacheKey = `tp_fmp_fund_${ticker}`;
  const cached = fmpCacheGet(cacheKey, 86400000); // 24h cache
  if (cached) return cached;

  // ── Primary: Yahoo Finance quoteSummary ──────────────────────────────
  try {
    const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=financialData,defaultKeyStatistics`;
    const data = await fetchYahoo(url);
    const fd = data?.quoteSummary?.result?.[0]?.financialData;
    const ks = data?.quoteSummary?.result?.[0]?.defaultKeyStatistics;
    if (fd) {
      const result = {
        epsGrowth:       fd.earningsGrowth?.raw       ?? ks?.earningsQuarterlyGrowth?.raw ?? null,
        revenueGrowth:   fd.revenueGrowth?.raw         ?? null,
        roe:             fd.returnOnEquity?.raw         ?? null,
        operatingMargin: fd.operatingMargins?.raw       ?? null,
      };
      if (result.epsGrowth != null || result.revenueGrowth != null) {
        fmpCacheSet(cacheKey, result);
        return result;
      }
    }
  } catch(e) {
    console.warn(`[Screener] Yahoo fundamentals failed for ${ticker}:`, e.message);
  }

  // ── Fallback: FMP (requires paid plan) ──────────────────────────────
  try {
    const [incomeResp, ratiosResp] = await Promise.all([
      fetch(`https://financialmodelingprep.com/api/v3/income-statement/${ticker}?period=quarter&limit=8&apikey=${FMP_KEY}`),
      fetch(`https://financialmodelingprep.com/api/v3/ratios-ttm/${ticker}?apikey=${FMP_KEY}`)
    ]);
    const income = await incomeResp.json();
    const ratios = await ratiosResp.json();
    if (Array.isArray(income) && income.length >= 5) {
      const recentEPS = income[0]?.eps ?? null, yearAgoEPS = income[4]?.eps ?? null;
      const recentRev = income[0]?.revenue ?? null, yearAgoRev = income[4]?.revenue ?? null;
      const r = Array.isArray(ratios) ? ratios[0] : ratios;
      const result = {
        epsGrowth:       (recentEPS != null && yearAgoEPS && yearAgoEPS !== 0) ? (recentEPS - yearAgoEPS) / Math.abs(yearAgoEPS) : null,
        revenueGrowth:   (recentRev != null && yearAgoRev && yearAgoRev !== 0) ? (recentRev - yearAgoRev) / Math.abs(yearAgoRev) : null,
        roe:             r?.returnOnEquityTTM        ?? null,
        operatingMargin: r?.operatingProfitMarginTTM ?? null,
      };
      fmpCacheSet(cacheKey, result);
      return result;
    }
  } catch(e) {
    console.warn(`[Screener] FMP fundamentals failed for ${ticker}:`, e.message);
  }

  return null;
}

async function fetchQuickScreen(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=1y&interval=1d&includePrePost=false`;
  const data = await fetchYahoo(url);
  if (!data?.chart?.result?.[0]) return null;
  const r = data.chart.result[0];
  const q = r.indicators.quote[0];
  const closes = (q.close || []).filter(c => c != null);
  const volumes = (q.volume || []).filter(v => v != null);
  if (closes.length < 60) return null;

  const ma10Arr = calcSMAArray(closes, 10);
  const ma20Arr = calcSMAArray(closes, 20);
  const ma10 = ma10Arr[ma10Arr.length - 1];
  const ma20 = ma20Arr[ma20Arr.length - 1];
  const trendDir = (ma10 != null && ma20 != null) ? (ma10 > ma20 ? 'LONG' : 'SHORT') : 'NEUTRAL';
  let trendDays = 0;
  for (let i = ma10Arr.length - 1; i > 0; i--) {
    if (!ma10Arr[i] || !ma10Arr[i-1] || !ma20Arr[i] || !ma20Arr[i-1]) break;
    if ((ma10Arr[i] > ma20Arr[i]) !== (ma10Arr[i-1] > ma20Arr[i-1])) break;
    trendDays++;
  }
  const highs = (q.high || []).filter(h => h != null);
  const lows = (q.low || []).filter(l => l != null);
  const atr = calcATR(highs, lows, closes, 14);

  // 6-month performance (approx 126 trading days)
  const perf6m = closes.length >= 126
    ? ((closes[closes.length-1] - closes[closes.length-126]) / closes[closes.length-126]) * 100
    : ((closes[closes.length-1] - closes[0]) / closes[0]) * 100;

  // 30-day average volume
  const avgVol = volumes.length >= 30
    ? volumes.slice(-30).reduce((a,b) => a+b, 0) / 30
    : volumes.reduce((a,b) => a+b, 0) / Math.max(volumes.length, 1);

  return {
    ticker,
    price: r.meta.regularMarketPrice || closes[closes.length - 1],
    marketCap: r.meta.marketCap || 0,
    trendDir, trendDays, atr, perf6m, avgVol,
    ts: Date.now()
  };
}

async function runScreener() {
  if (state.screenerRunning) return;
  state.screenerRunning = true;
  if (state.activeScreen === 'dashboard') renderDashboard();

  const result = await loadVPSScreener();

  if (result) {
    const ageH = result.updatedAt
      ? (Date.now() - new Date(result.updatedAt).getTime()) / 3600000
      : 24;
    const longCount = state.screenerResults.filter(r => r.trendDir === 'LONG').length;
    showToast(`${state.screenerResults.length} qualifying (${longCount} LONG) · last scan ${ageH < 1 ? 'just now' : Math.round(ageH) + 'h ago'}`);

    // If results are stale (> 6h), trigger a fresh server-side scan in background
    if (ageH > 6) {
      try {
        await fetch(AT_API + '/api/screener/run', { method: 'POST', signal: AbortSignal.timeout(5000) });
        showToast('Server scan triggered — fresh results in ~5 min');
      } catch(_) {}
    }
  } else {
    // No results yet — trigger a run on VPS
    try {
      const runResp = await fetch(AT_API + '/api/screener/run', { method: 'POST', signal: AbortSignal.timeout(8000) });
      const runData = await runResp.json();
      showToast(runData.ok
        ? (runData.running ? '⏳ Screener already running on server...' : '🔍 Server scan started (~5 min). Results will load automatically.')
        : 'Could not start screener on server.');
    } catch(e) {
      showToast('Could not connect to VPS. Screener runs automatically each night.', 'warn');
    }
  }

  state.screenerRunning = false;
  if (state.activeScreen === 'dashboard') renderDashboard();
}

  console.log(`[Screener] Complete fundamental data for ${withData.length}/${toCheck.length} stocks`);

  // ── Phase 4: All 7 criteria — strict AND logic, missing data = excluded ──
  const qualified = [];
  for (const ticker of toCheck) {
    const tech = cache[ticker];

    const f = fmpCacheGet(`tp_fmp_fund_${ticker}`, 86400000);
    if (!f) { console.log(`[Filter] ${ticker}: no fundamental data`); continue; }

    const { epsGrowth, revenueGrowth, roe, operatingMargin } = f;

    // All 7 criteria must pass — null data means excluded
    if (epsGrowth       == null || epsGrowth       < 0.50) continue; // EPS dil growth Qtrly YoY > 50%
    if (revenueGrowth   == null || revenueGrowth   < 0.25) continue; // Revenue growth Qtrly YoY > 25%

    if (operatingMargin == null || operatingMargin < 0)    continue; // Operating margin TTM > 0%

    qualified.push({ ticker, price: tech.price, trendDir: tech.trendDir, trendDays: tech.trendDays, atr: tech.atr, perf6m: tech.perf6m, epsGrowth, revenueGrowth, roe, operatingMargin });
  }

  // LONG signals first, then by trendDays ascending (freshest crosses first), then EPS growth descending
  qualified.sort((a, b) => {
    if (a.trendDir === 'LONG' && b.trendDir !== 'LONG') return -1;
    if (b.trendDir === 'LONG' && a.trendDir !== 'LONG') return 1;
    if (a.trendDir === 'LONG' && b.trendDir === 'LONG') return (a.trendDays ?? 999) - (b.trendDays ?? 999);
    return b.epsGrowth - a.epsGrowth;
  });

  state.screenerResults = qualified; // All qualifying stocks — no cap
  state.screenerRunning = false;
  state.screenerProgress = 100;

  localStorage.setItem('tp_screener', JSON.stringify({ results: state.screenerResults, timestamp: Date.now() }));

  if (state.activeScreen === 'dashboard') renderDashboard();
  showToast(`CANSLIM screen complete — ${qualified.length} qualify`);

// ─── MARKET STATUS ───
function isMarketOpen() {
  const now = new Date();
  const ny = new Date(now.toLocaleString('en-US', {timeZone: 'America/New_York'}));
  const day = ny.getDay();
  if (day === 0 || day === 6) return false;
  const h = ny.getHours(), m = ny.getMinutes();
  const mins = h * 60 + m;
  return mins >= 570 && mins <= 960; // 9:30 AM - 4:00 PM ET
}
