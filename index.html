function getClosedTrades(pk) {
  return (profiles[pk].journal || []).filter(t => t.exitDate && t.pnl != null);
}

function calcInitialRisk(trade) {
  // journal entries store initialDollarRisk if set, else derive from prices
  if (trade.initialDollarRisk) return trade.initialDollarRisk;
  // fallback: not available in journal entry — use a sentinel
  return null;
}

function calcRMultiple(trade) {
  if (trade.rMultiple != null) return trade.rMultiple;
  return null;
}

function filterByPeriod(trades, period) {
  if (period === 'ALL') return trades;
  const now = new Date();
  const cutoff = new Date();
  if (period === '1M') cutoff.setMonth(now.getMonth() - 1);
  else if (period === '3M') cutoff.setMonth(now.getMonth() - 3);
  else if (period === '6M') cutoff.setMonth(now.getMonth() - 6);
  else if (period === 'YTD') cutoff.setMonth(0, 1);
  else if (period === '1Y') cutoff.setFullYear(now.getFullYear() - 1);
  const cutStr = cutoff.toISOString().split('T')[0];
  return trades.filter(t => t.exitDate >= cutStr);
}

function buildEquityPoints(trades, startEquity) {
  const sorted = [...trades].sort((a,b) => a.exitDate.localeCompare(b.exitDate));
  const points = [{date:'', equity:startEquity, pnl:0}];
  let eq = startEquity;
  sorted.forEach(t => {
    eq += t.pnl;
    points.push({date:t.exitDate, equity:eq, pnl:t.pnl});
  });
  return points;
}

function computeDrawdown(points) {
  let peak = points[0].equity;
  return points.map(p => {
    if (p.equity > peak) peak = p.equity;
    const dd = peak > 0 ? (peak - p.equity) / peak * 100 : 0;
    return {date:p.date, equity:p.equity, dd, peak};
  });
}

function computePerfStats(closedTrades, startEquity) {
  const total = closedTrades.length;
  if (total === 0) return null;

  const totalPnl = closedTrades.reduce((s,t) => s + t.pnl, 0);
  const wins = closedTrades.filter(t => t.pnl > 0);
  const losses = closedTrades.filter(t => t.pnl <= 0);
  const winRate = total > 0 ? wins.length / total * 100 : 0;

  const avgWinR = wins.length > 0 ? wins.reduce((s,t) => s + (t.rMultiple || 0), 0) / wins.length : 0;
  const avgLossR = losses.length > 0 ? losses.reduce((s,t) => s + Math.abs(t.rMultiple || 0), 0) / losses.length : 0;
  const expectancy = (winRate/100) * avgWinR - ((100-winRate)/100) * avgLossR;

  const now = new Date();
  const curYear = now.getFullYear().toString();
  const curYM = curYear + '-' + String(now.getMonth()+1).padStart(2,'0');
  const ytdPnl = closedTrades.filter(t => t.exitDate && t.exitDate.startsWith(curYear)).reduce((s,t)=>s+t.pnl,0);
  const mtdPnl = closedTrades.filter(t => t.exitDate && t.exitDate.startsWith(curYM)).reduce((s,t)=>s+t.pnl,0);

  const allReturn = startEquity > 0 ? totalPnl / startEquity * 100 : 0;
  const ytdReturn = startEquity > 0 ? ytdPnl / startEquity * 100 : 0;
  const mtdReturn = startEquity > 0 ? mtdPnl / startEquity * 100 : 0;

  return {total, totalPnl, winRate, expectancy, allReturn, ytdReturn, mtdReturn, avgWinR, avgLossR};
}

// ── Equity Curve Canvas ─────────────────────────────────────────

function drawEquityCurve() {
  const canvas = document.getElementById('canvasEquityCurve');
  if (!canvas) return;
  const pk = getProfileKey();
  const startEquity = profiles[pk].accountEquity || 100000;
  const allClosed = getClosedTrades(pk);
  const filtered = filterByPeriod(allClosed, state.equityPeriod);

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || canvas.parentElement.offsetWidth || 600;
  const h = canvas.offsetHeight || 520;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const isDark = state.darkMode;
  ctx.fillStyle = isDark ? '#1e1e2e' : '#ffffff';
  ctx.fillRect(0, 0, w, h);

  if (filtered.length < 1) {
    ctx.fillStyle = isDark ? '#585b70' : '#9399b2';
    ctx.font = '14px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No trade history yet', w/2, h/2);
    return;
  }

  const points = buildEquityPoints(filtered, startEquity);

  const padTop = 20, padRight = 72, padBottom = 32, padLeft = 14;
  const plotH = h - padTop - padBottom;
  const plotW = w - padLeft - padRight;

  const equities = points.map(p => p.equity);
  const minEq = Math.min(...equities);
  const maxEq = Math.max(...equities);
  // Add a little breathing room above and below the line
  const padding = (maxEq - minEq) * 0.08 || startEquity * 0.01;
  const lo = minEq - padding;
  const hi = maxEq + padding;
  const eqRange = hi - lo;

  const finalEq = equities[equities.length - 1];
  const isUp = finalEq >= startEquity;
  const lineColor = isUp ? '#26a69a' : '#ef5350';

  const toX = i  => padLeft + (i / (points.length - 1 || 1)) * plotW;
  const toY = v  => padTop  + plotH - ((v - lo) / eqRange) * plotH;

  // ── Grid lines ──────────────────────────────────────────────
  const gridSteps = 5;
  ctx.lineWidth = 1;
  for (let i = 0; i <= gridSteps; i++) {
    const v = lo + (eqRange / gridSteps) * i;
    const y = toY(v);
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
    ctx.beginPath(); ctx.moveTo(padLeft, y); ctx.lineTo(padLeft + plotW, y); ctx.stroke();
    ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
    ctx.font = '10px Inter, system-ui';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText('$' + (v >= 1000 ? (v/1000).toFixed(0) + 'k' : Math.round(v)), padLeft + plotW + 5, y);
  }

  // Starting equity reference line (dashed)
  const startY = toY(startEquity);
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.10)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(padLeft, startY); ctx.lineTo(padLeft + plotW, startY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = isDark ? '#6c7086' : '#aaa';
  ctx.font = '9px Inter, system-ui';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('Start $' + (startEquity/1000).toFixed(0) + 'k', padLeft + plotW + 5, startY);

  // ── Area fill ───────────────────────────────────────────────
  const grad = ctx.createLinearGradient(0, padTop, 0, padTop + plotH);
  if (isUp) {
    grad.addColorStop(0, 'rgba(38,166,154,0.20)');
    grad.addColorStop(1, 'rgba(38,166,154,0.02)');
  } else {
    grad.addColorStop(0, 'rgba(239,83,80,0.14)');
    grad.addColorStop(1, 'rgba(239,83,80,0.02)');
  }
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(points[0].equity));
  points.forEach((p,i) => { if (i>0) ctx.lineTo(toX(i), toY(p.equity)); });
  ctx.lineTo(toX(points.length-1), padTop + plotH);
  ctx.lineTo(toX(0), padTop + plotH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // ── Equity line ─────────────────────────────────────────────
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(points[0].equity));
  points.forEach((p,i) => { if (i>0) ctx.lineTo(toX(i), toY(p.equity)); });
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Final dot
  const lastX = toX(points.length - 1);
  const lastY = toY(finalEq);
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fillStyle = lineColor;
  ctx.fill();

  // ── X-axis date labels ──────────────────────────────────────
  const labelEvery = Math.max(1, Math.floor(points.length / 6));
  ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
  ctx.font = '10px Inter, system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  for (let i = 0; i < points.length; i += labelEvery) {
    if (!points[i].date) continue;
    const d = new Date(points[i].date + 'T12:00:00');
    const lbl = (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(2);
    ctx.fillText(lbl, toX(i), padTop + plotH + 6);
  }
  // Always label the last point
  if (points[points.length-1].date) {
    const d = new Date(points[points.length-1].date + 'T12:00:00');
    const lbl = (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(2);
    ctx.fillText(lbl, toX(points.length-1), padTop + plotH + 6);
  }

  // ── Store state for hover ────────────────────────────────────
  canvas._eqPoints  = points;
  canvas._startEq   = startEquity;
  canvas._toX       = toX;
  canvas._toY       = toY;
  canvas._padTop    = padTop;
  canvas._plotH     = plotH;
  canvas._plotW     = plotW;
  canvas._padLeft   = padLeft;
}

function setupEquityHover() {
  const canvas = document.getElementById('canvasEquityCurve');
  if (!canvas) return;
  const tooltip = document.getElementById('tooltipEquity');

  canvas.addEventListener('mousemove', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const points   = canvas._eqPoints;
    const startEq  = canvas._startEq;
    const toX      = canvas._toX;
    const toY      = canvas._toY;
    if (!points || points.length < 2) return;

    const plotW  = canvas._plotW;
    const padLeft = canvas._padLeft;
    const idx = Math.max(0, Math.min(points.length - 1,
      Math.round((mx - padLeft) / (plotW / (points.length - 1)))));
    const p = points[idx];
    if (!p) return;

    // Draw crosshair on canvas
    const ctx = canvas.getContext('2d');
    // Re-draw only the crosshair — cheap because canvas already rendered
    drawEquityCurve();
    const cx = toX(idx);
    const cy = toY(p.equity);
    ctx.save();
    ctx.setLineDash([3, 3]);
    ctx.strokeStyle = 'rgba(150,150,150,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, canvas._padTop); ctx.lineTo(cx, canvas._padTop + canvas._plotH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fillStyle = p.equity >= startEq ? '#26a69a' : '#ef5350';
    ctx.fill();
    ctx.restore();

    if (tooltip) {
      const totalGain = p.equity - startEq;
      const totalPct  = startEq > 0 ? (totalGain / startEq) * 100 : 0;
      const gainColor = totalGain >= 0 ? '#26a69a' : '#ef5350';
      const sign      = totalGain >= 0 ? '+' : '';

      // Format date
      let dateLabel = 'Start';
      if (p.date) {
        const d = new Date(p.date + 'T12:00:00');
        dateLabel = (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(2);
      }

      tooltip.style.left  = Math.min(mx + 14, rect.width - 155) + 'px';
      tooltip.style.top   = Math.max(canvas._padTop, my - 60) + 'px';
      tooltip.style.display = 'block';
      tooltip.innerHTML = `
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">${dateLabel}</div>
        <div style="display:flex;justify-content:space-between;gap:16px;margin-bottom:2px">
          <span style="font-size:11px;color:var(--text3)">Started</span>
          <span style="font-family:var(--mono);font-weight:600">$${startEq.toLocaleString('en-US',{maximumFractionDigits:0})}</span>
        </div>
        <div style="display:flex;justify-content:space-between;gap:16px;margin-bottom:2px">
          <span style="font-size:11px;color:var(--text3)">Value</span>
          <span style="font-family:var(--mono);font-weight:700">$${p.equity.toLocaleString('en-US',{maximumFractionDigits:0})}</span>
        </div>
        <div style="display:flex;justify-content:space-between;gap:16px;border-top:1px solid var(--card-border);margin-top:4px;padding-top:4px">
          <span style="font-size:11px;color:var(--text3)">Total gain</span>
          <span style="font-family:var(--mono);font-weight:700;color:${gainColor}">${sign}$${Math.abs(totalGain).toLocaleString('en-US',{maximumFractionDigits:0})} (${sign}${totalPct.toFixed(1)}%)</span>
        </div>`;
    }
  });

  canvas.addEventListener('mouseleave', function() {
    if (tooltip) tooltip.style.display = 'none';
    drawEquityCurve(); // restore clean canvas
  });
}

// ── Monthly Heatmap Canvas ──────────────────────────────────────

function drawMonthlyHeatmap() {
  const canvas = document.getElementById('canvasMonthlyHeatmap');
  if (!canvas) return;
  const pk = getProfileKey();
  const startEquity = profiles[pk].accountEquity || 100000;
  const closedTrades = getClosedTrades(pk);

  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Group by year-month
  const monthMap = {}; // {2024: {0:pnl, 1:pnl, ...}}
  closedTrades.forEach(t => {
    if (!t.exitDate) return;
    const d = new Date(t.exitDate + 'T12:00:00');
    const y = d.getFullYear();
    const m = d.getMonth();
    if (!monthMap[y]) monthMap[y] = {};
    monthMap[y][m] = (monthMap[y][m] || 0) + t.pnl;
  });

  const years = Object.keys(monthMap).map(Number).sort();
  const numYears = years.length;

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || canvas.parentElement.offsetWidth || 600;
  const cellH = 34;
  const topPad = 22;
  const leftPad = 38;
  const h = Math.max(80, topPad + numYears * cellH + 20);
  canvas.style.height = h + 'px';
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const isDark = state.darkMode;
  ctx.fillStyle = isDark ? '#1e1e2e' : '#ffffff';
  ctx.fillRect(0, 0, w, h);

  if (numYears === 0) {
    ctx.fillStyle = isDark ? '#585b70' : '#9399b2';
    ctx.font = '14px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No trade history yet', w/2, h/2);
    return;
  }

  const cellW = (w - leftPad - 8) / 12;

  // Month headers
  ctx.font = 'bold 10px Inter, system-ui';
  ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  months.forEach((m, mi) => {
    ctx.fillText(m, leftPad + mi * cellW + cellW/2, topPad/2 + 2);
  });

  function interpColor(pct, isPos) {
    // pct 0..1, isPos: green scale, else red scale
    if (isPos) {
      const r = Math.round(255 - (255-38) * pct);
      const g = Math.round(255 - (255-166) * pct);
      const b = Math.round(255 - (255-154) * pct);
      return `rgb(${r},${g},${b})`;
    } else {
      const r = Math.round(255 - (255-239) * pct);
      const g = Math.round(255 - (255-83) * pct);
      const b = Math.round(255 - (255-80) * pct);
      return `rgb(${r},${g},${b})`;
    }
  }

  // Find max absolute value for scaling
  let maxAbs = 0;
  years.forEach(y => {
    Object.values(monthMap[y]).forEach(v => { maxAbs = Math.max(maxAbs, Math.abs(v)); });
  });
  const refEq = startEquity || 100000;

  years.forEach((y, yi) => {
    const rowY = topPad + yi * cellH;
    // Year label
    ctx.font = 'bold 11px Inter, system-ui';
    ctx.fillStyle = isDark ? '#a6adc8' : '#585b70';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(y, leftPad - 4, rowY + cellH/2);

    months.forEach((_, mi) => {
      const cellX = leftPad + mi * cellW;
      const pnlVal = monthMap[y][mi];
      let bgColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';
      let textColor = isDark ? '#6c7086' : '#9399b2';
      let label = '';

      if (pnlVal != null) {
        const pct = Math.min(1, Math.abs(pnlVal) / (maxAbs || 1));
        bgColor = interpColor(Math.max(0.15, pct), pnlVal > 0);
        textColor = pct > 0.55 ? '#ffffff' : (isDark ? '#cdd6f4' : '#1e1e2e');
        const retPct = pnlVal / refEq * 100;
        label = (retPct >= 0 ? '+' : '') + retPct.toFixed(1) + '%';
      }

      ctx.fillStyle = bgColor;
      ctx.beginPath();
      ctx.roundRect(cellX + 1, rowY + 2, cellW - 2, cellH - 4, 3);
      ctx.fill();

      if (label && cellW > 36) {
        ctx.fillStyle = textColor;
        ctx.font = '10px Inter, system-ui';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, cellX + cellW/2, rowY + cellH/2);
      }
    });
  });
}

// ── R-Multiple Distribution Canvas ─────────────────────────────

function drawRDist() {
  const canvas = document.getElementById('canvasRDist');
  if (!canvas) return;
  const pk = getProfileKey();
  const closedTrades = getClosedTrades(pk);

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || 300;
  const h = 180;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const isDark = state.darkMode;
  ctx.fillStyle = isDark ? '#1e1e2e' : '#ffffff';
  ctx.fillRect(0, 0, w, h);

  if (closedTrades.length === 0) {
    ctx.fillStyle = isDark ? '#585b70' : '#9399b2';
    ctx.font = '13px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No trade history yet', w/2, h/2);
    return;
  }

  const buckets = [
    {label:'≤-2', min:-Infinity, max:-2},
    {label:'-2..-1', min:-2, max:-1},
    {label:'-1..0', min:-1, max:0},
    {label:'0..1', min:0, max:1},
    {label:'1..2', min:1, max:2},
    {label:'2..3', min:2, max:3},
    {label:'3..5', min:3, max:5},
    {label:'5+', min:5, max:Infinity}
  ];

  const rVals = closedTrades.map(t => t.rMultiple || 0);
  const counts = buckets.map(b => rVals.filter(r => r > b.min && r <= b.max).length);
  // Special case: <=−2 is r <= b.max
  counts[0] = rVals.filter(r => r <= -2).length;

  const maxCount = Math.max(...counts, 1);
  const pad = {top:28, right:14, bottom:32, left:14};
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;
  const barW = plotW / buckets.length;

  // Mean and median R
  const sorted = [...rVals].sort((a,b)=>a-b);
  const medR = sorted.length % 2 === 0 ? (sorted[sorted.length/2-1]+sorted[sorted.length/2])/2 : sorted[Math.floor(sorted.length/2)];
  const meanR = rVals.reduce((s,r)=>s+r,0) / rVals.length;
  ctx.fillStyle = isDark ? '#a6adc8' : '#585b70';
  ctx.font = '10px Inter, system-ui';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`Mean: ${meanR.toFixed(2)}R  Median: ${medR.toFixed(2)}R`, pad.left, 6);

  buckets.forEach((b, i) => {
    const cnt = counts[i];
    const barH = (cnt / maxCount) * plotH;
    const x = pad.left + i * barW;
    const y = pad.top + plotH - barH;
    const isPos = b.min >= 0;
    ctx.fillStyle = isPos ? 'rgba(38,166,154,0.75)' : 'rgba(239,83,80,0.75)';
    ctx.beginPath();
    ctx.roundRect(x + 2, y, barW - 4, barH, 3);
    ctx.fill();

    // Bucket label
    ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
    ctx.font = '9px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(b.label, x + barW/2, pad.top + plotH + 4);

    // Count label
    if (cnt > 0) {
      ctx.fillStyle = isDark ? '#cdd6f4' : '#1e1e2e';
      ctx.font = 'bold 10px Inter, system-ui';
      ctx.textBaseline = 'bottom';
      ctx.fillText(cnt, x + barW/2, y - 1);
    }
  });
}

// ── Trade Scatter Canvas ────────────────────────────────────────

let _scatterTrades = [];
function drawScatter() {
  const canvas = document.getElementById('canvasScatter');
  if (!canvas) return;
  const pk = getProfileKey();
  const closedTrades = getClosedTrades(pk);

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || 300;
  const h = 180;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const isDark = state.darkMode;
  ctx.fillStyle = isDark ? '#1e1e2e' : '#ffffff';
  ctx.fillRect(0, 0, w, h);

  _scatterTrades = [];

  if (closedTrades.length === 0) {
    ctx.fillStyle = isDark ? '#585b70' : '#9399b2';
    ctx.font = '13px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No trade history yet', w/2, h/2);
    return;
  }

  const pts = closedTrades.map(t => {
    const dur = t.entryDate && t.exitDate
      ? Math.max(1, Math.round((new Date(t.exitDate) - new Date(t.entryDate)) / 86400000))
      : 0;
    return {ticker: t.ticker, dur, r: t.rMultiple || 0};
  }).filter(p => p.dur > 0);
  _scatterTrades = pts;

  const maxDur = Math.max(...pts.map(p=>p.dur), 10);
  const rVals = pts.map(p=>p.r);
  const minR = Math.min(...rVals, -1);
  const maxR = Math.max(...rVals, 1);
  const rRange = maxR - minR || 1;

  const pad = {top:12, right:14, bottom:26, left:14};
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;

  const toX = d => pad.left + (d / maxDur) * plotW;
  const toY = r => pad.top + plotH - ((r - minR) / rRange) * plotH;

  // Grid
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (i/4)*plotH;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+plotW, y); ctx.stroke();
  }

  // Zero line
  const zeroY = toY(0);
  ctx.beginPath();
  ctx.setLineDash([4,3]);
  ctx.strokeStyle = isDark ? 'rgba(166,172,205,0.35)' : 'rgba(88,91,112,0.3)';
  ctx.lineWidth = 1;
  ctx.moveTo(pad.left, zeroY);
  ctx.lineTo(pad.left+plotW, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Y-axis labels
  ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
  ctx.font = '9px Inter, system-ui';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  [minR, 0, maxR].forEach(rv => {
    ctx.fillText(rv.toFixed(1)+'R', pad.left - 2, toY(rv));
  });

  // Points
  pts.forEach(p => {
    const x = toX(p.dur);
    const y = toY(p.r);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fillStyle = p.r > 0 ? 'rgba(38,166,154,0.75)' : 'rgba(239,83,80,0.75)';
    ctx.fill();
    ctx.strokeStyle = p.r > 0 ? '#26a69a' : '#ef5350';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // X-axis label
  ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
  ctx.font = '9px Inter, system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('Hold duration (days)', pad.left + plotW/2, h - 12);
}

function setupScatterHover() {
  const canvas = document.getElementById('canvasScatter');
  if (!canvas) return;
  const tooltip = document.getElementById('tooltipScatter');
  canvas.addEventListener('mousemove', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const pk = getProfileKey();
    const pts = _scatterTrades;
    if (!pts || pts.length === 0) return;
    const maxDur = Math.max(...pts.map(p=>p.dur), 10);
    const rVals = pts.map(p=>p.r);
    const minR = Math.min(...rVals, -1);
    const maxR = Math.max(...rVals, 1);
    const rRange = maxR - minR || 1;
    const pad = {top:12, right:14, bottom:26, left:14};
    const plotW = rect.width - pad.left - pad.right;
    const plotH = rect.height - pad.top - pad.bottom;
    const toX = d => pad.left + (d / maxDur) * plotW;
    const toY = r => pad.top + plotH - ((r - minR) / rRange) * plotH;

    let closest = null, closestDist = 20;
    pts.forEach(p => {
      const dx = toX(p.dur) - mx;
      const dy = toY(p.r) - my;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < closestDist) { closestDist = dist; closest = p; }
    });
    if (tooltip) {
      if (closest) {
        tooltip.style.display = 'block';
        tooltip.style.left = Math.min(mx+12, rect.width-120)+'px';
        tooltip.style.top = Math.max(my-36, 4)+'px';
        tooltip.innerHTML = `<strong>${closest.ticker}</strong><br>${closest.dur}d &middot; ${closest.r.toFixed(2)}R`;
      } else {
        tooltip.style.display = 'none';
      }
    }
  });
  canvas.addEventListener('mouseleave', () => { if (tooltip) tooltip.style.display='none'; });
}

// ── Monthly P&L Bars Canvas ─────────────────────────────────────

function drawMonthlyBars() {
  const canvas = document.getElementById('canvasMonthlyBars');
  if (!canvas) return;
  const pk = getProfileKey();
  const closedTrades = getClosedTrades(pk);

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth || 600;
  const h = 160;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const isDark = state.darkMode;
  ctx.fillStyle = isDark ? '#1e1e2e' : '#ffffff';
  ctx.fillRect(0, 0, w, h);

  if (closedTrades.length === 0) {
    ctx.fillStyle = isDark ? '#585b70' : '#9399b2';
    ctx.font = '13px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No trade history yet', w/2, h/2);
    return;
  }

  // Build last 12 months
  const now = new Date();
  const monthKeys = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    monthKeys.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
  }
  const monthData = {}; // {ym: {wins: pnl, losses: pnl}}
  monthKeys.forEach(ym => { monthData[ym] = {wins:0, losses:0, net:0}; });

  closedTrades.forEach(t => {
    if (!t.exitDate) return;
    const ym = t.exitDate.slice(0,7);
    if (!monthData[ym]) return;
    if (t.pnl > 0) monthData[ym].wins += t.pnl;
    else monthData[ym].losses += t.pnl;
    monthData[ym].net += t.pnl;
  });

  const monthLabels = monthKeys.map(ym => {
    const [y, m] = ym.split('-');
    const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return names[parseInt(m)-1];
  });

  const maxVal = Math.max(...monthKeys.map(ym => Math.abs(monthData[ym].wins) + Math.abs(monthData[ym].losses)), 1);
  const pad = {top:12, right:8, bottom:28, left:14};
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;
  const barGroupW = plotW / monthKeys.length;
  const barW = Math.max(4, barGroupW * 0.38);

  const zeroY = pad.top + plotH / 2;
  const halfH = plotH / 2;

  // Zero line
  ctx.beginPath();
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  ctx.moveTo(pad.left, zeroY);
  ctx.lineTo(pad.left+plotW, zeroY);
  ctx.stroke();

  monthKeys.forEach((ym, i) => {
    const d = monthData[ym];
    const cx = pad.left + i * barGroupW + barGroupW/2;

    // Win bar (up)
    if (d.wins > 0) {
      const bh = (d.wins / maxVal) * halfH;
      ctx.fillStyle = 'rgba(38,166,154,0.75)';
      ctx.beginPath();
      ctx.roundRect(cx - barW - 1, zeroY - bh, barW, bh, [3,3,0,0]);
      ctx.fill();
    }
    // Loss bar (down)
    if (d.losses < 0) {
      const bh = (Math.abs(d.losses) / maxVal) * halfH;
      ctx.fillStyle = 'rgba(239,83,80,0.75)';
      ctx.beginPath();
      ctx.roundRect(cx + 1, zeroY, barW, bh, [0,0,3,3]);
      ctx.fill();
    }
    // Net dot
    const netY = zeroY - (d.net / maxVal) * halfH;
    ctx.beginPath();
    ctx.arc(cx, netY, 3, 0, Math.PI*2);
    ctx.fillStyle = d.net >= 0 ? '#26a69a' : '#ef5350';
    ctx.fill();

    // Label
    ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
    ctx.font = '9px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(monthLabels[i], cx, zeroY + halfH + 4);
  });

  // Y-axis hint
  ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
  ctx.font = '9px Inter, system-ui';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ctx.fillText('+$' + Math.round(maxVal/1000)+'k', pad.left - 2, pad.top + 4);
  ctx.fillText('-$' + Math.round(maxVal/1000)+'k', pad.left - 2, pad.top + plotH - 4);
}

function drawExpectancy() {

  const closedTrades = getClosedTrades(pk);

  const dpr = window.devicePixelRatio || 1;

  const h = 120;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const isDark = state.darkMode;
  ctx.fillStyle = isDark ? '#1e1e2e' : '#ffffff';
  ctx.fillRect(0, 0, w, h);

  const sorted = [...closedTrades].sort((a,b)=>a.exitDate.localeCompare(b.exitDate));

  if (sorted.length < 5) {
    ctx.fillStyle = isDark ? '#585b70' : '#9399b2';
    ctx.font = '12px Inter, system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sorted.length === 0 ? 'No trade history yet' : 'Need 5+ trades', w/2, h/2);
    return;
  }

  const WINDOW = 10;
  const expVals = [];
  for (let i = WINDOW - 1; i < sorted.length; i++) {
    const slice = sorted.slice(i - WINDOW + 1, i + 1);
    const wins = slice.filter(t => t.pnl > 0);
    const losses = slice.filter(t => t.pnl <= 0);
    const wr = wins.length / slice.length;
    const avgWR = wins.length > 0 ? wins.reduce((s,t)=>s+(t.rMultiple||0),0)/wins.length : 0;
    const avgLR = losses.length > 0 ? losses.reduce((s,t)=>s+Math.abs(t.rMultiple||0),0)/losses.length : 0;
    expVals.push(wr * avgWR - (1 - wr) * avgLR);
  }

  const minE = Math.min(...expVals, -0.5);
  const maxE = Math.max(...expVals, 0.5);
  const eRange = maxE - minE || 1;

  const pad = {top:12, right:14, bottom:20, left:14};
  const plotW = w - pad.left - pad.right;
  const plotH = h - pad.top - pad.bottom;

  const toX = i => pad.left + (i / (expVals.length - 1 || 1)) * plotW;
  const toY = v => pad.top + plotH - ((v - minE) / eRange) * plotH;
  const zeroY = toY(0);

  // Zero line
  ctx.beginPath();
  ctx.setLineDash([4,3]);
  ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 1;
  ctx.moveTo(pad.left, zeroY);
  ctx.lineTo(pad.left+plotW, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Colored line segments
  for (let i = 1; i < expVals.length; i++) {
    const x1 = toX(i-1), y1 = toY(expVals[i-1]);
    const x2 = toX(i), y2 = toY(expVals[i]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = expVals[i] >= 0 ? '#26a69a' : '#ef5350';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Label
  ctx.fillStyle = isDark ? '#6c7086' : '#9399b2';
  ctx.font = '9px Inter, system-ui';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText('Rolling 10-trade window', pad.left+plotW, pad.top+2);
}

// ── Best/Worst Stats ────────────────────────────────────────────

function buildSystemHealth(pk) {
  const closedTrades = getClosedTrades(pk);
  const openTrades = profiles[pk].trades || [];

  if (closedTrades.length === 0) {
    return '<div style="color:var(--text3);font-size:13px;padding:8px 0">No closed trades yet</div>';
  }

  const sorted = [...closedTrades].sort((a,b)=>a.exitDate.localeCompare(b.exitDate));

  let bestR = -Infinity, bestTrade = null;
  let worstR = Infinity, worstTrade = null;
  sorted.forEach(t => {
    const r = t.rMultiple || 0;
    if (r > bestR) { bestR = r; bestTrade = t; }
    if (r < worstR) { worstR = r; worstTrade = t; }
  });

  // Streaks
  let bestStreak = 0, worstStreak = 0, curWin = 0, curLoss = 0;
  sorted.forEach(t => {
    if (t.pnl > 0) { curWin++; curLoss = 0; bestStreak = Math.max(bestStreak, curWin); }
    else { curLoss++; curWin = 0; worstStreak = Math.max(worstStreak, curLoss); }
  });

  // Avg hold
  const wins = sorted.filter(t=>t.pnl>0);
  const losses = sorted.filter(t=>t.pnl<=0);
  const avgHoldWin = wins.length > 0
    ? wins.reduce((s,t)=>s+Math.max(1,Math.round((new Date(t.exitDate)-new Date(t.entryDate))/86400000)),0)/wins.length
    : 0;
  const avgHoldLoss = losses.length > 0
    ? losses.reduce((s,t)=>s+Math.max(1,Math.round((new Date(t.exitDate)-new Date(t.entryDate))/86400000)),0)/losses.length
    : 0;

  // Open P&L (manual + AT trades)
  let openPnl = 0;
  openTrades.forEach(t => {
    const d = state.tickerData[t.ticker];
    if (d) openPnl += (d.price - t.entryPrice) * t.totalShares;
  });
  (profiles[pk].atTrades || []).forEach(t => {
    const d = state.tickerData[t.ticker];
    if (d) openPnl += (d.price - +t.entry_price) * +t.shares;
  });
  const openSign = openPnl >= 0 ? '+' : '';

  const fmt2 = v => (v >= 0 ? '+' : '') + v.toFixed(2);

  return `<ul class="perf-kv-list">
    <li><span class="pk-label">Best trade</span><span class="pk-val pos">${bestTrade ? bestTrade.ticker + ' ' + fmt2(bestR) + 'R / +$' + fmt(bestTrade.pnl) : '--'}</span></li>
    <li><span class="pk-label">Worst trade</span><span class="pk-val neg">${worstTrade ? worstTrade.ticker + ' ' + worstR.toFixed(2) + 'R / $' + fmt(worstTrade.pnl) : '--'}</span></li>
    <li><span class="pk-label">Best streak</span><span class="pk-val pos">${bestStreak} wins in a row</span></li>
    <li><span class="pk-label">Worst streak</span><span class="pk-val neg">${worstStreak} losses in a row</span></li>
    <li><span class="pk-label">Avg hold — winners</span><span class="pk-val neutral">${Math.round(avgHoldWin)} days</span></li>
    <li><span class="pk-label">Avg hold — losers</span><span class="pk-val neutral">${Math.round(avgHoldLoss)} days</span></li>
    <li><span class="pk-label">Current open P&amp;L</span><span class="pk-val ${openPnl>=0?'pos':'neg'}">${openSign}$${fmt(Math.abs(openPnl))}</span></li>
  </ul>`;
}

    const currentPrice = d ? d.price : trade.entryPrice;
    const currentATR = d ? d.atr : trade.atr;
    const pnl = (currentPrice - trade.entryPrice) * trade.totalShares;
    const atrGain = currentATR ? (currentPrice - trade.entryPrice) / currentATR : 0;

    const d = state.tickerData[trade.ticker];

    const d = state.tickerData[t.ticker];

    if (lastSync) html += `<div style="font-size:11px;color:var(--text3)">Last sync: ${new Date(lastSync).toLocaleTimeString()}</div>`;

    html += `</div>`;

    if (stats) {
      const wr = stats.winRate ? stats.winRate.toFixed(0) : '—';
      const pnl = stats.totalPnl || 0;
      html += `<div class="ibkr-account-info" style="margin-bottom:14px">
        <div class="stat"><div class="label">Closed Trades</div><div class="val">${stats.closedTrades || 0}</div></div>
        <div class="stat"><div class="label">Win Rate</div><div class="val">${wr}%</div></div>

      </div>`;

    if (trades.length > 0) {
      html += `<div class="section-header" style="margin-top:4px;margin-bottom:10px"><h2 style="font-size:13px;color:var(--text2)">AutoTrader Positions</h2><span class="count">${trades.length}</span></div>`;
      const sortedAtTrades = [...trades].sort((a, b) => {
        const da = state.tickerData[a.ticker], db = state.tickerData[b.ticker];
        const pnlA = (da && a.entry_price) ? (da.price - +a.entry_price) * +a.shares : 0;
        const pnlB = (db && b.entry_price) ? (db.price - +b.entry_price) * +b.shares : 0;
        return pnlB - pnlA;
      });
      sortedAtTrades.forEach(t => {
        const daysHeld = Math.floor((Date.now() - new Date(t.entry_date).getTime()) / 86400000);
        const riskPct = t.account_equity_at_entry > 0 ? (t.initial_dollar_risk / t.account_equity_at_entry * 100).toFixed(1) : '—';
        const layers = t.layers_filled > 0 ? `<span style="font-size:10px;background:rgba(137,180,250,0.15);color:var(--blue);padding:2px 6px;border-radius:3px;font-weight:700">L${t.layers_filled}</span>` : '';
        const liveData = state.tickerData[t.ticker];
        const currentPrice = liveData ? liveData.price : null;
        const entryP = +t.entry_price;
        const pctGain = (currentPrice && entryP) ? ((currentPrice - entryP) / entryP * 100) : null;
        const pctColor = pctGain === null ? 'var(--text2)' : pctGain >= 0 ? '#26a69a' : '#ef5350';
        const currentPriceStr = currentPrice ? `$${currentPrice.toFixed(2)}` : '—';
        const pctGainStr = pctGain !== null ? `${pctGain >= 0 ? '+' : ''}${pctGain.toFixed(2)}%` : '—';
        html += `<div class="ibkr-pos-card" onclick="navigateTo('chart',{ticker:'${t.ticker}'})" style="cursor:pointer">
          <div class="pos-header">
            <div style="display:flex;align-items:center;gap:8px">
              <span class="pos-ticker">${t.ticker}</span>
              <span class="ibkr-badge">${t.direction}</span>
              ${layers}
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              ${currentPrice ? `<span style="font-size:13px;font-weight:600;font-family:var(--mono)">${currentPriceStr}</span>` : ''}
              ${pctGain !== null ? `<span style="font-size:12px;font-weight:700;color:${pctColor}">${pctGainStr}</span>` : ''}
              <span style="font-size:11px;color:var(--text3)">${daysHeld}d held</span>
            </div>
          </div>
          <div class="pos-stats">
            <div class="stat"><div class="label">Shares</div><div class="val">${(+t.shares).toFixed(2)}</div></div>
            <div class="stat"><div class="label">Entry</div><div class="val">$${entryP.toFixed(2)}</div></div>
            <div class="stat"><div class="label">Stop</div><div class="val" style="color:var(--red)">$${(+t.stop_price).toFixed(2)}</div></div>
            <div class="stat"><div class="label">$ at Risk</div><div class="val">$${fmt(t.initial_dollar_risk)}</div></div>
            <div class="stat"><div class="label">Risk %</div><div class="val">${riskPct}%</div></div>
            <div class="stat"><div class="label">ATR</div><div class="val">${(+t.atr_at_entry).toFixed(2)}</div></div>
          </div>
        </div>`;
      });
    } else {
      html += '<div style="padding:16px 0;text-align:center;color:var(--text3);font-size:13px">No open AutoTrader positions</div>';
    }
  } else {
    html += `<div style="font-size:12px;color:var(--text3);line-height:1.6;padding:4px 0">
      Connecting to CrossPoint AutoTrader on the VPS…<br>
      <span style="font-size:11px">Trades placed by the AutoTrader will appear here automatically.</span>
    </div>`;
  }

  html += '</div>';
  return html;
}

function addPyramidLayer(tradeIdx) {
  const pk = getProfileKey();
  const trade = profiles[pk].trades[tradeIdx];
  if (!trade) return;

  const nextLayer = trade.pyramidLayers.find(l => l.status === 'NEXT ADD');
  if (!nextLayer) { showToast('All layers filled'); return; }

  state.calcPrefill = {
    ticker: trade.ticker,
    entryPrice: nextLayer.triggerPrice,
    atr: trade.atr
  };
  navigateTo('calculator');
}

function tightenStop(tradeIdx) {
  const pk = getProfileKey();
  const trade = profiles[pk].trades[tradeIdx];
  if (!trade) return;

  const d = state.tickerData[trade.ticker];
  const currentATR = d ? d.atr : trade.atr;
  const currentPrice = d ? d.price : trade.entryPrice;
  trade.stopPrice = currentPrice - 2 * currentATR;
  saveProfiles(profiles);
  showToast(`Stop tightened to $${trade.stopPrice.toFixed(2)} (2x ATR)`);
  renderPortfolio();
}

function exitTrade(tradeIdx) {
  const pk = getProfileKey();
  const trade = profiles[pk].trades[tradeIdx];
  if (!trade) return;

  const d = state.tickerData[trade.ticker];
  const exitPrice = d ? d.price : parseFloat(prompt('Enter exit price:'));
  if (!exitPrice) return;

  const pnl = (exitPrice - trade.entryPrice) * trade.totalShares;
  const rMultiple = trade.initialDollarRisk ? pnl / trade.initialDollarRisk : 0;
  const rulesFollowed = confirm('Were all system rules followed? OK = Yes, Cancel = No');

  // Show modal for notes
  const notes = prompt('Trade notes (optional):') || '';

  const journalEntry = {
    id: Date.now(),
    ticker: trade.ticker,
    entryDate: trade.entryDate,
    exitDate: new Date().toISOString().split('T')[0],
    entryPrice: trade.entryPrice,
    exitPrice,
    pnl,
    rMultiple,
    rulesFollowed,
    notes,
    shares: trade.totalShares
  };

  profiles[pk].journal = profiles[pk].journal || [];
  profiles[pk].journal.push(journalEntry);
  profiles[pk].trades.splice(tradeIdx, 1);
  saveProfiles(profiles);

  showToast(`Trade closed: ${trade.ticker} ${pnl>=0?'+':''}$${fmt(Math.abs(pnl))}`);
  renderPortfolio();
}

// ─── JOURNAL ───
let journalSortKey = 'exitDate';
let journalSortDir = 'desc';

function renderJournal() {
  const content = document.getElementById('content');
  const pk = getProfileKey();
  let journal = [...(profiles[pk].journal || [])];

  // Sort
  journal.sort((a, b) => {
    let va = a[journalSortKey], vb = b[journalSortKey];
    if (typeof va === 'string') { va = va || ''; vb = vb || ''; return journalSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va); }
    return journalSortDir === 'asc' ? (va||0) - (vb||0) : (vb||0) - (va||0);
  });

  // Stats
  const totalTrades = journal.length;
  const wins = journal.filter(j => j.pnl > 0);
  const losses = journal.filter(j => j.pnl <= 0);
  const winRate = totalTrades > 0 ? (wins.length / totalTrades) * 100 : 0;
  const avgWinR = wins.length > 0 ? wins.reduce((s, j) => s + j.rMultiple, 0) / wins.length : 0;
  const avgLossR = losses.length > 0 ? losses.reduce((s, j) => s + Math.abs(j.rMultiple), 0) / losses.length : 0;
  const expectancy = totalTrades > 0 ? (winRate/100) * avgWinR - ((100-winRate)/100) * avgLossR : 0;

  const sortIcon = (key) => journalSortKey === key ? (journalSortDir === 'asc' ? ' ↑' : ' ↓') : '';

  let rows = '';
  journal.forEach(j => {
    rows += `<tr>
      <td style="font-weight:700">${j.ticker}</td>
      <td>${j.entryDate}</td>
      <td>${j.exitDate}</td>
      <td style="font-family:var(--mono)">$${j.entryPrice.toFixed(2)}</td>
      <td style="font-family:var(--mono)">$${j.exitPrice.toFixed(2)}</td>
      <td style="font-family:var(--mono);color:${j.pnl>=0?'#40a02b':'#d20f39'}">${j.pnl>=0?'+':''}$${fmt(Math.abs(j.pnl))}</td>
      <td style="font-family:var(--mono);color:${j.rMultiple>=0?'#40a02b':'#d20f39'}">${j.rMultiple>=0?'+':''}${j.rMultiple.toFixed(2)}R</td>
      <td><span class="rules-badge ${j.rulesFollowed?'yes':'no'}">${j.rulesFollowed?'Yes':'No'}</span></td>
      <td style="font-size:11px;color:var(--text3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(j.notes||'')}">${j.notes||''}</td>
    </tr>`;
  });

  content.innerHTML = `
    <div class="screen active">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <h2>Trade Journal</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-outline" onclick="addManualJournalEntry()">+ Manual Entry</button>
          <button class="btn btn-sm btn-primary" onclick="exportJournalCSV()">Export CSV</button>
        </div>
      </div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:16px">Profile: <strong style="color:var(--text)">${state.activeProfile}</strong></div>

      <div class="journal-summary">
        <div class="journal-stat"><div class="label">Closed Trades</div><div class="val">${totalTrades}</div></div>
        <div class="journal-stat"><div class="label">Win Rate</div><div class="val" style="color:${winRate>=50?'#40a02b':'#d20f39'}">${winRate.toFixed(1)}%</div></div>
        <div class="journal-stat"><div class="label">Avg Win (R)</div><div class="val green">+${avgWinR.toFixed(2)}R</div></div>
        <div class="journal-stat"><div class="label">Avg Loss (R)</div><div class="val red">-${avgLossR.toFixed(2)}R</div></div>
        <div class="journal-stat"><div class="label">Expectancy</div><div class="val" style="color:${expectancy>=0?'#40a02b':'#d20f39'}">${expectancy>=0?'+':''}${expectancy.toFixed(3)}R</div></div>
      </div>

      ${totalTrades === 0 ? '<div style="text-align:center;padding:40px;color:var(--text3)"><p style="font-size:15px">No closed trades yet</p></div>' : `
      <div class="journal-table-wrap"><table class="journal-table">
        <thead><tr>
          <th onclick="sortJournal('ticker')">Ticker${sortIcon('ticker')}</th>
          <th onclick="sortJournal('entryDate')">Entry${sortIcon('entryDate')}</th>
          <th onclick="sortJournal('exitDate')">Exit${sortIcon('exitDate')}</th>
          <th>Entry $</th><th>Exit $</th>
          <th onclick="sortJournal('pnl')">P&L${sortIcon('pnl')}</th>
          <th onclick="sortJournal('rMultiple')">R Multiple${sortIcon('rMultiple')}</th>
          <th>Rules</th><th>Notes</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`}
    </div>
  `;
}

function sortJournal(key) {
  if (journalSortKey === key) journalSortDir = journalSortDir === 'asc' ? 'desc' : 'asc';
  else { journalSortKey = key; journalSortDir = 'desc'; }
  renderJournal();
}

function addManualJournalEntry() {
  const ticker = prompt('Ticker symbol:');
  if (!ticker) return;
  const entryDate = prompt('Entry date (YYYY-MM-DD):');
  const exitDate = prompt('Exit date (YYYY-MM-DD):');
  const entryPrice = parseFloat(prompt('Entry price:'));
  const exitPrice = parseFloat(prompt('Exit price:'));
  const shares = parseInt(prompt('Number of shares:'));
  const initialRisk = parseFloat(prompt('Initial dollar risk on trade:'));
  if (!entryPrice || !exitPrice || !shares) return;

  const pnl = (exitPrice - entryPrice) * shares;
  const rMultiple = initialRisk ? pnl / initialRisk : 0;
  const rulesFollowed = confirm('Were all system rules followed?');
  const notes = prompt('Notes (optional):') || '';

  const pk = getProfileKey();
  profiles[pk].journal = profiles[pk].journal || [];
  profiles[pk].journal.push({
    id: Date.now(), ticker: ticker.toUpperCase(), entryDate, exitDate,
    entryPrice, exitPrice, pnl, rMultiple, rulesFollowed, notes, shares
  });
  saveProfiles(profiles);
  showToast('Journal entry added');
  renderJournal();
}

function exportJournalCSV() {
  const pk = getProfileKey();
  const journal = profiles[pk].journal || [];
  if (journal.length === 0) { showToast('No entries to export'); return; }

  let csv = 'Ticker,Entry Date,Exit Date,Entry Price,Exit Price,Shares,P&L,R Multiple,Rules Followed,Notes\n';
  journal.forEach(j => {
    csv += `${j.ticker},${j.entryDate},${j.exitDate},${j.entryPrice},${j.exitPrice},${j.shares||''},${j.pnl.toFixed(2)},${j.rMultiple.toFixed(2)},${j.rulesFollowed?'Yes':'No'},"${(j.notes||'').replace(/"/g,'""')}"\n`;
  });

  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `trendpulse_journal_${state.activeProfile.toLowerCase()}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported');
}

// ─── UTILS ───
function fmt(n) {
  if (n == null || isNaN(n)) return '--';
  if (Math.abs(n) >= 1000) return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return n.toFixed(2);
}

function fmtB(n) {
  if (n >= 1e12) return (n/1e12).toFixed(1) + 'T';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  return n.toLocaleString();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

let previousCrossStates = {}; // Track crossover states between refreshes
let alertQueue = [];
let currentAlertTicker = null;

function initNotifications() {
  // Load previous cross states from localStorage
  const saved = localStorage.getItem('tp_cross_states');
  if (saved) previousCrossStates = JSON.parse(saved);

  // Update notification button state
  updateNotifBtn();

const hasNotifAPI = typeof Notification !== 'undefined';

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  const granted = hasNotifAPI && Notification.permission === 'granted';
  btn.style.borderColor = granted ? 'var(--green)' : '';
  btn.title = granted ? 'Notifications enabled' : 'Enable notifications';
}

async function toggleNotifications() {
  if (!hasNotifAPI) {
    showToast('Notifications not supported in this browser');
    return;
  }
  if (hasNotifAPI && Notification.permission === 'granted') {
    showToast('Notifications are already enabled');
    return;
  }
  if (hasNotifAPI && Notification.permission === 'denied') {
    showToast('Notifications blocked. Enable in browser settings.');
    return;
  }
  const result = await Notification.requestPermission();
  if (result === 'granted') {
    showToast('Notifications enabled! You\'ll be alerted on crossovers.');
    // Play a test sound
    playAlertSound('confirm');
  }
  updateNotifBtn();
}

function playAlertSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'cross') {
      // Urgent two-tone alert
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.45);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.6);
    } else {
      // Soft confirmation chime
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    }
  } catch(e) {}
}

function checkForNewCrossovers() {
  const tickers = getAllTickers();
  const newCrosses = [];

  tickers.forEach(ticker => {
    const d = state.tickerData[ticker];
    if (!d || !d.crosses || d.crosses.length === 0) return;

    const lastCross = d.crosses[d.crosses.length - 1];
    const crossKey = `${ticker}_${lastCross.timestamp}`;
    const prevKey = previousCrossStates[ticker];

    if (prevKey !== crossKey) {
      // This is a new crossover we haven't seen before
      // Only alert if we had a previous state (skip initial load)
      if (prevKey !== undefined) {
        newCrosses.push({
          ticker,
          type: lastCross.type,
          price: d.price,
          name: d.name || ticker
        });
      }
      previousCrossStates[ticker] = crossKey;
    }
  });

  // Save updated states
  localStorage.setItem('tp_cross_states', JSON.stringify(previousCrossStates));

  if (newCrosses.length > 0) {
    // Play alert sound
    playAlertSound('cross');

    // Show notification dot
    const dot = document.getElementById('notifDot');
    if (dot) dot.classList.add('show');

    // Send browser notifications
    if (hasNotifAPI && Notification.permission === 'granted') {
      newCrosses.forEach(cross => {
        const direction = cross.type === 'bullish' ? 'BULLISH' : 'BEARISH';
        const action = cross.type === 'bullish' ? 'MA10 crossed ABOVE MA20' : 'MA10 crossed BELOW MA20';
        const n = new Notification(`${direction} Cross: ${cross.ticker}`, {
          body: `${cross.name}\n${action}\nPrice: $${fmt(cross.price)}`,
          icon: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="' + (cross.type === 'bullish' ? '#a6e3a1' : '#f38ba8') + '"/><text x="32" y="42" text-anchor="middle" font-size="28" fill="#1e1e2e" font-weight="bold">' + (cross.type === 'bullish' ? '&#8593;' : '&#8595;') + '</text></svg>'),
          tag: `cross-${cross.ticker}`,
          requireInteraction: true
        });
        n.onclick = () => {
          window.focus();
          navigateTo('chart', {ticker: cross.ticker});
          n.close();
        };
      });
    }

    // Show visual alert banner
    if (newCrosses.length === 1) {
      const c = newCrosses[0];
      const dir = c.type === 'bullish' ? 'BULLISH' : 'BEARISH';
      currentAlertTicker = c.ticker;
      showAlertBanner(`<strong>${dir} CROSS: ${c.ticker}</strong> &mdash; ${c.name} &mdash; MA10 crossed ${c.type === 'bullish' ? 'above' : 'below'} MA20 at $${fmt(c.price)}. Action required!`);
    } else {
      currentAlertTicker = newCrosses[0].ticker;
      const tickers = newCrosses.map(c => c.ticker).join(', ');
      showAlertBanner(`<strong>${newCrosses.length} NEW CROSSOVERS:</strong> ${tickers} &mdash; Check the dashboard for signal changes. Action required!`);
    }
  }
}

function showAlertBanner(html) {
  const banner = document.getElementById('alertBanner');
  const text = document.getElementById('alertText');
  text.innerHTML = html;
  banner.classList.add('show');
  // Auto-dismiss after 30 seconds

function dismissAlert() {
  document.getElementById('alertBanner').classList.remove('show');
  const dot = document.getElementById('notifDot');
  if (dot) dot.classList.remove('show');
  clearTimeout(state._alertTimeout);
}

function viewAlertTicker() {
  if (currentAlertTicker) {
    navigateTo('chart', {ticker: currentAlertTicker});
  }
  dismissAlert();
}

const AT_API = 'https://204-48-20-53.sslip.io';

async function atFetch(endpoint) {

async function atSync(pk) {
  // Map dashboard profile key to AutoTrader account ID
  // Account IDs in DB are lowercase profile names: josh, nehemiah, levi
  const accountId = pk; // They match: pk is already lowercase

  const [statsAll, tradesOpen] = await Promise.all([
    atFetch('/api/stats'),
    atFetch('/api/trades/open')
  ]);

  if (!statsAll) {
    profiles[pk].atConnected = false;
    saveProfiles(profiles);
    if (state.activeScreen === 'portfolio') renderPortfolio();
    return;
  }

  // Find this profile's stats
  const myStats = statsAll.find(s => s.accountId === accountId || s.accountId === pk);
  profiles[pk].atStats = myStats || null;

  // Filter open trades for this account
  const myTrades = (tradesOpen || []).filter(t =>
    t.account_id === accountId || t.account_id === pk
  );
  profiles[pk].atTrades = myTrades;
  profiles[pk].atConnected = true;
  profiles[pk].atLastSync = new Date().toISOString();

  saveProfiles(profiles);
  if (state.activeScreen === 'portfolio') renderPortfolio();
}

async function atSyncAll() {

    // VPS unreachable — mark all disconnected

  PROFILES.forEach(name => {

}

// ─── R-TARGET NOTIFICATIONS ───
function checkRTargets() {
  // Check all open trades across all profiles for R-multiple target hits
  PROFILES.forEach(profileName => {
    const pk = profileName.toLowerCase();
    const trades = profiles[pk].trades || [];
    let changed = false;

    trades.forEach(trade => {
      const d = state.tickerData[trade.ticker];
      if (!d || !d.price) return;

      const currentPrice = d.price;
      const stopDist = trade.entryPrice - trade.stopPrice; // per-share risk
      if (stopDist <= 0) return;

      const rMultiple = (currentPrice - trade.entryPrice) / stopDist;
      const currentR = Math.floor(rMultiple); // integer R level reached

      // Initialize notified levels if not present
      if (!trade.notifiedRLevels) {
        trade.notifiedRLevels = [];
        changed = true;
      }

      // Check R levels 2 through 20
      for (let r = 2; r <= 20; r++) {
        if (rMultiple >= r && !trade.notifiedRLevels.includes(r)) {
          // New R-target hit!
          trade.notifiedRLevels.push(r);
          changed = true;

          const dollarProfit = (currentPrice - trade.entryPrice) * trade.totalShares;
          const emoji = r >= 10 ? '🏆' : r >= 5 ? '🔥' : '🎯';

          // Audio alert
          playAlertSound('cross');

          // Browser notification
          if (hasNotifAPI && Notification.permission === 'granted') {
            const n = new Notification(`${r}R Target Hit: ${trade.ticker}`, {
              body: `${profileName}'s ${trade.ticker} position reached ${r}R!\nPrice: $${currentPrice.toFixed(2)} | P&L: +$${dollarProfit.toFixed(2)}`,
              icon: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="#26a69a"/><text x="32" y="44" text-anchor="middle" font-size="24" fill="#fff" font-weight="bold">' + r + 'R</text></svg>'),
              tag: `rtarget-${trade.id}-${r}`,
              requireInteraction: false
            });
            n.onclick = () => { window.focus(); navigateTo('portfolio'); n.close(); };
          }

          // Visual alert banner
          currentAlertTicker = trade.ticker;
          showAlertBanner(
            `<strong>${emoji} ${r}R TARGET: ${trade.ticker}</strong> &mdash; ${profileName}'s position hit ${r}R at $${currentPrice.toFixed(2)}. Unrealized P&L: +$${dollarProfit.toFixed(2)}`
          );
        }
      }
    });

    if (changed) saveProfiles(profiles);
  });
}

// ─── PWA MANIFEST ───
function setupPWA() {
  const manifest = {
    name: 'CrossPoint',
    short_name: 'CrossPoint',
    start_url: './',
    display: 'standalone',
    background_color: '#f4f6f9',
    theme_color: '#89b4fa',
    icons: [{
      src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#1e1e2e"/><path d="M96 352L208 224L288 288L416 128" stroke="#89b4fa" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M96 192L208 320L288 256L416 384" stroke="#a6e3a1" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/><circle cx="288" cy="272" r="16" fill="#fff"/></svg>'),
      sizes: 'any',
      type: 'image/svg+xml'
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
}

// ─── WINDOW RESIZE ───
function handleResize() {
  if (chartEngine && state.activeScreen === 'chart') {
    chartEngine.draw();
  }
}

// ─── INIT ───
async function init() {
  try {
  setupPWA();
  applyTheme();
  const screenerFresh = loadCachedScreener();
  initNotifications();
  renderNav();
  renderScreen();
  updateBotStatus();

  // Theme toggle
  document.getElementById('themeBtn').onclick = () => {
    state.darkMode = !state.darkMode;
    applyTheme();
    if (chartEngine && state.activeScreen === 'chart') chartEngine.draw();
  };

  // Refresh button
  document.getElementById('refreshBtn').onclick = () => {
    refreshAllTickers();
  };

  // Window resize
  window.addEventListener('resize', handleResize);

  // Load initial data (don't await - let UI render immediately while data loads)
  refreshAllTickers();
  atSyncAll();

  // Load screener + portfolio/equity from VPS after initial render
  setTimeout(() => {
    loadVPSScreener().then(r => {
      if (r && state.activeScreen === 'dashboard') renderDashboard();
    });
    loadVPSPortfolio();
  }, 3000);

  // Refresh screener every 6 hours, portfolio/equity every 10 min
  setInterval(() => {
    loadVPSScreener().then(r => {
      if (r && state.activeScreen === 'dashboard') renderDashboard();
    });
  }, 21600000);
  setInterval(() => loadVPSPortfolio(), 600000);

  // Auto-refresh every 10 minutes (includes AutoTrader sync)
  setInterval(() => {
    if (isMarketOpen()) {
      refreshAllTickers();
      atSyncAll();
    }
  }, 600000);

  // Update market status every minute
  setInterval(() => {
    const open = isMarketOpen();
    document.getElementById('marketDot').className = 'market-dot ' + (open?'open':'closed');
    document.getElementById('marketStatus').textContent = open ? 'Market Open' : 'Market Closed';
  }, 60000);
  } catch(e) { console.error('Init error:', e); }
}
