// ─── JOURNAL ───
let journalSortKey = 'exitDate';
let journalSortDir = 'desc';

function renderJournal() {
  const content = document.getElementById('content');
  const pk = getProfileKey();
  let journal = [...(profiles[pk].journal || [])];

  // Sort
  journal.sort((a, b) => {
    let va = a[journalSortKey], vb = b[journalSortKey];
    if (typeof va === 'string') { va = va || ''; vb = vb || ''; return journalSortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va); }
    return journalSortDir === 'asc' ? (va||0) - (vb||0) : (vb||0) - (va||0);
  });

  // Stats
  const totalTrades = journal.length;
  const wins = journal.filter(j => j.pnl > 0);
  const losses = journal.filter(j => j.pnl <= 0);
  const winRate = totalTrades > 0 ? (wins.length / totalTrades) * 100 : 0;
  const avgWinR = wins.length > 0 ? wins.reduce((s, j) => s + j.rMultiple, 0) / wins.length : 0;
  const avgLossR = losses.length > 0 ? losses.reduce((s, j) => s + Math.abs(j.rMultiple), 0) / losses.length : 0;
  const expectancy = totalTrades > 0 ? (winRate/100) * avgWinR - ((100-winRate)/100) * avgLossR : 0;

  const sortIcon = (key) => journalSortKey === key ? (journalSortDir === 'asc' ? ' ↑' : ' ↓') : '';

  let rows = '';
  journal.forEach(j => {
    rows += `<tr>
      <td style="font-weight:700">${j.ticker}</td>
      <td>${j.entryDate}</td>
      <td>${j.exitDate}</td>
      <td style="font-family:var(--mono)">$${j.entryPrice.toFixed(2)}</td>
      <td style="font-family:var(--mono)">$${j.exitPrice.toFixed(2)}</td>
      <td style="font-family:var(--mono);color:${j.pnl>=0?'#40a02b':'#d20f39'}">${j.pnl>=0?'+':''}$${fmt(Math.abs(j.pnl))}</td>
      <td style="font-family:var(--mono);color:${j.rMultiple>=0?'#40a02b':'#d20f39'}">${j.rMultiple>=0?'+':''}${j.rMultiple.toFixed(2)}R</td>
      <td><span class="rules-badge ${j.rulesFollowed?'yes':'no'}">${j.rulesFollowed?'Yes':'No'}</span></td>
      <td style="font-size:11px;color:var(--text3);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(j.notes||'')}">${j.notes||''}</td>
    </tr>`;
  });

  content.innerHTML = `
    <div class="screen active">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <h2>Trade Journal</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm btn-outline" onclick="addManualJournalEntry()">+ Manual Entry</button>
          <button class="btn btn-sm btn-primary" onclick="exportJournalCSV()">Export CSV</button>
        </div>
      </div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:16px">Profile: <strong style="color:var(--text)">${state.activeProfile}</strong></div>

      <div class="journal-summary">
        <div class="journal-stat"><div class="label">Closed Trades</div><div class="val">${totalTrades}</div></div>
        <div class="journal-stat"><div class="label">Win Rate</div><div class="val" style="color:${winRate>=50?'#40a02b':'#d20f39'}">${winRate.toFixed(1)}%</div></div>
        <div class="journal-stat"><div class="label">Avg Win (R)</div><div class="val green">+${avgWinR.toFixed(2)}R</div></div>
        <div class="journal-stat"><div class="label">Avg Loss (R)</div><div class="val red">-${avgLossR.toFixed(2)}R</div></div>
        <div class="journal-stat"><div class="label">Expectancy</div><div class="val" style="color:${expectancy>=0?'#40a02b':'#d20f39'}">${expectancy>=0?'+':''}${expectancy.toFixed(3)}R</div></div>
      </div>

      ${totalTrades === 0 ? '<div style="text-align:center;padding:40px;color:var(--text3)"><p style="font-size:15px">No closed trades yet</p></div>' : `
      <div class="journal-table-wrap"><table class="journal-table">
        <thead><tr>
          <th onclick="sortJournal('ticker')">Ticker${sortIcon('ticker')}</th>
          <th onclick="sortJournal('entryDate')">Entry${sortIcon('entryDate')}</th>
          <th onclick="sortJournal('exitDate')">Exit${sortIcon('exitDate')}</th>
          <th>Entry $</th><th>Exit $</th>
          <th onclick="sortJournal('pnl')">P&L${sortIcon('pnl')}</th>
          <th onclick="sortJournal('rMultiple')">R Multiple${sortIcon('rMultiple')}</th>
          <th>Rules</th><th>Notes</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`}
    </div>
  `;
}

function sortJournal(key) {
  if (journalSortKey === key) journalSortDir = journalSortDir === 'asc' ? 'desc' : 'asc';
  else { journalSortKey = key; journalSortDir = 'desc'; }
  renderJournal();
}

function addManualJournalEntry() {
  const ticker = prompt('Ticker symbol:');
  if (!ticker) return;
  const entryDate = prompt('Entry date (YYYY-MM-DD):');
  const exitDate = prompt('Exit date (YYYY-MM-DD):');
  const entryPrice = parseFloat(prompt('Entry price:'));
  const exitPrice = parseFloat(prompt('Exit price:'));
  const shares = parseInt(prompt('Number of shares:'));
  const initialRisk = parseFloat(prompt('Initial dollar risk on trade:'));
  if (!entryPrice || !exitPrice || !shares) return;

  const pnl = (exitPrice - entryPrice) * shares;
  const rMultiple = initialRisk ? pnl / initialRisk : 0;
  const rulesFollowed = confirm('Were all system rules followed?');
  const notes = prompt('Notes (optional):') || '';

  const pk = getProfileKey();
  profiles[pk].journal = profiles[pk].journal || [];
  profiles[pk].journal.push({
    id: Date.now(), ticker: ticker.toUpperCase(), entryDate, exitDate,
    entryPrice, exitPrice, pnl, rMultiple, rulesFollowed, notes, shares
  });
  saveProfiles(profiles);
  showToast('Journal entry added');
  renderJournal();
}

function exportJournalCSV() {
  const pk = getProfileKey();
  const journal = profiles[pk].journal || [];
  if (journal.length === 0) { showToast('No entries to export'); return; }

  let csv = 'Ticker,Entry Date,Exit Date,Entry Price,Exit Price,Shares,P&L,R Multiple,Rules Followed,Notes\n';
  journal.forEach(j => {
    csv += `${j.ticker},${j.entryDate},${j.exitDate},${j.entryPrice},${j.exitPrice},${j.shares||''},${j.pnl.toFixed(2)},${j.rMultiple.toFixed(2)},${j.rulesFollowed?'Yes':'No'},"${(j.notes||'').replace(/"/g,'""')}"\n`;
  });

  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `trendpulse_journal_${state.activeProfile.toLowerCase()}_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported');
}

// ─── UTILS ───
function fmt(n) {
  if (n == null || isNaN(n)) return '--';
  if (Math.abs(n) >= 1000) return n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  return n.toFixed(2);
}

function fmtB(n) {
  if (n >= 1e12) return (n/1e12).toFixed(1) + 'T';
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  return n.toLocaleString();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── NOTIFICATIONS & ALERTS ───
let previousCrossStates = {}; // Track crossover states between refreshes
let alertQueue = [];
let currentAlertTicker = null;

function initNotifications() {
  // Load previous cross states from localStorage
  const saved = localStorage.getItem('tp_cross_states');
  if (saved) previousCrossStates = JSON.parse(saved);

  // Update notification button state
  updateNotifBtn();
}

const hasNotifAPI = typeof Notification !== 'undefined';

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  const granted = hasNotifAPI && Notification.permission === 'granted';
  btn.style.borderColor = granted ? 'var(--green)' : '';
  btn.title = granted ? 'Notifications enabled' : 'Enable notifications';
}

async function toggleNotifications() {
  if (!hasNotifAPI) {
    showToast('Notifications not supported in this browser');
    return;
  }
  if (hasNotifAPI && Notification.permission === 'granted') {
    showToast('Notifications are already enabled');
    return;
  }
  if (hasNotifAPI && Notification.permission === 'denied') {
    showToast('Notifications blocked. Enable in browser settings.');
    return;
  }
  const result = await Notification.requestPermission();
  if (result === 'granted') {
    showToast('Notifications enabled! You\'ll be alerted on crossovers.');
    // Play a test sound
    playAlertSound('confirm');
  }
  updateNotifBtn();
}

function playAlertSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'cross') {
      // Urgent two-tone alert
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.15);
      osc.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
      osc.frequency.setValueAtTime(1100, ctx.currentTime + 0.45);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.6);
    } else {
      // Soft confirmation chime
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    }
  } catch(e) {}
}

function checkForNewCrossovers() {
  const tickers = getAllTickers();
  const newCrosses = [];

  tickers.forEach(ticker => {
    const d = state.tickerData[ticker];
    if (!d || !d.crosses || d.crosses.length === 0) return;

    const lastCross = d.crosses[d.crosses.length - 1];
    const crossKey = `${ticker}_${lastCross.timestamp}`;
    const prevKey = previousCrossStates[ticker];

    if (prevKey !== crossKey) {
      // This is a new crossover we haven't seen before
      // Only alert if we had a previous state (skip initial load)
      if (prevKey !== undefined) {
        newCrosses.push({
          ticker,
          type: lastCross.type,
          price: d.price,
          name: d.name || ticker
        });
      }
      previousCrossStates[ticker] = crossKey;
    }
  });

  // Save updated states
  localStorage.setItem('tp_cross_states', JSON.stringify(previousCrossStates));

  if (newCrosses.length > 0) {
    // Play alert sound
    playAlertSound('cross');

    // Show notification dot
    const dot = document.getElementById('notifDot');
    if (dot) dot.classList.add('show');

    // Send browser notifications
    if (hasNotifAPI && Notification.permission === 'granted') {
      newCrosses.forEach(cross => {
        const direction = cross.type === 'bullish' ? 'BULLISH' : 'BEARISH';
        const action = cross.type === 'bullish' ? 'MA10 crossed ABOVE MA20' : 'MA10 crossed BELOW MA20';
        const n = new Notification(`${direction} Cross: ${cross.ticker}`, {
          body: `${cross.name}\n${action}\nPrice: $${fmt(cross.price)}`,
          icon: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="' + (cross.type === 'bullish' ? '#a6e3a1' : '#f38ba8') + '"/><text x="32" y="42" text-anchor="middle" font-size="28" fill="#1e1e2e" font-weight="bold">' + (cross.type === 'bullish' ? '&#8593;' : '&#8595;') + '</text></svg>'),
          tag: `cross-${cross.ticker}`,
          requireInteraction: true
        });
        n.onclick = () => {
          window.focus();
          navigateTo('chart', {ticker: cross.ticker});
          n.close();
        };
      });
    }

    // Show visual alert banner
    if (newCrosses.length === 1) {
      const c = newCrosses[0];
      const dir = c.type === 'bullish' ? 'BULLISH' : 'BEARISH';
      currentAlertTicker = c.ticker;
      showAlertBanner(`<strong>${dir} CROSS: ${c.ticker}</strong> &mdash; ${c.name} &mdash; MA10 crossed ${c.type === 'bullish' ? 'above' : 'below'} MA20 at $${fmt(c.price)}. Action required!`);
    } else {
      currentAlertTicker = newCrosses[0].ticker;
      const tickers = newCrosses.map(c => c.ticker).join(', ');
      showAlertBanner(`<strong>${newCrosses.length} NEW CROSSOVERS:</strong> ${tickers} &mdash; Check the dashboard for signal changes. Action required!`);
    }
  }
}

function showAlertBanner(html) {
  const banner = document.getElementById('alertBanner');
  const text = document.getElementById('alertText');
  text.innerHTML = html;
  banner.classList.add('show');
  // Auto-dismiss after 30 seconds
  clearTimeout(state._alertTimeout);
  state._alertTimeout = setTimeout(() => dismissAlert(), 30000);
}

function dismissAlert() {
  document.getElementById('alertBanner').classList.remove('show');
  const dot = document.getElementById('notifDot');
  if (dot) dot.classList.remove('show');
  clearTimeout(state._alertTimeout);
}

function viewAlertTicker() {
  if (currentAlertTicker) {
    navigateTo('chart', {ticker: currentAlertTicker});
  }
  dismissAlert();
}

// ─── IBKR CLIENT PORTAL GATEWAY ───
async function ibkrFetch(pk, endpoint, method='GET', body=null) {
  const profile = profiles[pk];
  if (!profile) return null;
  const baseUrl = profile.ibkrGatewayUrl || 'https://localhost:5000';
  const url = baseUrl + endpoint;
  try {
    const opts = {method, headers:{'Content-Type':'application/json'}};
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetchWithTimeout(url, 6000);
    return resp;
  } catch(e) {
    return null;
  }
}

async function ibkrCheckAuth(pk) {
  const profile = profiles[pk];
  const baseUrl = profile.ibkrGatewayUrl || 'https://localhost:5000';
  try {
    const resp = await fetch(baseUrl + '/v1/api/iserver/auth/status', {
      method: 'POST', headers:{'Content-Type':'application/json'}, body: '{}'
    });
    const data = await resp.json();
    return data; // {authenticated: true/false, connected: true/false, ...}
  } catch(e) {
    return null;
  }
}

async function ibkrGetAccounts(pk) {
  const profile = profiles[pk];
  const baseUrl = profile.ibkrGatewayUrl || 'https://localhost:5000';
  try {
    const resp = await fetch(baseUrl + '/v1/api/portfolio/accounts');
    return await resp.json(); // [{id, accountId, accountTitle, ...}]
  } catch(e) { return null; }
}

async function ibkrGetPositions(pk) {
  const profile = profiles[pk];
  if (!profile.ibkrAccountId) return null;
  const baseUrl = profile.ibkrGatewayUrl || 'https://localhost:5000';
  try {
    const resp = await fetch(baseUrl + '/v1/api/portfolio/' + profile.ibkrAccountId + '/positions/0');
    return await resp.json();
  } catch(e) { return null; }
}

async function ibkrGetSummary(pk) {
  const profile = profiles[pk];
  if (!profile.ibkrAccountId) return null;
  const baseUrl = profile.ibkrGatewayUrl || 'https://localhost:5000';
  try {
    const resp = await fetch(baseUrl + '/v1/api/portfolio/' + profile.ibkrAccountId + '/summary');
    return await resp.json();
  } catch(e) { return null; }
}

async function ibkrTickle(pk) {

  const baseUrl = profile.ibkrGatewayUrl || 'https://localhost:5000';
  try {
    await fetch(baseUrl + '/v1/api/tickle', {method:'POST'});

}

async function ibkrConnect(pk) {
  showToast('Connecting to IBKR Gateway...');
  const profile = profiles[pk];

  // Step 1: Check auth
  const auth = await ibkrCheckAuth(pk);
  if (!auth) {
    showToast('Cannot reach IBKR Gateway. Ensure it is running on ' + (profile.ibkrGatewayUrl || 'https://localhost:5000'));
    return false;
  }
  if (!auth.authenticated) {
    showToast('Not authenticated. Log in to the IBKR Gateway web UI first.');
    return false;
  }

  // Step 2: Get accounts
  const accounts = await ibkrGetAccounts(pk);
  if (!accounts || accounts.length === 0) {
    showToast('No accounts found on this IBKR session.');
    return false;
  }

  // Use first account (or let user pick if multiple)
  if (accounts.length === 1) {
    profile.ibkrAccountId = accounts[0].id || accounts[0].accountId;
  } else {
    // Show account selection
    const acctList = accounts.map((a,i) => `${i+1}. ${a.id} - ${a.accountTitle || a.displayName || ''}`).join('\n');
    const choice = prompt('Multiple accounts found. Enter number:\n' + acctList);
    const idx = parseInt(choice) - 1;
    if (idx >= 0 && idx < accounts.length) {
      profile.ibkrAccountId = accounts[idx].id || accounts[idx].accountId;
    } else {
      showToast('Invalid selection');
      return false;
    }
  }

  profile.ibkrConnected = true;
  saveProfiles(profiles);

  // Step 3: Sync positions and balance
  await ibkrSync(pk);
  showToast('Connected to IBKR: ' + profile.ibkrAccountId);
  return true;
}

async function ibkrDisconnect(pk) {
  const profile = profiles[pk];
  profile.ibkrConnected = false;
  profile.ibkrAccountId = null;
  profile.ibkrPositions = [];
  profile.ibkrBalance = null;
  saveProfiles(profiles);
  showToast('Disconnected from IBKR');
  if (state.activeScreen === 'portfolio') renderPortfolio();
}

async function ibkrSync(pk) {
  const profile = profiles[pk];
  if (!profile.ibkrConnected || !profile.ibkrAccountId) return;

  // Fetch positions
  const positions = await ibkrGetPositions(pk);
  if (positions && Array.isArray(positions)) {
    profile.ibkrPositions = positions.map(pos => ({
      conid: pos.conid,
      ticker: pos.contractDesc || pos.ticker || pos.symbol || ('CONID:' + pos.conid),
      name: pos.name || pos.contractDesc || '',
      shares: pos.position || 0,
      avgCost: pos.avgCost || 0,
      mktPrice: pos.mktPrice || 0,
      mktValue: pos.mktValue || 0,
      unrealizedPnl: pos.unrealizedPnl || 0,
      realizedPnl: pos.realizedPnl || 0,
      currency: pos.currency || 'USD',
      assetClass: pos.assetClass || pos.secType || 'STK'
    })).filter(p => p.shares !== 0); // Only show active positions
  }

  // Fetch account summary
  const summary = await ibkrGetSummary(pk);
  if (summary) {
    profile.ibkrBalance = {
      netliquidation: summary.netliquidation?.amount || summary.netliquidation?.value || 0,
      totalcashvalue: summary.totalcashvalue?.amount || summary.totalcashvalue?.value || 0,
      grosspositionvalue: summary.grosspositionvalue?.amount || summary.grosspositionvalue?.value || 0,
      availablefunds: summary.availablefunds?.amount || summary.availablefunds?.value || 0,
      buyingpower: summary.buyingpower?.amount || summary.buyingpower?.value || 0
    };
  }

  saveProfiles(profiles);
  if (state.activeScreen === 'portfolio') renderPortfolio();
}

async function ibkrSyncAllConnected() {
  for (const name of PROFILES) {
    const pk = name.toLowerCase();
    if (profiles[pk].ibkrConnected) {
      await ibkrTickle(pk);
      await ibkrSync(pk);
    }
  }
}

function ibkrUpdateGatewayUrl(pk) {
  const input = document.getElementById('ibkrUrl');
  if (input) {
    profiles[pk].ibkrGatewayUrl = input.value.replace(/\/+$/, '');
    saveProfiles(profiles);
    showToast('Gateway URL updated');
  }
}

// ─── R-TARGET NOTIFICATIONS ───
function checkRTargets() {
  // Check all open trades across all profiles for R-multiple target hits
  PROFILES.forEach(profileName => {
    const pk = profileName.toLowerCase();
    const trades = profiles[pk].trades || [];
    let changed = false;

    trades.forEach(trade => {
      const d = state.tickerData[trade.ticker];
      if (!d || !d.price) return;

      const currentPrice = d.price;
      const stopDist = trade.entryPrice - trade.stopPrice; // per-share risk
      if (stopDist <= 0) return;

      const rMultiple = (currentPrice - trade.entryPrice) / stopDist;
      const currentR = Math.floor(rMultiple); // integer R level reached

      // Initialize notified levels if not present
      if (!trade.notifiedRLevels) {
        trade.notifiedRLevels = [];
        changed = true;
      }

      // Check R levels 2 through 20
      for (let r = 2; r <= 20; r++) {
        if (rMultiple >= r && !trade.notifiedRLevels.includes(r)) {
          // New R-target hit!
          trade.notifiedRLevels.push(r);
          changed = true;

          const dollarProfit = (currentPrice - trade.entryPrice) * trade.totalShares;
          const emoji = r >= 10 ? '🏆' : r >= 5 ? '🔥' : '🎯';

          // Audio alert
          playAlertSound('cross');

          // Browser notification
          if (hasNotifAPI && Notification.permission === 'granted') {
            const n = new Notification(`${r}R Target Hit: ${trade.ticker}`, {
              body: `${profileName}'s ${trade.ticker} position reached ${r}R!\nPrice: $${currentPrice.toFixed(2)} | P&L: +$${dollarProfit.toFixed(2)}`,
              icon: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="#26a69a"/><text x="32" y="44" text-anchor="middle" font-size="24" fill="#fff" font-weight="bold">' + r + 'R</text></svg>'),
              tag: `rtarget-${trade.id}-${r}`,
              requireInteraction: false
            });
            n.onclick = () => { window.focus(); navigateTo('portfolio'); n.close(); };
          }

          // Visual alert banner
          currentAlertTicker = trade.ticker;
          showAlertBanner(
            `<strong>${emoji} ${r}R TARGET: ${trade.ticker}</strong> &mdash; ${profileName}'s position hit ${r}R at $${currentPrice.toFixed(2)}. Unrealized P&L: +$${dollarProfit.toFixed(2)}`
          );
        }
      }
    });

    if (changed) saveProfiles(profiles);
  });
}

// ─── PWA MANIFEST ───
function setupPWA() {
  const manifest = {
    name: 'CrossPoint',
    short_name: 'CrossPoint',
    start_url: './',
    display: 'standalone',
    background_color: '#f4f6f9',
    theme_color: '#89b4fa',
    icons: [{
      src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="112" fill="#1e1e2e"/><path d="M96 352L208 224L288 288L416 128" stroke="#89b4fa" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M96 192L208 320L288 256L416 384" stroke="#a6e3a1" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/><circle cx="288" cy="272" r="16" fill="#fff"/></svg>'),
      sizes: 'any',
      type: 'image/svg+xml'
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
}

// ─── WINDOW RESIZE ───
function handleResize() {
  if (chartEngine && state.activeScreen === 'chart') {
    chartEngine.draw();
  }
}

// ─── INIT ───
async function init() {
  try {
  setupPWA();
  applyTheme();
  loadCachedScreener();
  initNotifications();
  renderNav();
  renderScreen();

  // Theme toggle
  document.getElementById('themeBtn').onclick = () => {
    state.darkMode = !state.darkMode;
    applyTheme();
    if (chartEngine && state.activeScreen === 'chart') chartEngine.draw();
  };

  // Refresh button
  document.getElementById('refreshBtn').onclick = () => {
    refreshAllTickers();
  };

  // Window resize
  window.addEventListener('resize', handleResize);

  // Load initial data (don't await - let UI render immediately while data loads)
  refreshAllTickers();

  // Auto-run screener if no fresh cached results (slight delay so UI renders first)
  if (state.screenerResults.length === 0) {
    setTimeout(() => runScreener(), 1500);
  }

  // Auto-refresh every 10 minutes (includes IBKR sync)
  setInterval(() => {
    if (isMarketOpen()) {
      refreshAllTickers();
      ibkrSyncAllConnected();
    }
  }, 600000);

  // IBKR keep-alive every 5 minutes
  setInterval(() => {
    PROFILES.forEach(name => {
      const pk = name.toLowerCase();
      if (profiles[pk].ibkrConnected) ibkrTickle(pk);
    });
  }, 300000);

  // Update market status every minute
  setInterval(() => {
    const open = isMarketOpen();
    document.getElementById('marketDot').className = 'market-dot ' + (open?'open':'closed');
    document.getElementById('marketStatus').textContent = open ? 'Market Open' : 'Market Closed';
  }, 60000);
  } catch(e) { console.error('Init error:', e); }
}

window.ibkrSaveAndConnect = async function() {
  const pk = getProfileKey();
  const input = document.getElementById('ibkrUrl');
  if (input) profiles[pk].ibkrGatewayUrl = input.value.replace(/\/+$/, '');

};

  ibkrDisconnect(getProfileKey());
};
window.ibkrSyncCurrent = async function() {
  showToast('Syncing IBKR positions...');
  await ibkrSync(getProfileKey());
  showToast('IBKR sync complete');
};

init();
