<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4f6f9">
<meta name="apple-mobile-web-app-title" content="CrossPoint">
<title>CrossPoint</title>
<style>
:root {
  --bg: #f4f6f9;
  --bg2: #eaecf1;
  --card: rgba(255,255,255,0.72);
  --card-solid: #fff;
  --card-border: rgba(137,180,250,0.25);
  --text: #1e1e2e;
  --text2: #585b70;
  --text3: #9399b2;
  --blue: #89b4fa;
  --blue2: #74c7ec;
  --green: #a6e3a1;
  --green2: #94e2d5;
  --teal: #94e2d5;
  --red: #f38ba8;
  --amber: #f9e2af;
  --amber2: #fab387;
  --surface: rgba(255,255,255,0.55);
  --shadow: 0 2px 16px rgba(30,30,46,0.06);
  --shadow2: 0 4px 24px rgba(30,30,46,0.10);
  --radius: 14px;
  --radius-sm: 10px;
  --mono: 'Space Grotesk','Inter','SF Pro Display',-apple-system,sans-serif;
  --sans: 'Inter','SF Pro Display','SF Pro Text',-apple-system,BlinkMacSystemFont,'Segoe UI Variable Display','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --sidebar-w: 220px;
  --header-h: 56px;
  --botnav-h: 68px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --bg: #1e1e2e;
  --bg2: #181825;
  --card: rgba(49,50,68,0.72);
  --card-solid: #313244;
  --card-border: rgba(137,180,250,0.18);
  --text: #cdd6f4;
  --text2: #a6adc8;
  --text3: #6c7086;
  --surface: rgba(49,50,68,0.55);
  --shadow: 0 2px 16px rgba(0,0,0,0.18);
  --shadow2: 0 4px 24px rgba(0,0,0,0.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--text);height:100%;overflow:hidden;transition:background var(--transition),color var(--transition);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-feature-settings:'cv01','cv02','cv03','cv04';letter-spacing:-0.011em;font-optical-sizing:auto}
#app{display:flex;height:100dvh;width:100%;position:relative}

/* Sidebar - Desktop */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100%;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:1px solid var(--card-border);display:flex;flex-direction:column;z-index:100;transition:background var(--transition)}
.sidebar-logo{padding:22px 18px 14px;display:flex;align-items:center;gap:12px}
.sidebar-logo svg{width:40px;height:40px}
.sidebar-logo span{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.sidebar-profiles{padding:6px 12px 12px}
.sidebar-profiles label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);display:block;margin-bottom:6px;padding-left:4px}
.profile-btns{display:flex;gap:4px}
.profile-btn{flex:1;padding:7px 0;border:1.5px solid var(--card-border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all var(--transition);font-family:var(--sans)}
.profile-btn.active{background:var(--blue);color:#1e1e2e;border-color:var(--blue)}
.sidebar-nav{flex:1;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:var(--text2);font-size:13.5px;font-weight:500;cursor:pointer;transition:all var(--transition);border:none;background:none;width:100%;text-align:left;font-family:var(--sans)}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--blue);color:#1e1e2e}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--card-border);font-size:11px;color:var(--text3)}
.market-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.market-dot.open{background:#a6e3a1}
.market-dot.closed{background:#f38ba8}

/* Main Content */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.header{height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--card-border);background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);flex-shrink:0;z-index:90}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.header-profiles{display:none}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:all var(--transition)}
.icon-btn:hover{background:var(--blue);color:#1e1e2e;border-color:var(--blue)}
.refresh-spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}

/* Bottom Nav - Mobile */
.botnav{display:none;height:var(--botnav-h);background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--card-border);padding:0 4px env(safe-area-inset-bottom);z-index:100}
.botnav-inner{display:flex;height:100%;align-items:center}
.botnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 2px;border:none;background:none;color:var(--text3);font-size:10px;font-weight:500;cursor:pointer;transition:all var(--transition);font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.botnav-item.active{color:var(--blue)}
.botnav-item svg{width:20px;height:20px}

/* Screen transitions */
.screen{display:none;animation:fadeIn 0.3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Summary Cards Row */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.summary-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:all var(--transition)}
.summary-card .label{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:4px}
.summary-card .value{font-size:24px;font-weight:700;font-family:var(--mono)}
.summary-card .value.green{color:#40a02b}
.summary-card .value.red{color:#d20f39}
.summary-card .value.amber{color:#df8e1d}

/* Signal Cards Grid */
.signal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.signal-card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:2px solid var(--card-border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.signal-card:hover{box-shadow:var(--shadow2);transform:translateY(-2px)}
.signal-card.long{border-color:rgba(166,227,161,0.5)}
.signal-card.long::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#a6e3a1,#94e2d5)}
.signal-card.short{border-color:rgba(243,139,168,0.5)}
.signal-card.short::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f38ba8,#fab387)}
.signal-card .ticker-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.signal-card .ticker{font-size:18px;font-weight:800;font-family:var(--mono)}
.signal-card .name{font-size:11px;color:var(--text3);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.signal-card .price{font-size:22px;font-weight:700;font-family:var(--mono)}
.signal-card .change{font-size:13px;font-family:var(--mono);font-weight:600}
.signal-card .change.up{color:#40a02b}
.signal-card .change.down{color:#d20f39}
.signal-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.signal-badge.long{background:rgba(166,227,161,0.2);color:#40a02b}
.signal-badge.short{background:rgba(243,139,168,0.2);color:#d20f39}
.signal-badge.neutral{background:rgba(147,153,178,0.15);color:var(--text3)}
.new-cross-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#fab387,#f9e2af);color:#1e1e2e;padding:4px 8px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:0.5px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(249,226,175,0.5)}50%{box-shadow:0 0 12px 4px rgba(249,226,175,0.3)}}
.ma-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--card-border)}
.ma-info .ma-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.ma-info .ma-val{font-size:13px;font-family:var(--mono);font-weight:600}
.days-since{font-size:11px;color:var(--text3);margin-top:6px}

/* Section headers */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px}
.section-header h2{font-size:16px;font-weight:700}
.section-header .count{font-size:12px;color:var(--text3);font-family:var(--mono)}

/* Chart Screen */
.chart-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.chart-header .back-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--card-border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);flex-shrink:0}
.chart-header .chart-ticker{font-size:24px;font-weight:800;font-family:var(--mono)}
.chart-header .chart-name{font-size:13px;color:var(--text3)}
.chart-header .chart-price{font-size:28px;font-weight:700;font-family:var(--mono);margin-left:auto}
.chart-container{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.chart-canvas-wrap{position:relative;width:100%;height:500px}
.chart-canvas-wrap canvas{width:100%;height:100%}
.chart-legend{display:flex;gap:16px;margin-top:10px;font-size:12px}
.chart-legend .legend-item{display:flex;align-items:center;gap:5px}
.chart-legend .legend-dot{width:10px;height:3px;border-radius:2px}
.chart-actions{display:flex;gap:8px;flex-wrap:wrap}
.chart-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.chart-info-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius-sm);padding:12px}
.chart-info-card .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.chart-info-card .val{font-size:16px;font-weight:700;font-family:var(--mono);margin-top:2px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--transition);font-family:var(--sans)}
.btn-primary{background:var(--blue);color:#1e1e2e}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-green{background:var(--green);color:#1e1e2e}
.btn-green:hover{filter:brightness(1.1)}
.btn-red{background:var(--red);color:#1e1e2e}
.btn-amber{background:var(--amber);color:#1e1e2e}
.btn-outline{background:transparent;border:1.5px solid var(--card-border);color:var(--text2)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{padding:6px 12px;font-size:12px}

/* Calculator */
.calc-wrap{max-width:560px;margin:0 auto}
.calc-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--card-border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:15px;font-family:var(--mono);transition:border-color var(--transition);outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-group input[readonly]{opacity:0.7;cursor:default}
.form-group .hint{font-size:11px;color:var(--text3);margin-top:3px}
.calc-outputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.calc-output{background:var(--bg2);border-radius:var(--radius-sm);padding:12px}
.calc-output .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.calc-output .val{font-size:18px;font-weight:700;font-family:var(--mono);margin-top:2px}
.risk-warning{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin:12px 0}
.risk-warning.green{background:rgba(166,227,161,0.15);color:#40a02b;border:1px solid rgba(166,227,161,0.3)}
.risk-warning.yellow{background:rgba(249,226,175,0.15);color:#df8e1d;border:1px solid rgba(249,226,175,0.3)}
.risk-warning.red{background:rgba(243,139,168,0.15);color:#d20f39;border:1px solid rgba(243,139,168,0.3)}

/* Portfolio */
.trade-card{background:var(--card);border:2px solid rgba(166,227,161,0.3);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px;transition:all var(--transition)}
.trade-card .trade-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.trade-card .trade-ticker{font-size:20px;font-weight:800;font-family:var(--mono)}
.trade-card .trade-date{font-size:11px;color:var(--text3)}
.trade-card .trade-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.trade-card .stat{background:var(--bg2);border-radius:var(--radius-sm);padding:8px 10px}
.trade-card .stat .label{font-size:10px;color:var(--text3);text-transform:uppercase}
.trade-card .stat .val{font-size:14px;font-weight:700;font-family:var(--mono)}
.tighten-alert{background:linear-gradient(135deg,rgba(249,226,175,0.15),rgba(250,179,135,0.15));border:1.5px solid rgba(249,226,175,0.4);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;font-weight:700;color:#df8e1d;margin:10px 0;animation:pulse 2s ease-in-out infinite}
.pyramid-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.pyramid-table th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--card-border);font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:0.5px}
.pyramid-table td{padding:6px 8px;border-bottom:1px solid var(--card-border);font-family:var(--mono);font-size:12px}
.pyramid-table tr.next-add{background:rgba(249,226,175,0.1)}
.pyramid-status{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:0.3px}
.pyramid-status.filled{background:rgba(166,227,161,0.2);color:#40a02b}
.pyramid-status.next{background:rgba(249,226,175,0.2);color:#df8e1d}
.pyramid-status.pending{background:rgba(147,153,178,0.1);color:var(--text3)}
.trade-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

/* Checklist */
.checklist-wrap{max-width:600px;margin:0 auto}
.checklist-card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.checklist-ticker{text-align:center;margin-bottom:20px}
.checklist-ticker .ticker{font-size:24px;font-weight:800;font-family:var(--mono)}
.progress-bar{height:6px;background:var(--bg2);border-radius:3px;margin:16px 0;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:3px;transition:width 0.4s ease}
.checklist-items{list-style:none}
.checklist-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--card-border);cursor:pointer;transition:background var(--transition);border-radius:var(--radius-sm);padding-left:8px;padding-right:8px}
.checklist-item:hover{background:var(--surface)}
.checklist-item .check-box{width:22px;height:22px;border:2px solid var(--card-border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--transition);margin-top:1px}
.checklist-item.checked .check-box{background:var(--green);border-color:var(--green)}
.checklist-item .check-text{font-size:14px;line-height:1.4;color:var(--text2)}
.checklist-item.checked .check-text{color:var(--text3);text-decoration:line-through}
.confirmed-banner{background:linear-gradient(135deg,var(--green),var(--teal));color:#1e1e2e;padding:16px 20px;border-radius:var(--radius);text-align:center;font-weight:700;font-size:15px;margin-top:20px;display:none}
.confirmed-banner.show{display:block;animation:fadeIn 0.5s ease}

/* Journal */
.journal-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.journal-stat{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:14px;text-align:center}
.journal-stat .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.journal-stat .val{font-size:20px;font-weight:700;font-family:var(--mono);margin-top:4px}
.journal-table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--shadow)}
.journal-table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
.journal-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--card-border);font-size:11px;text-transform:uppercase;color:var(--text3);letter-spacing:0.5px;cursor:pointer;white-space:nowrap;user-select:none}
.journal-table th:hover{color:var(--blue)}
.journal-table td{padding:10px 12px;border-bottom:1px solid var(--card-border);font-family:var(--mono);font-size:12px}
.journal-table tr:hover{background:var(--surface)}
.rules-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.rules-badge.yes{background:rgba(166,227,161,0.2);color:#40a02b}
.rules-badge.no{background:rgba(243,139,168,0.2);color:#d20f39}

/* Screener section */
.screener-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.screener-progress{height:4px;background:var(--bg2);border-radius:2px;margin-bottom:16px;overflow:hidden}
.screener-progress .fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width 0.3s ease}
.screener-table-wrap{overflow-x:auto;background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);box-shadow:var(--shadow)}
.screener-table{width:100%;border-collapse:collapse;font-size:13px;min-width:600px}
.screener-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--card-border);font-size:11px;text-transform:uppercase;color:var(--text3);letter-spacing:0.5px;white-space:nowrap}
.screener-table td{padding:8px 12px;border-bottom:1px solid var(--card-border);font-family:var(--mono);font-size:12px}
.screener-table tr:hover{background:var(--surface)}

/* Modal overlay */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--card-solid);border-radius:var(--radius);padding:24px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow2)}
.modal h3{font-size:18px;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3)}
.loading-spinner{width:24px;height:24px;border:3px solid var(--card-border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:10px}

/* Toast */

// ─── YAHOO FINANCE API ───
async function fetchWithTimeout(url, timeoutMs = 8000) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(url, {signal: controller.signal, headers:{'Accept':'application/json'}});
    clearTimeout(timer);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch(e) {
    clearTimeout(timer);
    throw e;
  }
}

async function fetchYahoo(url) {
  try {
    return await fetchWithTimeout(CORS_PROXY + encodeURIComponent(url), 8000);
  } catch(e) {
    try {
      return await fetchWithTimeout('https://api.allorigins.win/raw?url=' + encodeURIComponent(url), 8000);
    } catch(e2) {
      return null;
    }
  }
}

async function fetchChartData(ticker, range='1y', interval='1d') {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=${range}&interval=${interval}&includePrePost=false`;
  const data = await fetchYahoo(url);
  if (!data || !data.chart || !data.chart.result || !data.chart.result[0]) return null;
  const r = data.chart.result[0];
  const q = r.indicators.quote[0];
  return {
    meta: r.meta,
    timestamps: r.timestamp || [],
    open: q.open || [],
    high: q.high || [],
    low: q.low || [],
    close: q.close || [],
    volume: q.volume || []
  };
}

}

// ─── CALCULATIONS ───
function calcSMA(closes, period) {
  const valid = closes.filter(c => c != null);
  if (valid.length < period) return null;
  const slice = valid.slice(-period);
  return slice.reduce((a,b) => a+b, 0) / period;
}

function calcSMAArray(closes, period) {
  const result = [];
  for (let i = 0; i < closes.length; i++) {
    if (i < period - 1) { result.push(null); continue; }
    let sum = 0, count = 0;
    for (let j = i - period + 1; j <= i; j++) {
      if (closes[j] != null) { sum += closes[j]; count++; }
    }
    result.push(count === period ? sum / period : null);
  }
  return result;
}

function calcATR(highs, lows, closes, period=14) {
  if (highs.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < highs.length; i++) {
    if (highs[i]==null||lows[i]==null||closes[i-1]==null) continue;
    const tr = Math.max(highs[i]-lows[i], Math.abs(highs[i]-closes[i-1]), Math.abs(lows[i]-closes[i-1]));
    trs.push(tr);
  }
  if (trs.length < period) return null;
  let atr = trs.slice(0, period).reduce((a,b)=>a+b,0) / period;
  for (let i = period; i < trs.length; i++) {
    atr = (atr * (period - 1) + trs[i]) / period;
  }
  return atr;
}

function findCrossovers(ma10Arr, ma20Arr, timestamps) {
  const crosses = [];
  for (let i = 1; i < ma10Arr.length; i++) {
    if (ma10Arr[i]==null||ma10Arr[i-1]==null||ma20Arr[i]==null||ma20Arr[i-1]==null) continue;
    const prevAbove = ma10Arr[i-1] > ma20Arr[i-1];
    const currAbove = ma10Arr[i] > ma20Arr[i];
    if (prevAbove !== currAbove) {
      crosses.push({index:i, timestamp:timestamps[i], type:currAbove?'bullish':'bearish'});
    }
  }
  return crosses;
}

function getSignalInfo(closes, timestamps) {
  const ma10Arr = calcSMAArray(closes, 10);
  const ma20Arr = calcSMAArray(closes, 20);
  const ma10 = ma10Arr[ma10Arr.length-1];
  const ma20 = ma20Arr[ma20Arr.length-1];
  const crosses = findCrossovers(ma10Arr, ma20Arr, timestamps);
  let signal = 'NEUTRAL', daysSinceCross = null, isNewCross = false;
  if (ma10 != null && ma20 != null) {
    signal = ma10 > ma20 ? 'LONG' : ma10 < ma20 ? 'SHORT' : 'NEUTRAL';
  }
  if (crosses.length > 0) {
    const last = crosses[crosses.length - 1];
    // Count trading days (bars) since last crossover, not calendar days
    // This matches TradingView's bar-based counting
    daysSinceCross = closes.length - 1 - last.index;
    const lastTs = last.timestamp * 1000;
    const today = new Date();
    const crossDate = new Date(lastTs);
    isNewCross = crossDate.toDateString() === today.toDateString() || daysSinceCross === 0;
  }
  return {ma10, ma20, signal, daysSinceCross, isNewCross, ma10Arr, ma20Arr, crosses};
}

// ─── DATA MANAGEMENT ───
async function loadTickerData(ticker) {
  const cached = state.tickerData[ticker];
  if (cached && Date.now() - cached.fetchedAt < 600000) return cached; // 10 min cache

  const chart = await fetchChartData(ticker);
  if (!chart) {
    // Return cached even if stale, or create placeholder
    return cached || {ticker, error:true, price:0, change:0, changePct:0, signal:'NEUTRAL',ma10:null,ma20:null,daysSinceCross:null,isNewCross:false,atr:null,fetchedAt:Date.now()};
  }

  const closes = chart.close;
  const price = chart.meta.regularMarketPrice || closes[closes.length-1] || 0;
  // Use previousClose (yesterday's close) for daily change, NOT chartPreviousClose (start of chart range)
  const validCloses = closes.filter(c => c != null);
  const prevClose = chart.meta.previousClose || (validCloses.length >= 2 ? validCloses[validCloses.length - 2] : price);
  const change = price - prevClose;
  const changePct = prevClose ? (change / prevClose) * 100 : 0;
  const name = TICKER_NAMES[ticker] || chart.meta.shortName || chart.meta.symbol || ticker;

  const sigInfo = getSignalInfo(closes, chart.timestamps);
  const atr = calcATR(chart.high, chart.low, closes, 14);

  const result = {
    ticker, name, price, change, changePct, ...sigInfo, atr,
    closes, opens: chart.open, highs: chart.high, lows: chart.low,
    timestamps: chart.timestamps, volumes: chart.volume,
    fetchedAt: Date.now()
  };
  state.tickerData[ticker] = result;
  return result;
}

function fmpCacheGet(key, maxAge) {
  try {
    const s = localStorage.getItem(key);
    if (!s) return null;
    const d = JSON.parse(s);
    if (Date.now() - d.ts > maxAge) return null;
    return d.data;
  } catch (_) { return null; }
}
function fmpCacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch (_) {}
}

  if (cached) { console.log(`[Screener] Universe (cached): ${cached.length} stocks`); return cached; }

  // Pre-filter universe at screener level: mktcap>2B, vol>500K, price>5

  const urls = [
    `https://financialmodelingprep.com/api/v3/stock-screener?marketCapMoreThan=2000000000&volumeMoreThan=500000&priceMoreThan=5&exchange=NYSE,NASDAQ,AMEX&limit=1500&apikey=${FMP_KEY}`,

  ];
  for (const url of urls) {
    try {

      const data = await resp.json();
      if (Array.isArray(data) && data.length > 20) {
        const tickers = data
          .map(s => (s.symbol || s.Symbol || '').toUpperCase())
          .filter(s => /^[A-Z]{1,5}$/.test(s)); // US exchange symbols only (no dots/hyphens)

// Fetch EPS growth, revenue growth, ROE TTM, operating margin TTM from Yahoo Finance
// Uses the same quoteSummary API + proxy we already use for price data — no key needed
async function fetchYahooFundamentals(ticker) {
  const cacheKey = `tp_yf_fund_${ticker}`;
  const cached = fmpCacheGet(cacheKey, 86400000); // 24h cache
  if (cached) return cached;
  try {
    const url = `https://query1.finance.yahoo.com/v10/finance/quoteSummary/${ticker}?modules=financialData`;
    const data = await fetchYahoo(url);
    const fd = data?.quoteSummary?.result?.[0]?.financialData;
    if (!fd) return null;

    const result = {
      epsGrowth:       fd.earningsGrowth?.raw  ?? null, // Quarterly earnings growth YoY
      revenueGrowth:   fd.revenueGrowth?.raw   ?? null, // Quarterly revenue growth YoY
      roe:             fd.returnOnEquity?.raw   ?? null, // Return on equity TTM
      operatingMargin: fd.operatingMargins?.raw ?? null, // Operating margin TTM
    };
    fmpCacheSet(cacheKey, result);
    return result;
  } catch (e) {
    console.warn(`[Screener] Yahoo fundamentals failed for ${ticker}:`, e.message);
    return null;
  }
}

async function fetchQuickScreen(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=1y&interval=1d&includePrePost=false`;
  const data = await fetchYahoo(url);
  if (!data?.chart?.result?.[0]) return null;
  const r = data.chart.result[0];
  const q = r.indicators.quote[0];
  const closes = (q.close || []).filter(c => c != null);
  const volumes = (q.volume || []).filter(v => v != null);
  if (closes.length < 60) return null;

  const ma10Arr = calcSMAArray(closes, 10);
  const ma20Arr = calcSMAArray(closes, 20);
  const ma10 = ma10Arr[ma10Arr.length - 1];
  const ma20 = ma20Arr[ma20Arr.length - 1];
  const trendDir = (ma10 != null && ma20 != null) ? (ma10 > ma20 ? 'LONG' : 'SHORT') : 'NEUTRAL';
  let trendDays = 0;
  for (let i = ma10Arr.length - 1; i > 0; i--) {
    if (!ma10Arr[i] || !ma10Arr[i-1] || !ma20Arr[i] || !ma20Arr[i-1]) break;
    if ((ma10Arr[i] > ma20Arr[i]) !== (ma10Arr[i-1] > ma20Arr[i-1])) break;
    trendDays++;
  }
  const highs = (q.high || []).filter(h => h != null);
  const lows = (q.low || []).filter(l => l != null);
  const atr = calcATR(highs, lows, closes, 14);

  // 6-month performance (approx 126 trading days)
  const perf6m = closes.length >= 126
    ? ((closes[closes.length-1] - closes[closes.length-126]) / closes[closes.length-126]) * 100
    : ((closes[closes.length-1] - closes[0]) / closes[0]) * 100;

  // 30-day average volume
  const avgVol = volumes.length >= 30
    ? volumes.slice(-30).reduce((a,b) => a+b, 0) / 30
    : volumes.reduce((a,b) => a+b, 0) / Math.max(volumes.length, 1);

  return {
    ticker,
    price: r.meta.regularMarketPrice || closes[closes.length - 1],
    marketCap: r.meta.marketCap || 0,
    trendDir, trendDays, atr, perf6m, avgVol,
    ts: Date.now()
  };
}

async function runScreener() {
  if (state.screenerRunning) return;
  state.screenerRunning = true;
  state.screenerProgress = 0;
  if (state.activeScreen === 'dashboard') renderDashboard();

  // ── Phase 1: Get candidate universe (FMP screener → whole market, or fallback) ──
  showToast('Building candidate universe...');
  const candidates = await fetchFMPCandidates();
  console.log(`[Screener] Scanning ${candidates.length} stocks`);

  // ── Phase 2: Yahoo MA signal + price data for all candidates ──
  const cache = loadScreenCache();
  const now = Date.now();
  const YAHOO_TTL = 3600000; // 1h
  const needsFetch = candidates.filter(t => !cache[t] || (now - cache[t].ts) > YAHOO_TTL);
  showToast(`Scanning ${candidates.length} stocks (${needsFetch.length} need refresh)...`);

  const batchSize = 8;
  for (let i = 0; i < needsFetch.length; i += batchSize) {
    const batch = needsFetch.slice(i, i + batchSize);
    const results = await Promise.all(batch.map(t => fetchQuickScreen(t)));
    results.forEach((r, j) => { if (r) cache[batch[j]] = r; });
    state.screenerProgress = Math.round((i / Math.max(needsFetch.length, 1)) * 50);
    if (state.activeScreen === 'dashboard') renderScreenerProgress();
    if (i + batchSize < needsFetch.length) await new Promise(r => setTimeout(r, 300));
  }
  saveScreenCache(cache);

  // Pre-filter: liquidity + size only (perf6m applied after fundamentals so it shows in table)
  const preCandidates = candidates.filter(t => {
    const d = cache[t];
    if (!d) return false;
    if (d.avgVol > 0 && d.avgVol < 500000) return false;          // Avg Volume 30D > 500K
    if (d.marketCap > 0 && d.marketCap < 2e9) return false;       // Market cap > $2B
    return true;
  });
  console.log(`[Screener] Pre-filter: ${preCandidates.length} stocks pass size/volume/perf filters`);
  showToast(`${preCandidates.length} stocks pass size filters — fetching EPS/revenue growth...`);

  // ── Phase 3: FMP fundamentals — cap at 100 to stay within 250 calls/day free tier ──
  // (100 stocks × 2 endpoints = 200 calls + ~2 for universe = 202 total)
  const toCheck = [...preCandidates]
    .sort((a, b) => (cache[b]?.perf6m || 0) - (cache[a]?.perf6m || 0)) // strongest 6M first
    .slice(0, 100);

  console.log(`[Screener] Fetching fundamentals for ${toCheck.length} stocks...`);
  showToast(`Fetching fundamentals for ${toCheck.length} stocks...`);

  const batchSize2 = 5;
  for (let i = 0; i < toCheck.length; i += batchSize2) {
    const batch = toCheck.slice(i, i + batchSize2);
    await Promise.all(batch.map(t => fetchYahooFundamentals(t)));
    state.screenerProgress = 50 + Math.round((i / Math.max(toCheck.length, 1)) * 45);
    if (state.activeScreen === 'dashboard') renderScreenerProgress();
    if (i + batchSize2 < toCheck.length) await new Promise(r => setTimeout(r, 200));
  }

  // Log a sample to verify field names are resolving correctly
  if (toCheck[0]) {
    console.log(`[Screener] Sample fundamentals (${toCheck[0]}):`, JSON.stringify(fmpCacheGet(`tp_yf_fund_${toCheck[0]}`, 86400000)));
  }

  const withData = toCheck.filter(t => {
    const f = fmpCacheGet(`tp_yf_fund_${t}`, 86400000);
    return f && f.epsGrowth != null && f.revenueGrowth != null;
  });
  console.log(`[Screener] Complete fundamental data for ${withData.length}/${toCheck.length} stocks`);
  showToast(`Fundamentals loaded — applying all 7 filters...`);

  // ── Phase 4: All 7 criteria — strict AND logic, missing data = excluded ──
  const qualified = [];
  for (const ticker of toCheck) {
    const tech = cache[ticker];
    if (!tech) continue;

    const f = fmpCacheGet(`tp_yf_fund_${ticker}`, 86400000);
    if (!f) { console.log(`[Filter] ${ticker}: no fundamental data`); continue; }

    const { epsGrowth, revenueGrowth, roe, operatingMargin } = f;

    // All 7 criteria must pass — null data means excluded
    if (epsGrowth       == null || epsGrowth       < 0.50) continue; // EPS dil growth Qtrly YoY > 50%
    if (revenueGrowth   == null || revenueGrowth   < 0.25) continue; // Revenue growth Qtrly YoY > 25%
    if (roe             == null || roe             < 0.17) continue; // ROE TTM > 17%
    if (operatingMargin == null || operatingMargin < 0)    continue; // Operating margin TTM > 0%
    if (tech.perf6m < 20)                                  continue; // 6M performance > 20%
    // Volume > 500K and mktcap > $2B enforced in pre-filter above

    qualified.push({ ticker, price: tech.price, trendDir: tech.trendDir, trendDays: tech.trendDays, atr: tech.atr, perf6m: tech.perf6m, epsGrowth, revenueGrowth, roe, operatingMargin });
  }

  // LONG signals first, then by EPS growth descending
  qualified.sort((a, b) => {
    if (a.trendDir === 'LONG' && b.trendDir !== 'LONG') return -1;
    if (b.trendDir === 'LONG' && a.trendDir !== 'LONG') return 1;
    return b.epsGrowth - a.epsGrowth;
  });

  state.screenerResults = qualified.slice(0, 10); // Top 10 best stocks
  state.screenerRunning = false;
  state.screenerProgress = 100;

  localStorage.setItem('tp_screener', JSON.stringify({ results: state.screenerResults, timestamp: Date.now() }));
  if (state.activeScreen === 'dashboard') renderDashboard();
  showToast(`CANSLIM screen complete — ${qualified.length} qualify, showing top ${Math.min(10, qualified.length)}`);
}

// ─── MARKET STATUS ───
function isMarketOpen() {
  const now = new Date();
  const ny = new Date(now.toLocaleString('en-US', {timeZone: 'America/New_York'}));
  const day = ny.getDay();
  if (day === 0 || day === 6) return false;
  const h = ny.getHours(), m = ny.getMinutes();
  const mins = h * 60 + m;
  return mins >= 570 && mins <= 960; // 9:30 AM - 4:00 PM ET
}

// ─── CHART ENGINE (Canvas) ───
class ChartEngine {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.padding = {top:20,right:80,bottom:40,left:10};
    this.data = null;
    this.overlays = [];
    this.hoverIndex = -1;
    this.hoverY = -1; // raw canvas Y for crosshair
    // Zoom/scroll state: viewStart and viewEnd are indices into the data array
    this.viewStart = 0;
    this.viewEnd = 0;
    this.minBars = 30; // minimum bars visible when zoomed in
    this.isDragging = false;
    this.dragStartX = 0;
    this.dragStartView = 0;
    this.setupEvents();
  }

  setupEvents() {
    const c = this.canvas;
    c.style.touchAction = 'none'; // prevent browser from intercepting touch gestures

    // ── DESKTOP: Mouse drag to pan ──────────────────────────────
    c.addEventListener('mousedown', e => {
      this.isDragging = true;
      this.dragStartX = e.clientX;
      this.dragStartView = this.viewStart;
      c.style.cursor = 'grabbing';
    });
    c.addEventListener('mouseup', () => { this.isDragging = false; c.style.cursor = 'crosshair'; });
    c.addEventListener('mouseleave', () => { this.hoverIndex = -1; this.hoverY = -1; this.isDragging = false; c.style.cursor = 'crosshair'; this.draw(); });
    c.addEventListener('mousemove', e => {
      if (this.isDragging) { this.handleDrag(e); return; }
      const rect = c.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      this.hoverY = (e.clientY - rect.top) * dpr;
      this.handleHover((e.clientX - rect.left) * dpr);
    });

    // ── DESKTOP: Scroll to zoom centered on cursor ───────────────
    c.addEventListener('wheel', e => {
      e.preventDefault();
      if (!this.data) return;
      const total = this.data.closes.length;
      const visibleBars = this.viewEnd - this.viewStart;
      // 12% zoom per scroll tick, centered on cursor position
      const zoomFactor = e.deltaY < 0 ? 0.88 : 1.12;
      const newVisible = Math.round(Math.max(this.minBars, Math.min(total, visibleBars * zoomFactor)));
      const rect = c.getBoundingClientRect();
      const relX = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const focusBar = this.viewStart + relX * visibleBars;
      let newStart = Math.round(focusBar - relX * newVisible);
      newStart = Math.max(0, Math.min(newStart, total - newVisible));
      this.viewStart = newStart;
      this.viewEnd = Math.min(total, newStart + newVisible);
      this.draw();
    }, {passive: false});

    // ── MOBILE: Unified touch handler ───────────────────────────
    let touchStartX = 0, touchStartView = 0;
    let lastPinchDist = 0, lastPinchMid = 0;
    let isTouchPanning = false;

    c.addEventListener('touchstart', e => {
      e.preventDefault();
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
        touchStartView = this.viewStart;
        isTouchPanning = false;
      } else if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastPinchDist = Math.sqrt(dx*dx + dy*dy);
        lastPinchMid = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        isTouchPanning = false;
      }
    }, {passive: false});

    c.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!this.data) return;
      const total = this.data.closes.length;
      const rect = c.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      if (e.touches.length === 1) {
        const dx = e.touches[0].clientX - touchStartX;
        if (Math.abs(dx) > 4) isTouchPanning = true;

        if (isTouchPanning) {
          // Smooth pan: shift view by dragged pixels
          const visibleBars = this.viewEnd - this.viewStart;
          const pxPerBar = rect.width / visibleBars;
          const barShift = Math.round(-dx / pxPerBar);
          let newStart = Math.max(0, Math.min(touchStartView + barShift, total - visibleBars));
          this.viewStart = newStart;
          this.viewEnd = newStart + visibleBars;
          this.hoverIndex = -1;
        } else {
          // Show crosshair while finger is still
          const x = (e.touches[0].clientX - rect.left) * dpr;
          this.hoverY = (e.touches[0].clientY - rect.top) * dpr;
          this.handleHover(x);
        }
      } else if (e.touches.length === 2) {
        // Pinch zoom centered on midpoint between fingers
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const scale = dist / Math.max(lastPinchDist, 1);
        lastPinchDist = dist;
        const visibleBars = this.viewEnd - this.viewStart;
        const newVisible = Math.round(Math.max(this.minBars, Math.min(total, visibleBars / scale)));
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const relX = Math.max(0, Math.min(1, (midX - rect.left) / rect.width));
        const focusBar = this.viewStart + relX * visibleBars;
        let newStart = Math.round(focusBar - relX * newVisible);
        newStart = Math.max(0, Math.min(newStart, total - newVisible));
        this.viewStart = newStart;
        this.viewEnd = Math.min(total, newStart + newVisible);
        this.hoverIndex = -1;
      }
      this.draw();
    }, {passive: false});

    c.addEventListener('touchend', () => {
      if (!isTouchPanning) { this.hoverIndex = -1; this.hoverY = -1; this.draw(); }
      isTouchPanning = false;
    });

    c.style.cursor = 'crosshair';
  }

  handleDrag(e) {
    if (!this.data) return;
    const rect = this.canvas.getBoundingClientRect();
    const plotW = rect.width - this.padding.left - this.padding.right;
    const visibleBars = this.viewEnd - this.viewStart;
    const pxPerBar = plotW / visibleBars;
    const dx = e.clientX - this.dragStartX;
    const barShift = Math.round(-dx / pxPerBar);
    const total = this.data.closes.length;
    let newStart = this.dragStartView + barShift;
    newStart = Math.max(0, Math.min(newStart, total - visibleBars));
    this.viewStart = newStart;
    this.viewEnd = newStart + visibleBars;
    this.draw();
  }

  handleHover(x) {
    if (!this.data) return;
    const visibleBars = this.viewEnd - this.viewStart;
    const plotW = this.canvas.width - this.padding.left - this.padding.right;
    const barW = plotW / visibleBars;
    const idx = this.viewStart + Math.floor((x - this.padding.left) / barW);
    if (idx >= this.viewStart && idx < this.viewEnd && idx !== this.hoverIndex) {
      this.hoverIndex = idx;
      this.draw();
    }
  }

  setData(data) {
    this.data = data;
    this.hoverIndex = -1;
    // Default view: show all data
    this.viewStart = 0;
    this.viewEnd = data.closes ? data.closes.length : 0;
    this.draw();
  }

  setOverlays(overlays) {
    this.overlays = overlays;
    this.draw();
  }

  draw() {
    const canvas = this.canvas;
    const ctx = this.ctx;
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.scale(dpr, dpr);

    const w = rect.width, h = rect.height;
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const bgColor = isDark ? '#1e1e2e' : '#ffffff';
    const gridColor = isDark ? 'rgba(108,112,134,0.15)' : 'rgba(147,153,178,0.12)';
    const textColor = isDark ? '#a6adc8' : '#9399b2';
    const priceColor = isDark ? '#cdd6f4' : '#1e1e2e';

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, w, h);

    if (!this.data || !this.data.closes || this.data.closes.length === 0) {
      ctx.fillStyle = textColor;
      ctx.font = '14px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('No data available', w/2, h/2);
      return;
    }

    const {closes, timestamps, ma10Arr, ma20Arr, crosses} = this.data;
    const pad = this.padding;
    const plotX = pad.left, plotY = pad.top;
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;
    const vs = this.viewStart, ve = this.viewEnd;
    const visibleBars = ve - vs;

    // Find price range for visible portion only
    let minP = Infinity, maxP = -Infinity;
    const {opens: dOpens, highs: dHighs, lows: dLows} = this.data;
    for (let i = vs; i < ve; i++) {
      if (dHighs && dHighs[i] != null) maxP = Math.max(maxP, dHighs[i]);
      if (dLows && dLows[i] != null) minP = Math.min(minP, dLows[i]);
      if (closes[i] != null) { minP = Math.min(minP, closes[i]); maxP = Math.max(maxP, closes[i]); }
      if (ma10Arr && ma10Arr[i] != null) { minP = Math.min(minP, ma10Arr[i]); maxP = Math.max(maxP, ma10Arr[i]); }
      if (ma20Arr && ma20Arr[i] != null) { minP = Math.min(minP, ma20Arr[i]); maxP = Math.max(maxP, ma20Arr[i]); }
    }
    this.overlays.forEach(o => { minP = Math.min(minP, o.price); maxP = Math.max(maxP, o.price); });
    const range = maxP - minP || 1;
    minP -= range * 0.05;
    maxP += range * 0.05;
    const priceRange = maxP - minP;

    // Map data index to x position within the visible window
    const toX = i => plotX + ((i - vs) / (visibleBars - 1)) * plotW;
    const toY = p => plotY + (1 - (p - minP) / priceRange) * plotH;

    // Grid lines
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    const gridLines = 6;
    for (let i = 0; i <= gridLines; i++) {
      const y = plotY + (i / gridLines) * plotH;
      const price = maxP - (i / gridLines) * priceRange;
      ctx.beginPath(); ctx.moveTo(plotX, y); ctx.lineTo(plotX + plotW, y); ctx.stroke();
      ctx.fillStyle = textColor;
      ctx.font = '11px SF Mono, monospace';
      ctx.textAlign = 'right';
      ctx.fillText(price.toFixed(2), w - 4, y + 4);
    }

    // Date labels (visible range only)
    ctx.fillStyle = textColor;
    ctx.font = '10px system-ui';
    ctx.textAlign = 'center';
    const dateStep = Math.max(1, Math.floor(visibleBars / 8));
    for (let i = vs; i < ve; i += dateStep) {
      if (timestamps[i]) {
        const d = new Date(timestamps[i] * 1000);
        const label = d.toLocaleDateString('en-US', {month:'short',day:'numeric'});
        ctx.fillText(label, toX(i), h - 8);
      }
    }

    // Candlesticks
    const {opens, highs, lows} = this.data;
    const rawCandleW = (plotW / visibleBars) * 0.7;
    const candleW = Math.max(2, Math.min(rawCandleW, 14));
    const wickW = Math.max(1, candleW > 6 ? 1.5 : 1);
    const candleR = candleW > 5 ? 1.5 : 0; // rounded corners when wide enough
    const bullColor = isDark ? '#26a69a' : '#26a69a';
    const bearColor = isDark ? '#ef5350' : '#ef5350';
    const bullFill = isDark ? 'rgba(38,166,154,0.2)' : 'rgba(38,166,154,0.15)';
    const dojiColor = isDark ? '#a6adc8' : '#585b70';
    let started = false;

    if (opens && highs && lows) {
      for (let i = vs; i < ve; i++) {
        const o = opens[i], hi = highs[i], lo = lows[i], c = closes[i];
        if (o == null || hi == null || lo == null || c == null) continue;
        const x = toX(i);
        const isBull = c >= o;
        const color = c === o ? dojiColor : isBull ? bullColor : bearColor;

        // Wick (high-low line)
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = wickW;
        ctx.moveTo(x, toY(hi));
        ctx.lineTo(x, toY(lo));
        ctx.stroke();

        // Body (open-close rect with optional rounding)
        const bodyTop = toY(Math.max(o, c));
        const bodyBot = toY(Math.min(o, c));
        const bodyH = Math.max(1, bodyBot - bodyTop);
        ctx.fillStyle = isBull ? bullFill : bearColor;
        if (candleR > 0 && bodyH > 3) {
          ctx.beginPath();
          ctx.roundRect(x - candleW/2, bodyTop, candleW, bodyH, candleR);
          ctx.fill();
          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.stroke();
        } else {
          ctx.fillRect(x - candleW/2, bodyTop, candleW, bodyH);
          ctx.strokeStyle = color;
          ctx.lineWidth = 1;
          ctx.strokeRect(x - candleW/2, bodyTop, candleW, bodyH);
        }
      }
    } else {
      // Fallback: line chart if no OHLC
      ctx.beginPath();
      ctx.strokeStyle = priceColor;
      ctx.lineWidth = 1.5;
      for (let i = vs; i < ve; i++) {
        if (closes[i] == null) continue;
        if (!started) { ctx.moveTo(toX(i), toY(closes[i])); started = true; }
        else ctx.lineTo(toX(i), toY(closes[i]));
      }
      ctx.stroke();
    }

    // MA10 line
    if (ma10Arr) {
      ctx.beginPath();
      ctx.strokeStyle = '#89b4fa';
      ctx.lineWidth = 1.8;
      started = false;
      for (let i = vs; i < ve; i++) {
        if (ma10Arr[i] == null) continue;
        if (!started) { ctx.moveTo(toX(i), toY(ma10Arr[i])); started = true; }
        else ctx.lineTo(toX(i), toY(ma10Arr[i]));
      }
      ctx.stroke();
    }

    // MA20 line
    if (ma20Arr) {
      ctx.beginPath();
      ctx.strokeStyle = '#94e2d5';
      ctx.lineWidth = 1.8;
      started = false;
      for (let i = vs; i < ve; i++) {
        if (ma20Arr[i] == null) continue;
        if (!started) { ctx.moveTo(toX(i), toY(ma20Arr[i])); started = true; }
        else ctx.lineTo(toX(i), toY(ma20Arr[i]));
      }
      ctx.stroke();
    }

    // Crossover markers (only visible ones)
    if (crosses) {
      crosses.forEach(cross => {
        if (cross.index < vs || cross.index >= ve) return;
        const x = toX(cross.index);
        const y = toY(closes[cross.index] || 0);
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fillStyle = cross.type === 'bullish' ? '#26a69a' : '#ef5350';
        ctx.fill();
        ctx.strokeStyle = bgColor;
        ctx.lineWidth = 2;
        ctx.stroke();
      });
    }

    // Horizontal overlays (entry, stop, pyramid levels)
    this.overlays.forEach(o => {
      const y = toY(o.price);
      if (y < plotY || y > plotY + plotH) return;
      ctx.beginPath();
      ctx.setLineDash(o.dash || [6, 4]);
      ctx.strokeStyle = o.color || '#89b4fa';
      ctx.lineWidth = 1;
      ctx.moveTo(plotX, y);
      ctx.lineTo(plotX + plotW, y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = o.color || '#89b4fa';
      ctx.font = 'bold 10px system-ui';
      ctx.textAlign = 'left';
      ctx.fillText(o.label + ' ' + o.price.toFixed(2), plotX + 4, y - 4);
    });

    // Crosshair + price label (TradingView style)
    const mouseY = this.hoverY;
    const inPlot = mouseY >= plotY * dpr && mouseY <= (plotY + plotH) * dpr;

    // Always draw horizontal crosshair line at mouse Y with price label on right axis
    if (inPlot && mouseY > 0) {
      const scaledY = mouseY / dpr;
      const crossPrice = maxP - ((scaledY - plotY) / plotH) * priceRange;

      // Horizontal dashed line
      ctx.beginPath();
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = isDark ? 'rgba(166,172,205,0.4)' : 'rgba(88,91,112,0.35)';
      ctx.lineWidth = 0.7;
      ctx.moveTo(plotX, scaledY);
      ctx.lineTo(plotX + plotW, scaledY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Price label on right Y-axis
      const labelW = 68, labelH = 20;
      const labelX = plotX + plotW + 2;
      const labelY = scaledY - labelH / 2;
      ctx.fillStyle = isDark ? '#89b4fa' : '#5b7ee5';
      ctx.beginPath();
      ctx.roundRect(labelX, labelY, labelW, labelH, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px SF Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(crossPrice.toFixed(2), labelX + labelW / 2, labelY + 14);
    }

    // Vertical crosshair + OHLC tooltip when hovering a specific bar
    if (this.hoverIndex >= vs && this.hoverIndex < ve && closes[this.hoverIndex] != null) {
      const hx = toX(this.hoverIndex);
      const hy = toY(closes[this.hoverIndex]);

      // Vertical dashed line
      ctx.beginPath();
      ctx.setLineDash([4, 3]);
      ctx.strokeStyle = isDark ? 'rgba(166,172,205,0.4)' : 'rgba(88,91,112,0.35)';
      ctx.lineWidth = 0.7;
      ctx.moveTo(hx, plotY);
      ctx.lineTo(hx, plotY + plotH);
      ctx.stroke();
      ctx.setLineDash([]);

      // Date label on bottom X-axis
      if (timestamps[this.hoverIndex]) {
        const dateStr = new Date(timestamps[this.hoverIndex] * 1000).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
        const dateLabelW = ctx.measureText(dateStr).width + 14;
        const dateLabelH = 18;
        const dateLabelX = hx - dateLabelW / 2;
        const dateLabelY = plotY + plotH + 4;
        ctx.fillStyle = isDark ? '#89b4fa' : '#5b7ee5';
        ctx.beginPath();
        ctx.roundRect(Math.max(plotX, dateLabelX), dateLabelY, dateLabelW, dateLabelH, 3);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(dateStr, hx, dateLabelY + 13);
      }

      // OHLC info bar at top of chart
      const idx = this.hoverIndex;
      const o = dOpens ? dOpens[idx] : null;
      const hi = dHighs ? dHighs[idx] : null;
      const lo = dLows ? dLows[idx] : null;
      const c = closes[idx];
      const m10 = ma10Arr ? ma10Arr[idx] : null;
      const m20 = ma20Arr ? ma20Arr[idx] : null;
      const isBull = o != null && c >= o;

      let infoText = '';
      if (o != null) infoText += `O ${o.toFixed(2)}  H ${hi.toFixed(2)}  L ${lo.toFixed(2)}  C ${c.toFixed(2)}`;
      else infoText += `$${c.toFixed(2)}`;
      if (m10 != null) infoText += `   MA10 ${m10.toFixed(2)}`;
      if (m20 != null) infoText += `   MA20 ${m20.toFixed(2)}`;

      ctx.fillStyle = isDark ? 'rgba(30,30,46,0.85)' : 'rgba(244,246,249,0.9)';
      ctx.fillRect(plotX, plotY, plotW, 22);
      ctx.font = '11px SF Mono, monospace';
      ctx.textAlign = 'left';
      ctx.fillStyle = o != null ? (isBull ? '#26a69a' : '#ef5350') : priceColor;
      ctx.fillText(infoText, plotX + 6, plotY + 15);

      // Small dot on the close price
      ctx.beginPath();
      ctx.arc(hx, hy, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = isDark ? '#89b4fa' : '#5b7ee5';
      ctx.fill();
    }
  }
}

// ─── UI RENDERING ───
function renderNav() {
  // Sidebar nav
  const sidebarNav = document.getElementById('sidebarNav');
  sidebarNav.innerHTML = SCREENS.map(s =>
    `<button class="nav-item${state.activeScreen===s.id?' active':''}" data-screen="${s.id}">${s.icon}<span>${s.label}</span></button>`
  ).join('');
  sidebarNav.querySelectorAll('.nav-item').forEach(btn => {
    btn.onclick = () => navigateTo(btn.dataset.screen);
  });

  // Sidebar profiles
  const sp = document.getElementById('sidebarProfiles');
  sp.innerHTML = PROFILES.map(p =>
    `<button class="profile-btn${state.activeProfile===p?' active':''}" data-profile="${p}">${p}</button>`
  ).join('');
  sp.querySelectorAll('.profile-btn').forEach(btn => {
    btn.onclick = () => switchProfile(btn.dataset.profile);
  });

  // Header profiles (mobile)
  const hp = document.getElementById('headerProfiles');
  hp.innerHTML = PROFILES.map(p =>
    `<button class="profile-btn${state.activeProfile===p?' active':''}" data-profile="${p}">${p}</button>`
  ).join('');
  hp.querySelectorAll('.profile-btn').forEach(btn => {
    btn.onclick = () => switchProfile(btn.dataset.profile);
  });

  // Bottom nav (mobile)
  const bn = document.getElementById('botNav');
  bn.innerHTML = SCREENS.map(s =>
    `<button class="botnav-item${state.activeScreen===s.id?' active':''}" data-screen="${s.id}">${s.icon}<span>${s.label}</span></button>`
  ).join('');
  bn.querySelectorAll('.botnav-item').forEach(btn => {
    btn.onclick = () => navigateTo(btn.dataset.screen);
  });

  // Market status
  const open = isMarketOpen();
  document.getElementById('marketDot').className = 'market-dot ' + (open?'open':'closed');
  document.getElementById('marketStatus').textContent = open ? 'Market Open' : 'Market Closed';
}

function renderRefreshBtn() {
  const btn = document.getElementById('refreshBtn');
  if (state.refreshing) btn.querySelector('svg').classList.add('refresh-spin');
  else btn.querySelector('svg').classList.remove('refresh-spin');
}

function navigateTo(screen, options={}) {
  state.activeScreen = screen;
  if (options.ticker) state.selectedTicker = options.ticker;
  if (options.calcPrefill) state.calcPrefill = options.calcPrefill;
  renderNav();
  renderScreen();
}

function switchProfile(profile) {
  state.activeProfile = profile;
  renderNav();
  renderScreen();
}

function renderScreen() {
  const content = document.getElementById('content');
  content.scrollTop = 0;
  switch(state.activeScreen) {
    case 'dashboard': renderDashboard(); break;
    case 'chart': renderChartScreen(); break;
    case 'calculator': renderCalculator(); break;
    case 'portfolio': renderPortfolio(); break;
    case 'checklist': renderChecklist(); break;
    case 'journal': renderJournal(); break;
  }
}

// ─── DASHBOARD ───
function renderDashboard() {
  const content = document.getElementById('content');
  const allTickers = getAllTickers();
  const tickerDataArr = allTickers.map(t => state.tickerData[t]).filter(Boolean);

  const loadedCount = tickerDataArr.length;
  const totalCount = allTickers.length;
  const isLoading = loadedCount < totalCount;
  const longCount = tickerDataArr.filter(d => d.signal === 'LONG').length;
  const shortCount = tickerDataArr.filter(d => d.signal === 'SHORT').length;
  // Count new crosses from what's actually visible on page (no double-counting)
  const coreAndCustom = [...PERMANENT_TICKERS, ...state.customTickers];
  const coreCrossCount = coreAndCustom.filter(t => state.tickerData[t] && state.tickerData[t].isNewCross).length;
  const screenerCrossCount = state.screenerResults.filter(r => r.trendDays === 0 && !coreAndCustom.includes(r.ticker)).length;
  const newCrossCount = coreCrossCount + screenerCrossCount;

  // Calculate total open risk
  const pk = getProfileKey();
  const trades = profiles[pk].trades || [];
  let totalRisk = 0;
  trades.forEach(t => { totalRisk += t.dollarRisk || 0; });

  content.innerHTML = `
    <div class="screen active" id="screen-dashboard">
      ${isLoading ? `<div class="loading"><div class="loading-spinner"></div>Loading market data... ${loadedCount}/${totalCount}</div>` : ''}
      <div class="summary-row">
        <div class="summary-card"><div class="label">Long Signals</div><div class="value green">${longCount}</div></div>
        <div class="summary-card"><div class="label">Short Signals</div><div class="value red">${shortCount}</div></div>
        <div class="summary-card"><div class="label">Open Risk</div><div class="value">${trades.length > 0 ? (totalRisk > 0 ? '$' + fmt(totalRisk) : '--') : '--'}</div></div>
        <div class="summary-card"><div class="label">New Crosses Today</div><div class="value amber">${newCrossCount}</div></div>
      </div>

      <div class="section-header"><h2>Core ETFs & Diversifiers</h2><span class="count">${PERMANENT_TICKERS.length} tickers</span></div>
      ${renderSignalTable(PERMANENT_TICKERS)}
      ${renderSignalGrid(PERMANENT_TICKERS)}

      ${state.customTickers.length > 0 ? `
        <div class="section-header">
          <h2>Custom Watchlist</h2>
          <span class="count">${state.customTickers.length} tickers</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          ${state.customTickers.map(t => `<span style="display:inline-flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--card-border);border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;font-family:var(--mono)">${t}<button onclick="event.stopPropagation();removeCustomTicker('${t}')" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1;padding:0 2px" title="Remove">&times;</button></span>`).join('')}
        </div>
        ${renderSignalTable(state.customTickers)}
        ${renderSignalGrid(state.customTickers)}
      ` : ''}

      <div class="section-header">
        <h2>IBD Leaders (CANSLIM Screener)</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="count">${state.screenerResults.length} qualifying</span>
          <button class="btn btn-sm btn-outline" onclick="runScreener()">
            ${state.screenerRunning ? 'Running...' : 'Run Screener'}
          </button>
        </div>
      </div>
      ${state.screenerRunning ? `<div class="screener-progress"><div class="fill" style="width:${state.screenerProgress}%"></div></div>` : ''}
      ${state.screenerResults.length > 0 ? renderScreenerTable() : '<div style="color:var(--text3);padding:12px;font-size:13px">Run the screener to scan the full US market for CANSLIM-qualifying stocks.</div>'}
    </div>
  `;
}

function renderScreenerProgress() {
  const el = document.querySelector('.screener-progress .fill');
  if (el) el.style.width = state.screenerProgress + '%';
}

function renderSignalTable(tickers) {
  let rows = '';
  tickers.forEach(ticker => {
    const d = state.tickerData[ticker];
    if (!d) {
      rows += `<tr onclick="navigateTo('chart',{ticker:'${ticker}'})"><td class="ticker-cell">${ticker}</td><td colspan="6" style="color:var(--text3)">Loading...</td></tr>`;
      return;
    }
    const chClass = d.change >= 0 ? 'up' : 'down';
    const sigClass = d.signal.toLowerCase();
    rows += `<tr onclick="navigateTo('chart',{ticker:'${ticker}'})">
      <td class="ticker-cell">${ticker}${d.isNewCross ? ' <span style="background:linear-gradient(135deg,#fab387,#f9e2af);color:#1e1e2e;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:800">NEW</span>' : ''}</td>
      <td style="color:var(--text3);font-size:12px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.name || ''}</td>
      <td class="price-cell">$${fmt(d.price)}</td>
      <td class="change-cell ${chClass}">${d.change>=0?'+':''}${fmt(d.change)} (${d.changePct>=0?'+':''}${d.changePct.toFixed(2)}%)</td>
      <td class="ma-cell">${d.ma10!=null?d.ma10.toFixed(2):'--'}</td>
      <td class="ma-cell">${d.ma20!=null?d.ma20.toFixed(2):'--'}</td>
      <td><span class="signal-badge ${sigClass}">${d.signal}</span></td>
      <td style="font-size:12px;color:var(--text3)">${d.daysSinceCross!=null?d.daysSinceCross+'d':'--'}</td>
    </tr>`;
  });

  return `<div class="signal-table-wrap"><table class="signal-table">
    <thead><tr><th>Ticker</th><th>Name</th><th>Price</th><th>Day Change</th><th>MA10</th><th>MA20</th><th>Signal</th><th>Cross</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderSignalGrid(tickers) {
  let cards = '';
  tickers.forEach(ticker => {
    const d = state.tickerData[ticker];
    if (!d) {
      cards += `<div class="signal-card" onclick="navigateTo('chart',{ticker:'${ticker}'})"><div class="ticker-row"><span class="ticker">${ticker}</span></div><div style="color:var(--text3);font-size:13px">Loading...</div></div>`;
      return;
    }
    const sigClass = d.signal === 'LONG' ? 'long' : d.signal === 'SHORT' ? 'short' : '';
    const chClass = d.change >= 0 ? 'up' : 'down';
    cards += `<div class="signal-card ${sigClass}" onclick="navigateTo('chart',{ticker:'${ticker}'})">
      ${d.isNewCross ? '<div class="new-cross-badge">NEW CROSS</div>' : ''}
      <div class="ticker-row"><span class="ticker">${ticker}</span><span class="signal-badge ${d.signal.toLowerCase()}">${d.signal}</span></div>
      <div class="name">${d.name || ticker}</div>
      <div class="price">$${fmt(d.price)}</div>
      <div class="change ${chClass}">${d.change>=0?'+':''}${fmt(d.change)} (${d.changePct>=0?'+':''}${d.changePct.toFixed(2)}%)</div>
      <div class="ma-info">
        <div><div class="ma-label">MA10</div><div class="ma-val" style="color:#89b4fa">${d.ma10!=null?d.ma10.toFixed(2):'--'}</div></div>
        <div><div class="ma-label">MA20</div><div class="ma-val" style="color:#94e2d5">${d.ma20!=null?d.ma20.toFixed(2):'--'}</div></div>
      </div>
      <div class="days-since">${d.daysSinceCross!=null?'Last cross: '+d.daysSinceCross+' days ago':'No recent crossover'}</div>
    </div>`;
  });
  return `<div class="signal-grid">${cards}</div>`;
}

function renderScreenerTable() {
  let rows = '';
  state.screenerResults.forEach(r => {
    const sigClass = r.trendDir === 'LONG' ? 'long' : r.trendDir === 'SHORT' ? 'short' : 'neutral';
    const isNew = r.trendDays === 0;
    const epsPct  = r.epsGrowth != null ? (r.epsGrowth * 100) : null;
    const revPct  = r.revenueGrowth != null ? (r.revenueGrowth * 100) : null;
    const roePct  = r.roe != null ? (r.roe * 100) : null;
    const omPct   = r.operatingMargin != null ? (r.operatingMargin * 100) : null;
    const epsStr  = epsPct != null ? (epsPct >= 0 ? '+' : '') + epsPct.toFixed(0) + '%' : '--';
    const revStr  = revPct != null ? (revPct >= 0 ? '+' : '') + revPct.toFixed(0) + '%' : '--';
    const roeStr  = roePct != null ? roePct.toFixed(0) + '%' : '--';
    const omStr   = omPct  != null ? omPct.toFixed(0)  + '%' : '--';
    const perf6mStr = r.perf6m != null ? (r.perf6m >= 0 ? '+' : '') + r.perf6m.toFixed(0) + '%' : '--';
    const epsColor  = epsPct >= 100 ? '#40a02b' : epsPct >= 50 ? '#df8e1d' : 'var(--text2)';
    const revColor  = revPct >= 50  ? '#40a02b' : revPct >= 25 ? '#df8e1d' : 'var(--text2)';
    const roeColor  = roePct >= 30  ? '#40a02b' : roePct >= 17 ? '#df8e1d' : 'var(--text2)';
    const omColor   = omPct  >= 15  ? '#40a02b' : omPct  >= 0  ? '#df8e1d' : 'var(--text2)';
    const perfColor = r.perf6m >= 40 ? '#40a02b' : r.perf6m >= 20 ? '#df8e1d' : 'var(--text2)';
    rows += `<tr onclick="navigateTo('chart',{ticker:'${r.ticker}'})" style="${isNew ? 'background:rgba(249,226,175,0.08);' : ''}">

async function lookupCalcTicker() {
  const input = document.getElementById('calcTicker');
  const ticker = (input.value || '').trim().toUpperCase();
  if (!ticker) { showToast('Enter a ticker symbol'); return; }
  input.value = ticker;
  showToast(`Looking up ${ticker}...`);
  const d = await loadTickerData(ticker);
  if (d && !d.error) {
    document.getElementById('calcEntry').value = d.price.toFixed(2);
    document.getElementById('calcATR').value = d.atr ? d.atr.toFixed(2) : '';
    state.calcPrefill = {ticker, entryPrice: d.price, atr: d.atr};
    showToast(`${ticker}: $${d.price.toFixed(2)} | ATR: ${d.atr ? d.atr.toFixed(2) : 'N/A'}`);
    updateCalc();
  } else {
    showToast(`Could not load data for ${ticker}`);
  }
}

function formatAccountSize(input) {
  const raw = input.value.replace(/[^0-9.]/g, '');
  const num = parseFloat(raw);
  if (!raw || isNaN(num)) return;
  const cursor = input.selectionStart;
  const oldLen = input.value.length;
  input.value = num.toLocaleString('en-US');
  const newLen = input.value.length;
  input.setSelectionRange(cursor + (newLen - oldLen), cursor + (newLen - oldLen));
}

function updateCalc() {
  const account = parseFloat((document.getElementById('calcAccount').value || '').replace(/,/g, ''));
  const entry = parseFloat(document.getElementById('calcEntry').value);
  const atr = parseFloat(document.getElementById('calcATR').value);

  if (!account || !entry || !atr) return;

  const stopDist = 3 * atr;
  const stopPrice = entry - stopDist;
  const dollarRisk = account * 0.005; // Target 0.5% risk
  const shares = Math.round((dollarRisk / stopDist) * 100) / 100; // 2 decimal places for fractional shares
  const invested = shares * entry;
  const actualRisk = (shares * stopDist);
  const riskPct = (actualRisk / account) * 100;
  const target2R = entry + 2 * stopDist;

  document.getElementById('calcStop').textContent = '$' + stopPrice.toFixed(2);
  document.getElementById('calcTarget2R').textContent = '$' + target2R.toFixed(2);
  document.getElementById('calcDollarRisk').textContent = '$' + actualRisk.toFixed(2);
  document.getElementById('calcShares').textContent = shares.toFixed(2) + ' shares';
  document.getElementById('calcInvested').textContent = '$' + fmt(invested);
  document.getElementById('calcRiskPct').textContent = riskPct.toFixed(2) + '%';

  let warnHtml = '';
  if (riskPct <= 0.5) {
    warnHtml = '<div class="risk-warning green">Risk is at or below 0.5% of account. Position sized correctly.</div>';
  } else if (riskPct <= 1.0) {
    warnHtml = '<div class="risk-warning yellow">Warning: Risk exceeds 0.5% of account (' + riskPct.toFixed(2) + '%)</div>';
  } else {
    warnHtml = '<div class="risk-warning red">Danger: Risk exceeds 1% of account (' + riskPct.toFixed(2) + '%). Reduce position size.</div>';
  }
  document.getElementById('calcWarning').innerHTML = warnHtml;

  // Store for trade confirmation
  state._calcResult = {stopPrice, stopDist, dollarRisk: actualRisk, shares, invested, riskPct, entry, atr, account};
}

function confirmTrade() {
  const r = state._calcResult;
  const pf = state.calcPrefill || {};
  if (!r || !r.shares) { showToast('Fill in all fields first'); return; }

  const tickerInput = document.getElementById('calcTicker');
  const ticker = (pf.ticker || (tickerInput && tickerInput.value) || prompt('Enter ticker symbol:'));
  if (!ticker) return;

  const pk = getProfileKey();
  const trade = {
    id: Date.now(),
    ticker: ticker.toUpperCase(),
    entryDate: new Date().toISOString().split('T')[0],
    entryPrice: r.entry,
    stopPrice: r.stopPrice,
    atr: r.atr,
    initialDollarRisk: r.dollarRisk,
    dollarRisk: r.dollarRisk,
    shares: r.shares,
    accountSize: r.account,
    riskPct: r.riskPct,
    pyramidLayers: [{
      layer: 1,
      triggerPrice: r.entry,
      shares: r.shares,
      status: 'FILLED'
    }],
    totalShares: r.shares
  };

  // Add pending pyramid layers (up to 10)
  for (let i = 2; i <= 10; i++) {
    const triggerPrice = r.entry + (i - 1) * r.atr;
    trade.pyramidLayers.push({
      layer: i,
      triggerPrice,
      shares: 0,
      status: i === 2 ? 'NEXT ADD' : 'PENDING'
    });
  }

  profiles[pk].trades = profiles[pk].trades || [];
  profiles[pk].trades.push(trade);
  saveProfiles(profiles);

  state.calcPrefill = null;
  state._calcResult = null;
  showToast(`Trade opened: ${trade.ticker} x${trade.shares} shares`);
  navigateTo('portfolio');
}

// ─── PORTFOLIO ───
function renderPortfolio() {
  const content = document.getElementById('content');
  const pk = getProfileKey();
  const trades = profiles[pk].trades || [];

  let totalPnL = 0;
  let totalRisk = 0;
  let alerts = 0;

  const tradeCards = trades.map((trade, idx) => {
    const d = state.tickerData[trade.ticker];
    const currentPrice = d ? d.price : trade.entryPrice;
    const currentATR = d ? d.atr : trade.atr;
    const pnl = (currentPrice - trade.entryPrice) * trade.totalShares;
    const rMultiple = trade.initialDollarRisk ? pnl / trade.initialDollarRisk : 0;
    const atrGain = currentATR ? (currentPrice - trade.entryPrice) / currentATR : 0;
    const tightenAlert = atrGain >= 5;
    if (tightenAlert) alerts++;
    totalPnL += pnl;
    totalRisk += trade.dollarRisk || 0;

    let pyramidHtml = '<table class="pyramid-table"><thead><tr><th>Layer</th><th>Trigger</th><th>Shares</th><th>Status</th></tr></thead><tbody>';
    trade.pyramidLayers.forEach(layer => {
      const statusClass = layer.status === 'FILLED' ? 'filled' : layer.status === 'NEXT ADD' ? 'next' : 'pending';
      const isNext = layer.status === 'NEXT ADD';
      pyramidHtml += `<tr class="${isNext?'next-add':''}"><td>${layer.layer}</td><td style="font-family:var(--mono)">$${layer.triggerPrice.toFixed(2)}</td><td style="font-family:var(--mono)">${layer.shares}</td><td><span class="pyramid-status ${statusClass}">${layer.status}</span></td></tr>`;
    });
    pyramidHtml += '</tbody></table>';

    return `<div class="trade-card">
      <div class="trade-header">
        <div>
          <div class="trade-ticker">${trade.ticker}</div>
          <div class="trade-date">Entered: ${trade.entryDate}</div>
        </div>
        <span class="signal-badge ${pnl>=0?'long':'short'}" style="font-size:13px">${pnl>=0?'+':''}$${fmt(Math.abs(pnl))}</span>
      </div>
      ${tightenAlert ? '<div class="tighten-alert">TIGHTEN STOP - Unrealized gain exceeds 5x ATR! Move stop to 2x ATR trailing.</div>' : ''}
      <div class="trade-stats">
        <div class="stat"><div class="label">Entry</div><div class="val">$${trade.entryPrice.toFixed(2)}</div></div>
        <div class="stat"><div class="label">Current</div><div class="val">$${currentPrice.toFixed(2)}</div></div>
        <div class="stat"><div class="label">P&L (R)</div><div class="val" style="color:${rMultiple>=0?'#40a02b':'#d20f39'}">${rMultiple>=0?'+':''}${rMultiple.toFixed(2)}R</div></div>
        <div class="stat"><div class="label">Stop</div><div class="val">$${trade.stopPrice.toFixed(2)}</div></div>
        <div class="stat"><div class="label">ATR</div><div class="val">${currentATR?currentATR.toFixed(2):'--'}</div></div>
        <div class="stat"><div class="label">ATR Gain</div><div class="val" style="color:${atrGain>=5?'#df8e1d':atrGain>=0?'#40a02b':'#d20f39'}">${atrGain.toFixed(2)}x</div></div>
        <div class="stat"><div class="label">Total Shares</div><div class="val">${trade.totalShares}</div></div>
      </div>
      ${pyramidHtml}
      <div class="trade-actions">
        <button class="btn btn-sm btn-primary" onclick="addPyramidLayer(${idx})">Add Layer</button>
        ${tightenAlert ? `<button class="btn btn-sm btn-amber" onclick="tightenStop(${idx})">Tighten Stop</button>` : ''}
        <button class="btn btn-sm btn-red" onclick="exitTrade(${idx})">Exit Trade</button>
        <button class="btn btn-sm btn-outline" onclick="navigateTo('chart',{ticker:'${trade.ticker}'})">View Chart</button>
      </div>
    </div>`;
  }).join('');

  content.innerHTML = `
    <div class="screen active">
      <h2 style="margin-bottom:16px">Portfolio & Pyramid Tracker</h2>
      <div style="font-size:13px;color:var(--text3);margin-bottom:16px">Profile: <strong style="color:var(--text)">${state.activeProfile}</strong></div>

      <div class="summary-row">
        <div class="summary-card"><div class="label">Open Trades</div><div class="value">${trades.length}</div></div>
        <div class="summary-card"><div class="label">Unrealized P&L</div><div class="value ${totalPnL>=0?'green':'red'}">${totalPnL>=0?'+':''}$${fmt(Math.abs(totalPnL))}</div></div>
        <div class="summary-card"><div class="label">Total Open Risk</div><div class="value">$${fmt(totalRisk)}</div></div>
        <div class="summary-card"><div class="label">Alerts</div><div class="value amber">${alerts}</div></div>
      </div>

      ${trades.length === 0 && !(profiles[pk].ibkrConnected && profiles[pk].ibkrPositions.length > 0) ? '<div style="text-align:center;padding:40px;color:var(--text3)"><p style="font-size:15px">No open trades</p><p style="margin-top:8px;font-size:13px">Use the Position Size Calculator to enter a new trade, or connect your IBKR account below</p></div>' : tradeCards}

            <div class="stat"><div class="label">P&L %</div><div class="val" style="color:${pnlPct>=0?'#26a69a':'#ef5350'}">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</div></div>
            <div class="stat"><div class="label">Realized P&L</div><div class="val">$${fmt(pos.realizedPnl)}</div></div>
          </div>
        </div>`;
      });

      html += `<div style="text-align:right;font-size:13px;font-weight:600;font-family:var(--mono);color:${ibkrTotalPnl>=0?'#26a69a':'#ef5350'};margin-top:4px">Total Unrealized: ${ibkrTotalPnl>=0?'+':''}$${fmt(Math.abs(ibkrTotalPnl))}</div>`;
    } else {
      html += '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">No open positions in this IBKR account</div>';
    }
  }

  html += '</div>';
  return html;
}

function addPyramidLayer(tradeIdx) {
  const pk = getProfileKey();
  const trade = profiles[pk].trades[tradeIdx];
  if (!trade) return;

  const nextLayer = trade.pyramidLayers.find(l => l.status === 'NEXT ADD');
  if (!nextLayer) { showToast('All layers filled'); return; }

  state.calcPrefill = {
    ticker: trade.ticker,
    entryPrice: nextLayer.triggerPrice,
    atr: trade.atr
  };
  navigateTo('calculator');
}

function tightenStop(tradeIdx) {
  const pk = getProfileKey();
  const trade = profiles[pk].trades[tradeIdx];
  if (!trade) return;

  const d = state.tickerData[trade.ticker];
  const currentATR = d ? d.atr : trade.atr;
  const currentPrice = d ? d.price : trade.entryPrice;
  trade.stopPrice = currentPrice - 2 * currentATR;
  saveProfiles(profiles);
  showToast(`Stop tightened to $${trade.stopPrice.toFixed(2)} (2x ATR)`);
  renderPortfolio();
}

function exitTrade(tradeIdx) {
  const pk = getProfileKey();
  const trade = profiles[pk].trades[tradeIdx];
  if (!trade) return;

  const d = state.tickerData[trade.ticker];
  const exitPrice = d ? d.price : parseFloat(prompt('Enter exit price:'));
  if (!exitPrice) return;

  const pnl = (exitPrice - trade.entryPrice) * trade.totalShares;
  const rMultiple = trade.initialDollarRisk ? pnl / trade.initialDollarRisk : 0;
  const rulesFollowed = confirm('Were all system rules followed? OK = Yes, Cancel = No');

  // Show modal for notes
  const notes = prompt('Trade notes (optional):') || '';

  const journalEntry = {
    id: Date.now(),
    ticker: trade.ticker,
    entryDate: trade.entryDate,
    exitDate: new Date().toISOString().split('T')[0],
    entryPrice: trade.entryPrice,
    exitPrice,
    pnl,
    rMultiple,
    rulesFollowed,
    notes,
    shares: trade.totalShares
  };

  profiles[pk].journal = profiles[pk].journal || [];
  profiles[pk].journal.push(journalEntry);
  profiles[pk].trades.splice(tradeIdx, 1);
  saveProfiles(profiles);

  showToast(`Trade closed: ${trade.ticker} ${pnl>=0?'+':''}$${fmt(Math.abs(pnl))}`);
  renderPortfolio();
}
